name: reusable-quality

on:
  workflow_call:
    inputs:
      source_sha:
        description: "Commit to check out, test, and build."
        required: true
        type: string
      version:
        description: "Exact version embedded in binaries and verified by native smoke tests."
        required: true
        type: string

permissions:
  contents: read

jobs:
  module:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Require tidy module files
        run: go mod tidy -diff

      - name: Verify module cache
        run: go mod verify

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - run: go test ./...
      - run: go vet ./...

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - run: go test -race ./...

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - run: scripts/smoke.sh

  license:
    name: license-${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
          - os: darwin
            runner: macos-15
          - os: windows
            runner: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Check dependency licenses
        shell: bash
        run: scripts/license-check.sh

  build:
    name: build-${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            cgo: "0"
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            cgo: "0"
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
            cgo: "1"
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            runner: macos-15
            cgo: "1"
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
            cgo: "0"
            ext: ".exe"
            archive: zip
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          VERSION: ${{ inputs.version }}
        run: |
          set -eu
          mkdir -p "dist/env-vault-${GOOS}-${GOARCH}"
          go build \
            -trimpath \
            -ldflags="-s -w -X github.com/ildarbinanas-design/env-vault/internal/cli.Version=${VERSION}" \
            -o "dist/env-vault-${GOOS}-${GOARCH}/env-vault${{ matrix.ext }}" \
            ./cmd/env-vault
          cp README.md LICENSE THIRD_PARTY_NOTICES.md "dist/env-vault-${GOOS}-${GOARCH}/"

      - name: Package
        run: |
          set -eu
          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip -r "env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.zip" "env-vault-${{ matrix.goos }}-${{ matrix.goarch }}"
          else
            tar -czf "env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" "env-vault-${{ matrix.goos }}-${{ matrix.goarch }}"
          fi
          shasum -a 256 "env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}" > "env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: env-vault-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}
            dist/env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}.sha256
          retention-days: 14

  native-smoke:
    needs: [build]
    name: smoke-${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            archive: tar.gz
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            runner: macos-15
            archive: tar.gz
          - goos: windows
            goarch: amd64
            runner: windows-latest
            archive: zip
    steps:
      - name: Download built artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: env-vault-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist

      - name: Verify exact version on Unix
        if: runner.os != 'Windows'
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCHIVE: ${{ matrix.archive }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          name="env-vault-${GOOS}-${GOARCH}"
          (
            cd dist
            shasum -a 256 -c "${name}.${ARCHIVE}.sha256"
            tar -xzf "${name}.${ARCHIVE}"
          )
          binary="dist/${name}/env-vault"
          printf '%s\n' "$VERSION" > expected-version.txt
          "$binary" --version > version-flag.txt
          "$binary" version > version-command.txt
          diff -u expected-version.txt version-flag.txt
          diff -u expected-version.txt version-command.txt

      - name: Verify exact version on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ inputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          $name = "env-vault-$env:GOOS-$env:GOARCH"
          $archive = Join-Path "dist" "$name.zip"
          $checksumFile = Join-Path "dist" "$name.zip.sha256"
          $expectedChecksum = ((Get-Content -LiteralPath $checksumFile -Raw).Trim() -split '\s+')[0]
          $actualChecksum = (Get-FileHash -LiteralPath $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualChecksum -cne $expectedChecksum) {
            throw "checksum mismatch for $archive"
          }
          Expand-Archive -LiteralPath $archive -DestinationPath "dist/unpacked"
          $binary = Join-Path "dist/unpacked/$name" "env-vault.exe"
          $flagOutput = @(& $binary --version)
          $flagExit = $LASTEXITCODE
          if ($flagExit -ne 0 -or $flagOutput.Count -ne 1 -or $flagOutput[0] -cne $env:VERSION) {
            throw "--version output '$($flagOutput -join '\n')', want '$env:VERSION'"
          }
          $commandOutput = @(& $binary version)
          $commandExit = $LASTEXITCODE
          if ($commandExit -ne 0 -or $commandOutput.Count -ne 1 -or $commandOutput[0] -cne $env:VERSION) {
            throw "version output '$($commandOutput -join '\n')', want '$env:VERSION'"
          }

  e2e:
    needs: [build]
    name: e2e-${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    env:
      GOTOOLCHAIN: local
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            cgo: "0"
            archive: tar.gz
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            cgo: "0"
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
            cgo: "1"
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            runner: macos-15
            cgo: "1"
            archive: tar.gz
          - goos: windows
            goarch: amd64
            runner: windows-latest
            cgo: "0"
            archive: zip
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Download release-like artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: env-vault-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist

      - name: Install pinned E2E reporter
        continue-on-error: true
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Run E2E and finalize reports
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
          ENV_VAULT_E2E_GOOS: ${{ matrix.goos }}
          ENV_VAULT_E2E_GOARCH: ${{ matrix.goarch }}
          ENV_VAULT_E2E_VERSION: ${{ inputs.version }}
          ENV_VAULT_E2E_COMMIT_SHA: ${{ inputs.source_sha }}
        run: >-
          go run ./e2e/cmd/e2e-runner run
          --phase candidate
          --coverage-floor 60
          --command-timeout 3m
          --test-timeout 5m
          --artifact "dist/env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}"
          --checksum "dist/env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}.sha256"

      - name: Upload E2E reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: env-vault-e2e-candidate-${{ matrix.goos }}-${{ matrix.goarch }}-attempt-${{ github.run_attempt }}
          path: reports/e2e/candidate
          if-no-files-found: error
          retention-days: 30

  e2e-gate:
    if: always()
    needs: [e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Download E2E report artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: env-vault-e2e-candidate-*-attempt-${{ github.run_attempt }}
          path: reports-download
          merge-multiple: true

      - name: Validate complete E2E report matrix
        if: always()
        run: >-
          go run ./e2e/cmd/e2e-runner validate-matrix
          --reports reports-download
          --phase candidate
          --expected-commit "${{ inputs.source_sha }}"
          --expected-run-id "${{ github.run_id }}"
          --expected-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          --expected-run-attempt "${{ github.run_attempt }}"
          --expected-repository "${{ github.repository }}"
          --expected-reporter "v1.13.0"

      - name: Upload matrix validation
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: env-vault-e2e-candidate-matrix-attempt-${{ github.run_attempt }}
          path: |
            reports-download/matrix-validation.json
            reports-download/matrix-validation.md
          if-no-files-found: error
          retention-days: 30

  e2e-compare:
    if: always()
    needs: [e2e, e2e-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      actions: read
    env:
      GOTOOLCHAIN: local
    steps:
      - name: Check out candidate source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}

      - name: Check out canonical baseline source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ildarbinanas-design/env-vault
          ref: 7a044bdbf73aa592016bbb3a02d81f314f08fe63
          path: baseline-source
          persist-credentials: "false"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Preload recorded comparison toolchains
        shell: bash
        run: |
          set -euo pipefail
          GOTOOLCHAIN=go1.22.12 go version
          GOTOOLCHAIN=go1.26.5 go version

      - name: Download candidate E2E reports
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: env-vault-e2e-candidate-*-attempt-${{ github.run_attempt }}
          path: candidate-download
          merge-multiple: true

      - name: Download canonical baseline E2E reports
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ github.token }}
          repository: ildarbinanas-design/env-vault
          run-id: "29441160687"
          pattern: env-vault-e2e-baseline-*-attempt-1
          path: baseline-download
          merge-multiple: true

      - name: Validate canonical baseline against baseline source
        id: baseline_source_validation
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          rm -f -- \
            "$GITHUB_WORKSPACE/baseline-download/matrix-validation.json" \
            "$GITHUB_WORKSPACE/baseline-download/matrix-validation.md"
          cd baseline-source
          GOTOOLCHAIN=go1.22.12 go run ./e2e/cmd/e2e-runner validate-matrix \
            --reports "$GITHUB_WORKSPACE/baseline-download" \
            --phase baseline \
            --expected-commit "7a044bdbf73aa592016bbb3a02d81f314f08fe63" \
            --expected-run-id "29441160687" \
            --expected-run-url "https://github.com/ildarbinanas-design/env-vault/actions/runs/29441160687" \
            --expected-run-attempt "1" \
            --expected-repository "ildarbinanas-design/env-vault" \
            --expected-reporter "v1.12.2"

      - name: Validate candidate against candidate source
        id: candidate_source_validation
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          rm -f -- \
            "$GITHUB_WORKSPACE/candidate-download/matrix-validation.json" \
            "$GITHUB_WORKSPACE/candidate-download/matrix-validation.md"
          GOTOOLCHAIN=go1.26.5 go run ./e2e/cmd/e2e-runner validate-matrix \
            --reports "$GITHUB_WORKSPACE/candidate-download" \
            --phase candidate \
            --expected-commit "${{ inputs.source_sha }}" \
            --expected-run-id "${{ github.run_id }}" \
            --expected-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --expected-run-attempt "${{ github.run_attempt }}" \
            --expected-repository "${{ github.repository }}" \
            --expected-reporter "v1.13.0"

      - name: Compare candidate with canonical baseline
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          GOTOOLCHAIN=go1.26.5 go run ./cmd/e2e-compare \
            --baseline "$GITHUB_WORKSPACE/baseline-download" \
            --candidate "$GITHUB_WORKSPACE/candidate-download" \
            --output "$GITHUB_WORKSPACE/comparison-report" \
            --coverage-tolerance 0 \
            --expected-suite-hash "ace01466c8b504af9a1a2af2ec2ba3bcd9446e637044d94b4ce7d5dffa842fcf" \
            --baseline-validation-outcome "${{ steps.baseline_source_validation.outcome }}" \
            --candidate-validation-outcome "${{ steps.candidate_source_validation.outcome }}" \
            --baseline-commit "7a044bdbf73aa592016bbb3a02d81f314f08fe63" \
            --baseline-run-id "29441160687" \
            --baseline-run-url "https://github.com/ildarbinanas-design/env-vault/actions/runs/29441160687" \
            --baseline-run-attempt "1" \
            --baseline-repository "ildarbinanas-design/env-vault" \
            --baseline-reporter "v1.12.2" \
            --candidate-commit "${{ inputs.source_sha }}" \
            --candidate-run-id "${{ github.run_id }}" \
            --candidate-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --candidate-run-attempt "${{ github.run_attempt }}" \
            --candidate-repository "${{ github.repository }}" \
            --candidate-reporter "v1.13.0"

      - name: Verify exact migration identity
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          jq -e '
            .status == "pass" and
            .suite_hash == "ace01466c8b504af9a1a2af2ec2ba3bcd9446e637044d94b4ce7d5dffa842fcf" and
            .baseline_go_version == "go1.22.12" and
            .candidate_go_version == "go1.26.5"
          ' comparison-report/comparison.json >/dev/null

      - name: Add comparison to job summary
        if: always()
        shell: bash
        run: cat comparison-report/comparison.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload baseline comparison
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: env-vault-e2e-candidate-comparison-attempt-${{ github.run_attempt }}
          path: |
            comparison-report/comparison.json
            comparison-report/comparison.md
          if-no-files-found: error
          retention-days: 30
