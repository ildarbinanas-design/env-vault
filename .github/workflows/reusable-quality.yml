name: reusable-quality

on:
  workflow_call:
    inputs:
      source_sha:
        description: "Commit to check out, test, and build."
        required: true
        type: string
      version:
        description: "Exact vX.Y.Z version, or auto for deterministic CI resolution."
        required: true
        type: string
      event_name:
        description: "Caller event name used only when version is auto."
        required: false
        default: ""
        type: string
      pull_request_head_ref:
        description: "Caller pull-request head ref used to recognize Release Please."
        required: false
        default: ""
        type: string
      pull_request_head_sha:
        description: "Exact caller pull-request head SHA used to classify Release Please."
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  resolve:
    name: resolve-source-quality
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    outputs:
      matrix: ${{ steps.contract.outputs.matrix }}
      version: ${{ steps.version.outputs.version }}
      release_candidate: ${{ steps.version.outputs.release_candidate }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}
          # Release Please PR checks run on a synthetic merge. The classifier
          # needs the PR-head parent and its own parent, hence depth three.
          fetch-depth: 3
          persist-credentials: "false"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - id: version
        name: Resolve exact candidate version
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          CALLER_EVENT_NAME: ${{ inputs.event_name }}
          PR_HEAD_REF: ${{ inputs.pull_request_head_ref }}
          PR_HEAD_SHA: ${{ inputs.pull_request_head_sha }}
        run: |
          set -euo pipefail
          source scripts/release/lib.sh
          resolved="$REQUESTED_VERSION"
          release_candidate=false

          if [[ "$resolved" == "auto" ]]; then
            resolved="ci-${SOURCE_SHA}"
            if [[ "$CALLER_EVENT_NAME" == "pull_request" && "$PR_HEAD_REF" == "release-please--branches--main--components--env-vault" ]]; then
              [[ "$PR_HEAD_SHA" =~ ^[0-9a-f]{40}$ ]] || {
                echo "Release Please head SHA is missing or malformed" >&2
                exit 1
              }
              git cat-file -e "${PR_HEAD_SHA}^{commit}"
              read -r -a source_parents <<< "$(git rev-list --parents -n 1 "$SOURCE_SHA")"
              if [[ ${#source_parents[@]} -ne 3 || "${source_parents[2]}" != "$PR_HEAD_SHA" ]]; then
                echo "Release Please head ${PR_HEAD_SHA} is not the exact pull-request parent of source ${SOURCE_SHA}" >&2
                exit 1
              fi
              classification="$(scripts/release/classify-release-commit.sh "$PR_HEAD_SHA")"
              [[ "$(sed -n 's/^publish=//p' <<< "$classification")" == "true" ]] || {
                echo "Release Please head did not classify as a release" >&2
                exit 1
              }
              [[ "$(sed -n 's/^source_sha=//p' <<< "$classification")" == "$PR_HEAD_SHA" ]] || {
                echo "Release Please classifier returned a different source SHA" >&2
                exit 1
              }
              resolved="$(sed -n 's/^version=//p' <<< "$classification")"
              release_candidate=true
            elif [[ "$CALLER_EVENT_NAME" == "push" ]]; then
              read -r -a parents <<< "$(git rev-list --parents -n 1 "$SOURCE_SHA")"
              if [[ ${#parents[@]} -eq 2 ]]; then
                classification="$(scripts/release/classify-release-commit.sh "$SOURCE_SHA")"
                if [[ "$(sed -n 's/^publish=//p' <<< "$classification")" == "true" ]]; then
                  resolved="$(sed -n 's/^version=//p' <<< "$classification")"
                  release_candidate=true
                fi
              fi
            fi
          fi

          if [[ "$resolved" =~ ^ci-[0-9a-f]{40}$ ]]; then
            :
          else
            release_require_version "$resolved"
          fi
          {
            printf 'version=%s\n' "$resolved"
            printf 'release_candidate=%s\n' "$release_candidate"
          } >> "$GITHUB_OUTPUT"

      - id: contract
        name: Validate release contract and resolve native matrix
        shell: bash
        run: |
          set -euo pipefail
          go run ./cmd/releasecheck validate-contract --json >/dev/null
          matrix="$(go run ./cmd/releasecheck contract matrix --json)"
          jq -e '.include | type == "array" and length == 5' <<< "$matrix" >/dev/null
          printf 'matrix=%s\n' "$(jq -c . <<< "$matrix")" >> "$GITHUB_OUTPUT"

  source-quality:
    name: source-quality
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}
          persist-credentials: "false"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Require tidy module files
        run: go mod tidy -diff

      - name: Verify module cache
        run: go mod verify

      - name: Run source tests
        run: go test ./...

      - name: Vet source
        run: go vet ./...

      - name: Run source smoke tests
        run: scripts/smoke.sh

      - name: Run full race suite
        run: go test -race ./...

  license:
    name: license-${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
          - os: darwin
            runner: macos-15
          - os: windows
            runner: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}
          persist-credentials: "false"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Check dependency licenses
        shell: bash
        run: scripts/license-check.sh

  native:
    needs: [resolve]
    name: artifact-quality-${{ matrix.id }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    env:
      GOTOOLCHAIN: local
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}
          persist-credentials: "false"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Run native platform config tests
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
        run: go test -v ./internal/config -count=1

      - name: Burn in Windows config concurrency
        if: matrix.goos == 'windows'
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
        run: go test ./internal/config -run '^TestConcurrentSavePublishesOnlyCompleteConfigs$' -count=10

      - name: Build native release artifact
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          VERSION: ${{ needs.resolve.outputs.version }}
          BINARY: ${{ matrix.binary }}
        run: |
          set -euo pipefail
          name="env-vault-${GOOS}-${GOARCH}"
          mkdir -p "dist/${name}"
          go build \
            -trimpath \
            -ldflags="-s -w -X github.com/ildarbinanas-design/env-vault/internal/cli.Version=${VERSION}" \
            -o "dist/${name}/${BINARY}" \
            ./cmd/env-vault
          cp README.md LICENSE THIRD_PARTY_NOTICES.md "dist/${name}/"

      - name: Package native release artifact on Unix
        if: runner.os != 'Windows'
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCHIVE: ${{ matrix.archive }}
          CHECKSUM: ${{ matrix.checksum }}
        run: |
          set -euo pipefail
          name="env-vault-${GOOS}-${GOARCH}"
          cd dist
          tar -czf "$ARCHIVE" "$name"
          shasum -a 256 "$ARCHIVE" > "$CHECKSUM"

      - name: Package native release artifact on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCHIVE: ${{ matrix.archive }}
          CHECKSUM: ${{ matrix.checksum }}
        run: |
          $ErrorActionPreference = "Stop"
          $name = "env-vault-$env:GOOS-$env:GOARCH"
          $archive = Join-Path "dist" $env:ARCHIVE
          Compress-Archive -LiteralPath (Join-Path "dist" $name) -DestinationPath $archive
          $hash = (Get-FileHash -LiteralPath $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          $checksum = Join-Path "dist" $env:CHECKSUM
          [System.IO.File]::WriteAllText($checksum, "$hash  $env:ARCHIVE`n", [System.Text.Encoding]::ASCII)

      - name: Upload current-attempt native release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: env-vault-release-${{ matrix.id }}-attempt-${{ github.run_attempt }}
          path: |
            dist/${{ matrix.archive }}
            dist/${{ matrix.checksum }}
          if-no-files-found: error
          retention-days: 14

      - name: Install pinned E2E reporter
        continue-on-error: true
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Run E2E and finalize reports
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
          ENV_VAULT_E2E_GOOS: ${{ matrix.goos }}
          ENV_VAULT_E2E_GOARCH: ${{ matrix.goarch }}
          ENV_VAULT_E2E_VERSION: ${{ needs.resolve.outputs.version }}
          ENV_VAULT_E2E_COMMIT_SHA: ${{ inputs.source_sha }}
        run: >-
          go run ./e2e/cmd/e2e-runner run
          --phase candidate
          --coverage-floor 60
          --command-timeout 3m
          --test-timeout 5m
          --artifact "dist/${{ matrix.archive }}"
          --checksum "dist/${{ matrix.checksum }}"

      - name: Verify three literal versions and seal native proof
        if: needs.resolve.outputs.release_candidate == 'true' && inputs.event_name == 'push'
        shell: bash
        env:
          PLATFORM_ID: ${{ matrix.id }}
          ARCHIVE: ${{ matrix.archive }}
          CHECKSUM: ${{ matrix.checksum }}
          BINARY: ${{ matrix.binary }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          name="env-vault-${GOOS}-${GOARCH}"
          mkdir -p promotion-platform
          version_results="promotion-platform/${PLATFORM_ID}-version-results.json"
          go run ./cmd/release-version-probe \
            --platform "$PLATFORM_ID" \
            --source-sha "$SOURCE_SHA" \
            --release-version "$VERSION" \
            --repository "$GITHUB_REPOSITORY" \
            --run-id "$GITHUB_RUN_ID" \
            --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --binary "dist/${name}/${BINARY}" \
            > "$version_results"
          go run ./cmd/releasecheck promotion record-platform \
            --platform "$PLATFORM_ID" \
            --source-sha "$SOURCE_SHA" \
            --release-version "$VERSION" \
            --repository "$GITHUB_REPOSITORY" \
            --run-id "$GITHUB_RUN_ID" \
            --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --archive "dist/$ARCHIVE" \
            --checksum "dist/$CHECKSUM" \
            --binary "dist/${name}/${BINARY}" \
            --version-results "$version_results" \
            --output "promotion-platform/${PLATFORM_ID}.json" \
            --json

      - name: Upload current-attempt native proof
        if: needs.resolve.outputs.release_candidate == 'true' && inputs.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: env-vault-promotion-platform-${{ matrix.id }}-attempt-${{ github.run_attempt }}
          path: promotion-platform/${{ matrix.id }}.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload current-attempt E2E reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: env-vault-e2e-candidate-${{ matrix.id }}-attempt-${{ github.run_attempt }}
          path: reports/e2e/candidate
          if-no-files-found: error
          retention-days: 30

  e2e-gate:
    if: always() && !cancelled()
    needs: [resolve, source-quality, license, native]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOTOOLCHAIN: local
    steps:
      - name: Require every upstream quality stage
        shell: bash
        env:
          RESOLVE_RESULT: ${{ needs.resolve.result }}
          SOURCE_QUALITY_RESULT: ${{ needs.source-quality.result }}
          LICENSE_RESULT: ${{ needs.license.result }}
          NATIVE_RESULT: ${{ needs.native.result }}
        run: |
          set -euo pipefail
          for result in "$RESOLVE_RESULT" "$SOURCE_QUALITY_RESULT" "$LICENSE_RESULT" "$NATIVE_RESULT"; do
            [[ "$result" == "success" ]] || {
              echo "quality stage result: $result" >&2
              exit 1
            }
          done

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}
          persist-credentials: "false"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Download current-attempt E2E reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: env-vault-e2e-candidate-*-attempt-${{ github.run_attempt }}
          path: reports-download
          merge-multiple: true

      - name: Validate and seal the complete E2E matrix once
        shell: bash
        run: >-
          go run ./e2e/cmd/e2e-runner validate-matrix
          --contract release/contract.v1.json
          --reports reports-download
          --phase candidate
          --expected-commit "${{ inputs.source_sha }}"
          --expected-run-id "${{ github.run_id }}"
          --expected-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          --expected-run-attempt "${{ github.run_attempt }}"
          --expected-repository "${{ github.repository }}"
          --expected-reporter "v1.13.0"

      - name: Verify sealed matrix against durable baseline
        shell: bash
        run: >-
          go run ./cmd/e2e-baseline verify
          --baseline docs/e2e-baseline.json
          --contract release/contract.v1.json
          --proof reports-download/matrix-validation.json
          --output baseline-verification
          --repository-root .
          --phase candidate
          --expected-commit "${{ inputs.source_sha }}"
          --expected-run-id "${{ github.run_id }}"
          --expected-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          --expected-run-attempt "${{ github.run_attempt }}"
          --expected-repository "${{ github.repository }}"

      - name: Download current-attempt native proofs
        if: needs.resolve.outputs.release_candidate == 'true' && inputs.event_name == 'push'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: env-vault-promotion-platform-*-attempt-${{ github.run_attempt }}
          path: promotion-evidence
          merge-multiple: true

      - name: Seal observed source-quality results
        if: needs.resolve.outputs.release_candidate == 'true' && inputs.event_name == 'push'
        shell: bash
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
          VERSION: ${{ needs.resolve.outputs.version }}
          SOURCE_QUALITY_RESULT: ${{ needs.source-quality.result }}
          LICENSE_RESULT: ${{ needs.license.result }}
        run: |
          set -euo pipefail
          mkdir -p promotion
          jq -n \
            --arg source_sha "$SOURCE_SHA" \
            --arg release_version "$VERSION" \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg run_attempt "$GITHUB_RUN_ATTEMPT" \
            --arg source_quality "$SOURCE_QUALITY_RESULT" \
            --arg license_matrix "$LICENSE_RESULT" \
            '{
              schema_id: "env-vault.source-quality-proof.v1",
              schema_version: 1,
              source_sha: $source_sha,
              release_version: $release_version,
              repository: $repository,
              workflow: {
                id: "ci",
                name: "ci",
                file: "ci.yml",
                run_id: ($run_id | tonumber),
                run_attempt: ($run_attempt | tonumber),
                event: "push",
                head_sha: $source_sha
              },
              observed_jobs: {
                source_quality: $source_quality,
                license_matrix: $license_matrix
              }
            }' > promotion/source-quality-input.json
          go run ./cmd/releasecheck promotion seal-source-quality \
            --input promotion/source-quality-input.json \
            --output promotion/source-quality.json \
            --json

      - name: Assemble exact promotion manifest
        if: needs.resolve.outputs.release_candidate == 'true' && inputs.event_name == 'push'
        shell: bash
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          mapfile -t proofs < <(find promotion-evidence -type f -name '*.json' -print | LC_ALL=C sort)
          [[ ${#proofs[@]} -eq 5 ]] || {
            echo "native proof count=${#proofs[@]}, want 5 from run ${GITHUB_RUN_ID} attempt ${GITHUB_RUN_ATTEMPT}" >&2
            exit 1
          }
          args=()
          for proof in "${proofs[@]}"; do
            args+=(--platform-proof "$proof")
          done
          created_at="$(git show -s --format=%cI "$SOURCE_SHA")"
          go run ./cmd/releasecheck promotion assemble \
            --source-sha "$SOURCE_SHA" \
            --release-version "$VERSION" \
            --repository "$GITHUB_REPOSITORY" \
            --run-id "$GITHUB_RUN_ID" \
            --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --source-quality promotion/source-quality.json \
            --matrix-proof reports-download/matrix-validation.json \
            "${args[@]}" \
            --created-at "$created_at" \
            --output promotion/promotion-manifest.json \
            --json

      - name: Upload exact promotion manifest
        if: needs.resolve.outputs.release_candidate == 'true' && inputs.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: env-vault-promotion-${{ inputs.source_sha }}-attempt-${{ github.run_attempt }}
          path: |
            promotion/promotion-manifest.json
            promotion/source-quality.json
            reports-download/matrix-validation.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload durable baseline verification
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: env-vault-e2e-baseline-verification-attempt-${{ github.run_attempt }}
          path: |
            reports-download/matrix-validation.json
            reports-download/matrix-validation.md
            baseline-verification/baseline-verification.json
            baseline-verification/baseline-verification.md
          if-no-files-found: error
          retention-days: 30
