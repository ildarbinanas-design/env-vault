name: audit-release-app

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: env-vault-release-app-audit
  cancel-in-progress: false

jobs:
  scope:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: "false"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Build the typed release contract and strict GitHub transport once
        shell: bash
        run: |
          set -euo pipefail
          go build -trimpath -o "$RUNNER_TEMP/releasecheck" ./cmd/releasecheck
          go build -trimpath -o "$RUNNER_TEMP/releasetransport" ./cmd/releasetransport
          "$RUNNER_TEMP/releasecheck" --contract release/contract.v2.json --version --json \
            > "$RUNNER_TEMP/releasecheck-version.json"
          "$RUNNER_TEMP/releasecheck" contract operational \
            --contract release/contract.v2.json --json \
            > "$RUNNER_TEMP/release-contract-operational.json"
          {
            printf 'RELEASECHECK=%s\n' "$RUNNER_TEMP/releasecheck"
            printf 'RELEASE_CONTRACT_CHECKER=%s\n' "$RUNNER_TEMP/releasecheck"
            printf 'RELEASE_TRANSPORT_BIN=%s\n' "$RUNNER_TEMP/releasetransport"
            printf 'RELEASE_CONTRACT_VERSION_FILE=%s\n' "$RUNNER_TEMP/releasecheck-version.json"
            printf 'RELEASE_CONTRACT_PROJECTION_FILE=%s\n' "$RUNNER_TEMP/release-contract-operational.json"
          } >> "$GITHUB_ENV"

      - id: app-token
        name: Mint metadata-only installation token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.TAP_APP_CLIENT_ID }}
          private-key: ${{ secrets.TAP_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-metadata: read

      - name: Require a single-repository installation
        env:
          ACTUAL_APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          source scripts/release/lib.sh
          release_require_typed_contract_projection
          expected_slug=$(jq -er '.slug' <<< "$RELEASE_HOMEBREW_APP")
          expected_repository=$RELEASE_HOMEBREW_TAP_REPOSITORY
          [[ "$ACTUAL_APP_SLUG" == "$expected_slug" ]] || {
            echo "unexpected Homebrew release App identity" >&2
            exit 1
          }
          scripts/release/gh-api-read.sh installation-repositories.json \
            --paginate --slurp installation/repositories
          mapfile -t repositories < <(jq -r '.[]?.repositories[]?.full_name' installation-repositories.json)
          if [[ "${#repositories[@]}" != "1" || "${repositories[0]:-}" != "$expected_repository" ]]; then
            echo "release App installation scope must contain only homebrew-tap" >&2
            exit 1
          fi
          {
            printf '## Release App scope audit\n\n'
            printf -- '- Installation contains only `%s`.\n' "$expected_repository"
            printf -- '- Audit token permission: metadata read.\n'
            printf -- '- The token is revoked by the action post-step.\n'
          } >> "$GITHUB_STEP_SUMMARY"
