name: audit-release-app

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: env-vault-release-app-audit
  cancel-in-progress: false

jobs:
  scope:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: "false"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Build the strict GitHub release transport once
        shell: bash
        run: |
          set -euo pipefail
          go build -trimpath -o "$RUNNER_TEMP/releasetransport" ./cmd/releasetransport
          echo "RELEASE_TRANSPORT_BIN=$RUNNER_TEMP/releasetransport" >> "$GITHUB_ENV"

      - id: app-token
        name: Mint metadata-only installation token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.TAP_APP_CLIENT_ID }}
          private-key: ${{ secrets.TAP_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-metadata: read

      - name: Require a single-repository installation
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          scripts/release/gh-api-read.sh installation-repositories.json \
            --paginate --slurp installation/repositories
          mapfile -t repositories < <(jq -r '.[]?.repositories[]?.full_name' installation-repositories.json)
          if [[ "${#repositories[@]}" != "1" || "${repositories[0]:-}" != "ildarbinanas-design/homebrew-tap" ]]; then
            echo "release App installation scope must contain only homebrew-tap" >&2
            exit 1
          fi
          {
            printf '## Release App scope audit\n\n'
            printf -- '- Installation contains only `ildarbinanas-design/homebrew-tap`.\n'
            printf -- '- Audit token permission: metadata read.\n'
            printf -- '- The token is revoked by the action post-step.\n'
          } >> "$GITHUB_STEP_SUMMARY"
