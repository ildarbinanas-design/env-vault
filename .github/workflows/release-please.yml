name: release-please

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed
    branches:
      - main

permissions:
  actions: read
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: env-vault-release
  cancel-in-progress: false
  queue: max

jobs:
  inspect:
    permissions:
      actions: read
      contents: read
    if: >-
      ${{
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.head_repository.full_name == github.repository
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      publish: ${{ steps.classify.outputs.publish }}
      source_sha: ${{ steps.classify.outputs.source_sha }}
      version: ${{ steps.classify.outputs.version }}
      attempt_action: ${{ steps.attempt.outputs.action_code }}
      attempt_reason: ${{ steps.attempt.outputs.reason_code }}
      attempt: ${{ steps.attempt.outputs.attempt }}
    steps:
      - name: Check out the exact completed main commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2
          fetch-tags: true
          persist-credentials: "false"

      - id: classify
        name: Classify the exact completed main commit
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -euo pipefail
          actual_sha="$(git rev-parse HEAD)"
          [[ "$actual_sha" == "$EXPECTED_SHA" ]] || {
            echo "checked out ${actual_sha}, expected ${EXPECTED_SHA}" >&2
            exit 1
          }
          scripts/release/classify-release-commit.sh "$EXPECTED_SHA" >> "$GITHUB_OUTPUT"

      - name: Set up Go for release-attempt inspection
        if: steps.classify.outputs.publish == 'true'
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - id: attempt
        name: Classify the exact completed release-candidate attempt offline
        if: steps.classify.outputs.publish == 'true'
        env:
          CI_RUN_ID: ${{ github.event.workflow_run.id }}
          CI_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          CI_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          EXPECTED_SHA: ${{ steps.classify.outputs.source_sha }}
          GH_TOKEN: ${{ github.token }}
          RELEASECHECK: ${{ runner.temp }}/releasecheck
          SNAPSHOT_DIR: ${{ runner.temp }}/attempt-inspection
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          mkdir -p "$SNAPSHOT_DIR"
          go build -trimpath -o "$RELEASECHECK" ./cmd/releasecheck
          "$RELEASECHECK" --version --json > "$SNAPSHOT_DIR/releasecheck-version.json"
          "$RELEASECHECK" contract operational --json > "$SNAPSHOT_DIR/release-contract-operational.json"
          export RELEASE_CONTRACT_CHECKER="$RELEASECHECK"
          export RELEASE_CONTRACT_VERSION_FILE="$SNAPSHOT_DIR/releasecheck-version.json"
          export RELEASE_CONTRACT_PROJECTION_FILE="$SNAPSHOT_DIR/release-contract-operational.json"
          source scripts/release/lib.sh
          release_require_typed_contract_projection
          [[ "$GITHUB_REPOSITORY" == "$RELEASE_SOURCE_REPOSITORY" ]] || {
            echo "planning repository differs from the typed release contract" >&2
            exit 1
          }
          go build -trimpath -o "$RUNNER_TEMP/releasetransport" ./cmd/releasetransport
          export RELEASE_TRANSPORT_BIN="$RUNNER_TEMP/releasetransport"
          "$RELEASECHECK" validate-contract --json > "$SNAPSHOT_DIR/contract-validation.json"

          scripts/release/releasetransport.sh actions identity \
            --output "$SNAPSHOT_DIR/ci-run-identity.json" \
            --repository "$GITHUB_REPOSITORY" \
            --run-id "$CI_RUN_ID" \
            --run-attempt "$CI_RUN_ATTEMPT" \
            --workflow-path "$RELEASE_CI_WORKFLOW_PATH" \
            --event push \
            --head-sha "$EXPECTED_SHA" \
            --head-ref "$RELEASE_SOURCE_DEFAULT_BRANCH" \
            --conclusion "$CI_CONCLUSION"

          scripts/release/gh-api-read.sh \
            "$SNAPSHOT_DIR/ci-run.json" \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${CI_RUN_ID}"
          scripts/release/gh-api-read.sh \
            "$SNAPSHOT_DIR/ci-artifacts.json" \
            --paginate --slurp \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${CI_RUN_ID}/artifacts?per_page=100"

          jq -e \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg sha "$EXPECTED_SHA" \
            --arg branch "$RELEASE_SOURCE_DEFAULT_BRANCH" \
            --arg workflow_path "$RELEASE_CI_WORKFLOW_PATH" \
            --argjson run_id "$CI_RUN_ID" \
            --argjson attempt "$CI_RUN_ATTEMPT" '
              .id == $run_id and
              .run_attempt == $attempt and
              .repository.full_name == $repository and
              .head_repository.full_name == $repository and
              .head_sha == $sha and
              .head_branch == $branch and
              .event == "push" and
              .path == $workflow_path and
              .status == "completed" and
              (.conclusion | type == "string")
            ' "$SNAPSHOT_DIR/ci-run.json" >/dev/null

          set +e
          "$RELEASECHECK" classify-attempt \
            --run "$SNAPSHOT_DIR/ci-run.json" \
            --artifacts "$SNAPSHOT_DIR/ci-artifacts.json" \
            --json > "$SNAPSHOT_DIR/attempt-classification.json"
          classifier_status=$?
          set -e
          [[ "$classifier_status" == "0" || "$classifier_status" == "4" ]] || {
            echo "offline attempt classifier failed closed with status ${classifier_status}" >&2
            exit 1
          }

          jq -e \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg sha "$EXPECTED_SHA" \
            --arg branch "$RELEASE_SOURCE_DEFAULT_BRANCH" \
            --arg workflow_name "$RELEASE_CI_WORKFLOW_NAME" \
            --arg workflow_path "$RELEASE_CI_WORKFLOW_PATH" \
            --argjson run_id "$CI_RUN_ID" \
            --argjson attempt "$CI_RUN_ATTEMPT" '
              .schema_id == "env-vault.attempt-classification.v1" and
              .schema_version == 1 and
              .run_id == $run_id and
              .attempt == $attempt and
              .source_sha == $sha and
              .repository == $repository and
              .head_repository == $repository and
              .event == "push" and
              .head_branch == $branch and
              .workflow_id == "ci" and
              .workflow_name == $workflow_name and
              .workflow_path == $workflow_path and
              .run_status == "completed" and
              .rerun_failed_jobs_allowed == false and
              (.prohibited_actions | index("rerun_failed_jobs") != null) and
              (
                (.ok == true and .matrix_complete == true and .run_conclusion == "success" and .action_code == "none" and .reason_code == "ATTEMPT_MATRIX_COMPLETE") or
                (.ok == false and .matrix_complete == false and .action_code == "rerun_all_jobs" and .reason_code == "ATTEMPT_MATRIX_INCOMPLETE") or
                (.ok == false and .matrix_complete == true and .run_conclusion != "success" and .action_code == "inspect_failure" and .reason_code == "CI_ATTEMPT_FAILED")
              )
            ' "$SNAPSHOT_DIR/attempt-classification.json" >/dev/null

          {
            printf 'action_code=%s\n' "$(jq -er '.action_code' "$SNAPSHOT_DIR/attempt-classification.json")"
            printf 'reason_code=%s\n' "$(jq -er '.reason_code' "$SNAPSHOT_DIR/attempt-classification.json")"
            printf 'attempt=%s\n' "$CI_RUN_ATTEMPT"
          } >> "$GITHUB_OUTPUT"

      - name: Upload machine-readable attempt classification
        if: always() && !cancelled() && steps.classify.outputs.publish == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: env-vault-attempt-classification-ci-${{ github.event.workflow_run.id }}-attempt-${{ github.event.workflow_run.run_attempt }}-planning-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/attempt-inspection/contract-validation.json
            ${{ runner.temp }}/attempt-inspection/ci-run.json
            ${{ runner.temp }}/attempt-inspection/ci-artifacts.json
            ${{ runner.temp }}/attempt-inspection/attempt-classification.json
          if-no-files-found: error
          retention-days: 30

      - name: Stop planning on a non-promotable release attempt
        if: steps.classify.outputs.publish == 'true' && steps.attempt.outputs.action_code != 'none'
        env:
          ACTION_CODE: ${{ steps.attempt.outputs.action_code }}
          ATTEMPT: ${{ steps.attempt.outputs.attempt }}
          REASON_CODE: ${{ steps.attempt.outputs.reason_code }}
        shell: bash
        run: |
          echo "release candidate attempt ${ATTEMPT}: action=${ACTION_CODE} reason=${REASON_CODE}" >&2
          exit 1

  rerun-incomplete-attempt:
    needs: [inspect]
    if: >-
      ${{
        always() &&
        needs.inspect.outputs.publish == 'true' &&
        needs.inspect.outputs.attempt_action == 'rerun_all_jobs' &&
        needs.inspect.outputs.attempt == '1'
      }}
    permissions:
      actions: write
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the exact release candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.inspect.outputs.source_sha }}
          persist-credentials: "false"

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Reclassify current remote state and rerun the whole attempt
        env:
          CI_RUN_ID: ${{ github.event.workflow_run.id }}
          CI_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          CI_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          EXPECTED_SHA: ${{ needs.inspect.outputs.source_sha }}
          GH_TOKEN: ${{ github.token }}
          RELEASECHECK: ${{ runner.temp }}/releasecheck
          SNAPSHOT_DIR: ${{ runner.temp }}/attempt-rerun
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          mkdir -p "$SNAPSHOT_DIR"
          go build -trimpath -o "$RELEASECHECK" ./cmd/releasecheck
          "$RELEASECHECK" --version --json > "$SNAPSHOT_DIR/releasecheck-version.json"
          "$RELEASECHECK" contract operational --json > "$SNAPSHOT_DIR/release-contract-operational.json"
          export RELEASE_CONTRACT_CHECKER="$RELEASECHECK"
          export RELEASE_CONTRACT_VERSION_FILE="$SNAPSHOT_DIR/releasecheck-version.json"
          export RELEASE_CONTRACT_PROJECTION_FILE="$SNAPSHOT_DIR/release-contract-operational.json"
          source scripts/release/lib.sh
          release_require_typed_contract_projection
          [[ "$GITHUB_REPOSITORY" == "$RELEASE_SOURCE_REPOSITORY" ]] || {
            echo "rerun repository differs from the typed release contract" >&2
            exit 1
          }
          go build -trimpath -o "$RUNNER_TEMP/releasetransport" ./cmd/releasetransport
          export RELEASE_TRANSPORT_BIN="$RUNNER_TEMP/releasetransport"
          scripts/release/gh-api-read.sh \
            "$SNAPSHOT_DIR/main-ref.json" \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/$RELEASE_SOURCE_DEFAULT_BRANCH"
          current_sha="$(jq -er '.object.sha | select(type == "string" and test("^[0-9a-f]{40}$"))' \
            "$SNAPSHOT_DIR/main-ref.json")"
          if [[ "$current_sha" != "$EXPECTED_SHA" ]]; then
            printf 'Skipped stale incomplete attempt for `%s`; current main is `%s`.\n' \
              "$EXPECTED_SHA" "$current_sha" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          scripts/release/gh-api-read.sh \
            "$SNAPSHOT_DIR/ci-run.json" \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${CI_RUN_ID}"
          scripts/release/gh-api-read.sh \
            "$SNAPSHOT_DIR/ci-artifacts.json" \
            --paginate --slurp \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${CI_RUN_ID}/artifacts?per_page=100"
          scripts/release/releasetransport.sh actions identity \
            --output "$SNAPSHOT_DIR/ci-run-identity.json" \
            --repository "$GITHUB_REPOSITORY" \
            --run-id "$CI_RUN_ID" \
            --run-attempt "$CI_RUN_ATTEMPT" \
            --workflow-path "$RELEASE_CI_WORKFLOW_PATH" \
            --event push \
            --head-sha "$EXPECTED_SHA" \
            --head-ref "$RELEASE_SOURCE_DEFAULT_BRANCH" \
            --conclusion "$CI_CONCLUSION"

          set +e
          "$RELEASECHECK" classify-attempt \
            --run "$SNAPSHOT_DIR/ci-run.json" \
            --artifacts "$SNAPSHOT_DIR/ci-artifacts.json" \
            --json > "$SNAPSHOT_DIR/attempt-classification.json"
          classifier_status=$?
          set -e
          [[ "$classifier_status" == "4" ]] || {
            echo "attempt changed before rerun; classifier status=${classifier_status}" >&2
            exit 1
          }
          jq -e \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg sha "$EXPECTED_SHA" \
            --argjson run_id "$CI_RUN_ID" \
            --argjson attempt "$CI_RUN_ATTEMPT" '
              .repository == $repository and
              .head_repository == $repository and
              .source_sha == $sha and
              .run_id == $run_id and
              .attempt == $attempt and
              .action_code == "rerun_all_jobs" and
              .reason_code == "ATTEMPT_MATRIX_INCOMPLETE"
            ' "$SNAPSHOT_DIR/attempt-classification.json" >/dev/null
          scripts/release/gh-api-read.sh \
            "$SNAPSHOT_DIR/main-ref-final.json" \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/$RELEASE_SOURCE_DEFAULT_BRANCH"
          current_sha="$(jq -er '.object.sha | select(type == "string" and test("^[0-9a-f]{40}$"))' \
            "$SNAPSHOT_DIR/main-ref-final.json")"
          [[ "$current_sha" == "$EXPECTED_SHA" ]] || {
            echo "main advanced before the full rerun mutation" >&2
            exit 1
          }
          scripts/release/rerun-classified-attempt.sh \
            "$SNAPSHOT_DIR/attempt-classification.json" "$GITHUB_REPOSITORY"
          printf 'Full rerun requested for run `%s`, incomplete attempt `%s`.\n' \
            "$CI_RUN_ID" "$CI_RUN_ATTEMPT" >> "$GITHUB_STEP_SUMMARY"

  plan:
    needs: [inspect]
    permissions:
      actions: read
      contents: read
      issues: read
      pull-requests: read
    if: >-
      ${{
        needs.inspect.result == 'success' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.head_repository.full_name == github.repository &&
        (needs.inspect.outputs.publish != 'true' || needs.inspect.outputs.attempt_action == 'none')
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: release-planning
    outputs:
      publish: ${{ steps.classify.outputs.publish }}
      source_sha: ${{ steps.classify.outputs.source_sha }}
      version: ${{ steps.classify.outputs.version }}
    steps:
      - name: Check out the exact green main commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2
          fetch-tags: true
          persist-credentials: "false"

      - name: Check out the exact reviewed listener control plane
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.workflow_sha }}
          path: release-control-plane
          persist-credentials: "false"

      - id: classify
        name: Classify the exact green main commit
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
          EXPECTED_PUBLISH: ${{ needs.inspect.outputs.publish }}
          EXPECTED_SOURCE_SHA: ${{ needs.inspect.outputs.source_sha }}
          EXPECTED_VERSION: ${{ needs.inspect.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          actual_sha="$(git rev-parse HEAD)"
          if [[ "$actual_sha" != "$EXPECTED_SHA" ]]; then
            echo "checked out ${actual_sha}, expected ${EXPECTED_SHA}" >&2
            exit 1
          fi
          classification="$(scripts/release/classify-release-commit.sh "$EXPECTED_SHA")"
          actual_publish="$(sed -n 's/^publish=//p' <<< "$classification")"
          actual_source_sha="$(sed -n 's/^source_sha=//p' <<< "$classification")"
          actual_version="$(sed -n 's/^version=//p' <<< "$classification")"
          [[ "$actual_publish" == "$EXPECTED_PUBLISH" &&
             "$actual_source_sha" == "$EXPECTED_SOURCE_SHA" &&
             "$actual_version" == "$EXPECTED_VERSION" ]] || {
            echo "release classification changed between inspection and planning" >&2
            exit 1
          }
          printf '%s\n' "$classification" >> "$GITHUB_OUTPUT"

      - name: Set up Go for release planning
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Build the strict GitHub release transport once
        run: |
          set -euo pipefail
          go build -trimpath -o "$RUNNER_TEMP/releasetransport" ./cmd/releasetransport
          go build -trimpath -o "$RUNNER_TEMP/releasecheck" ./cmd/releasecheck
          echo "RELEASE_TRANSPORT_BIN=$RUNNER_TEMP/releasetransport" >> "$GITHUB_ENV"

      - name: Set up Go for the reviewed listener control plane
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: release-control-plane/go.mod

      - id: release-contract
        name: Route and validate the exact source release contract
        env:
          RELEASECHECK: ${{ runner.temp }}/releasecheck
          CONTROL_RELEASECHECK: ${{ runner.temp }}/releasecheck-control
          SOURCE_SHA: ${{ steps.classify.outputs.source_sha }}
          VERSION: ${{ steps.classify.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          (cd release-control-plane && go build -trimpath -o "$CONTROL_RELEASECHECK" ./cmd/releasecheck)
          "$RELEASECHECK" --version --json > "${RUNNER_TEMP}/source-releasecheck-capabilities.json"
          "$RELEASECHECK" validate-contract --json > "${RUNNER_TEMP}/release-contract-validation.json"
          source_schema="$(jq -er '.release_contract_schema' "${RUNNER_TEMP}/source-releasecheck-capabilities.json")"
          case "$source_schema" in
            env-vault.release-contract.v1) source_contract=release/contract.v1.json; source_generation=v1 ;;
            env-vault.release-contract.v2) source_contract=release/contract.v2.json; source_generation=v2 ;;
            *) echo "unsupported source release contract schema: $source_schema" >&2; exit 1 ;;
          esac
          route_args=(
            contract route-source
            --source-contract "$source_contract"
            --registry release-control-plane/release/contract-history.v2.json
            --repository "$GITHUB_REPOSITORY"
            --source-sha "$SOURCE_SHA"
            --json
          )
          if [[ -n "$VERSION" ]]; then
            route_args+=(--version "$VERSION")
          fi
          "$CONTROL_RELEASECHECK" "${route_args[@]}" > "${RUNNER_TEMP}/source-contract-route.json"
          jq -e --arg generation "$source_generation" \
            --slurpfile capabilities "${RUNNER_TEMP}/source-releasecheck-capabilities.json" '
            .schema_id == "env-vault.release-contract-source-route.v2" and
            .schema_version == 2 and .ok == true and
            .contract_schema_id == $capabilities[0].release_contract_schema and
            .contract_semantic_sha256 == $capabilities[0].semantic_contract_sha256 and
            (.contract_file_sha256 | test("^[0-9a-f]{64}$")) and
            .contract_generation == $generation and
            (.evidence_format == "v1" or .evidence_format == "v2") and
            (
              (.contract_generation == "v1" and .historical != null and .operational == null) or
              (.contract_generation == "v2" and .historical == null and
                .contract_file_sha256 == $capabilities[0].contract_file_sha256 and
                .operational.schema_id == "env-vault.release-contract-operational.v2" and
                .operational.contract_semantic_sha256 == .contract_semantic_sha256 and
                .operational.contract_file_sha256 == .contract_file_sha256)
            )
          ' "${RUNNER_TEMP}/source-contract-route.json" >/dev/null
          if [[ "$source_generation" == v2 ]]; then
            "$RELEASECHECK" contract operational --contract "$source_contract" --json \
              > "${RUNNER_TEMP}/source-contract-operational.json"
            jq -e --slurpfile generated "${RUNNER_TEMP}/source-contract-operational.json" \
              '.operational == $generated[0]' \
              "${RUNNER_TEMP}/source-contract-route.json" >/dev/null
            release_please_target_branch="$(jq -er '.operational.version.release_please.target_branch' "${RUNNER_TEMP}/source-contract-route.json")"
            release_please_config_path="$(jq -er '.operational.version.release_please.config_path' "${RUNNER_TEMP}/source-contract-route.json")"
            release_please_manifest_path="$(jq -er '.operational.version.release_please.manifest_path' "${RUNNER_TEMP}/source-contract-route.json")"
            {
              printf 'RELEASE_CONTRACT_CHECKER=%s\n' "$RELEASECHECK"
              printf 'RELEASE_CONTRACT_VERSION_FILE=%s\n' "${RUNNER_TEMP}/source-releasecheck-capabilities.json"
              printf 'RELEASE_CONTRACT_PROJECTION_FILE=%s\n' "${RUNNER_TEMP}/source-contract-operational.json"
            } >> "$GITHUB_ENV"
          else
            # Closed v1 compatibility is release-only; these immutable files
            # predate the v2 operational projection.
            release_please_target_branch=main
            release_please_config_path=release-please-config.json
            release_please_manifest_path=.release-please-manifest.json
          fi

          "$RELEASECHECK" recovery validate-config \
            --contract "$source_contract" \
            --config "$release_please_config_path" \
            --manifest "$release_please_manifest_path" \
            --json > "${RUNNER_TEMP}/release-please-recovery-check.json"

          release_app_slug="$(jq -er '.release_app_slug |
            select(type == "string" and test("^[a-z0-9][a-z0-9-]*$"))
          ' "${RUNNER_TEMP}/source-contract-route.json")"
          release_repository_name="$(jq -er '.repository.full_name |
            split("/") | select(length == 2) | .[1] |
            select(type == "string" and test("^[A-Za-z0-9._-]+$"))
          ' "${RUNNER_TEMP}/source-contract-route.json")"
          platform_artifact_template="$(jq -er '.naming.platform_artifact_template |
            select(type == "string" and test("^[a-z0-9{}._-]+$"))
          ' "${RUNNER_TEMP}/source-contract-route.json")"
          promotion_manifest_template="$(jq -er '.naming.promotion_manifest_template |
            select(type == "string" and test("^[a-z0-9{}._-]+$"))
          ' "${RUNNER_TEMP}/source-contract-route.json")"
          source_default_branch="$(jq -er '.repository.default_branch |
            select(type == "string" and test("^[A-Za-z0-9][A-Za-z0-9._/-]*$"))
          ' "${RUNNER_TEMP}/source-contract-route.json")"
          ci_workflow_file="$(jq -er '[.workflows[] | select(.id == "ci")] |
            select(length == 1) | .[0].file |
            select(type == "string" and test("^[A-Za-z0-9][A-Za-z0-9_.-]*\\.yml$"))
          ' "$source_contract")"
          ci_workflow_name="$(jq -er '[.workflows[] | select(.id == "ci")] |
            select(length == 1) | .[0].name |
            select(type == "string" and length > 0 and length <= 128)
          ' "$source_contract")"

          {
            printf 'release_app_slug=%s\n' "$release_app_slug"
            printf 'release_repository_name=%s\n' "$release_repository_name"
            printf 'platform_artifact_template=%s\n' "$platform_artifact_template"
            printf 'promotion_manifest_template=%s\n' "$promotion_manifest_template"
            printf 'release_please_target_branch=%s\n' "$release_please_target_branch"
            printf 'release_please_config_path=%s\n' "$release_please_config_path"
            printf 'release_please_manifest_path=%s\n' "$release_please_manifest_path"
            printf 'source_default_branch=%s\n' "$source_default_branch"
            printf 'ci_workflow_file=%s\n' "$ci_workflow_file"
            printf 'ci_workflow_name=%s\n' "$ci_workflow_name"
            printf 'ci_workflow_path=.github/workflows/%s\n' "$ci_workflow_file"
          } >> "$GITHUB_OUTPUT"

      - id: current
        name: Require the planning commit to remain current
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
          GH_TOKEN: ${{ github.token }}
          SOURCE_DEFAULT_BRANCH: ${{ steps.release-contract.outputs.source_default_branch }}
        shell: bash
        run: |
          set -euo pipefail
          scripts/release/gh-api-read.sh \
            "$RUNNER_TEMP/main-ref.json" \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/${SOURCE_DEFAULT_BRANCH}"
          current_sha="$(jq -er '.object.sha | select(type == "string" and test("^[0-9a-f]{40}$"))' \
            "$RUNNER_TEMP/main-ref.json")"
          if [[ "$current_sha" == "$EXPECTED_SHA" ]]; then
            echo 'current=true' >> "$GITHUB_OUTPUT"
          else
            echo 'current=false' >> "$GITHUB_OUTPUT"
            echo "skipping stale planning run for ${EXPECTED_SHA}; current ${SOURCE_DEFAULT_BRANCH} is ${current_sha}"
          fi

      - id: attempt
        name: Snapshot and classify the exact triggering CI attempt
        if: steps.classify.outputs.publish == 'true'
        env:
          CI_RUN_ID: ${{ github.event.workflow_run.id }}
          CI_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          EXPECTED_SHA: ${{ steps.classify.outputs.source_sha }}
          GH_TOKEN: ${{ github.token }}
          CI_WORKFLOW_NAME: ${{ steps.release-contract.outputs.ci_workflow_name }}
          CI_WORKFLOW_PATH: ${{ steps.release-contract.outputs.ci_workflow_path }}
          PLATFORM_ARTIFACT_TEMPLATE: ${{ steps.release-contract.outputs.platform_artifact_template }}
          PROMOTION_MANIFEST_TEMPLATE: ${{ steps.release-contract.outputs.promotion_manifest_template }}
          RELEASECHECK: ${{ runner.temp }}/releasecheck
          SNAPSHOT_DIR: ${{ runner.temp }}/pretag
          SOURCE_DEFAULT_BRANCH: ${{ steps.release-contract.outputs.source_default_branch }}
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          mkdir -p "$SNAPSHOT_DIR"

          scripts/release/gh-api-read.sh \
            "$SNAPSHOT_DIR/ci-run.json" \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${CI_RUN_ID}"
          scripts/release/gh-api-read.sh \
            "$SNAPSHOT_DIR/ci-artifacts.json" \
            --paginate --slurp \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${CI_RUN_ID}/artifacts?per_page=100"

          scripts/release/releasetransport.sh actions identity \
            --output "$SNAPSHOT_DIR/ci-run-identity.json" \
            --repository "$GITHUB_REPOSITORY" \
            --run-id "$CI_RUN_ID" \
            --run-attempt "$CI_RUN_ATTEMPT" \
            --workflow-path "$CI_WORKFLOW_PATH" \
            --event push \
            --head-sha "$EXPECTED_SHA" \
            --head-ref "$SOURCE_DEFAULT_BRANCH"

          jq -e \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg sha "$EXPECTED_SHA" \
            --arg branch "$SOURCE_DEFAULT_BRANCH" \
            --arg workflow_path "$CI_WORKFLOW_PATH" \
            --argjson run_id "$CI_RUN_ID" \
            --argjson attempt "$CI_RUN_ATTEMPT" '
              .id == $run_id and
              .run_attempt == $attempt and
              .repository.full_name == $repository and
              .head_repository.full_name == $repository and
              .head_sha == $sha and
              .head_branch == $branch and
              .event == "push" and
              .status == "completed" and
              .conclusion == "success" and
              .path == $workflow_path
            ' "$SNAPSHOT_DIR/ci-run.json" >/dev/null

          "$RELEASECHECK" classify-attempt \
            --run "$SNAPSHOT_DIR/ci-run.json" \
            --artifacts "$SNAPSHOT_DIR/ci-artifacts.json" \
            --json > "$SNAPSHOT_DIR/attempt-classification.json"

          jq -e \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg sha "$EXPECTED_SHA" \
            --arg branch "$SOURCE_DEFAULT_BRANCH" \
            --arg workflow_name "$CI_WORKFLOW_NAME" \
            --arg workflow_path "$CI_WORKFLOW_PATH" \
            --argjson run_id "$CI_RUN_ID" \
            --argjson attempt "$CI_RUN_ATTEMPT" '
              .schema_id == "env-vault.attempt-classification.v1" and
              .schema_version == 1 and
              .ok == true and
              .run_id == $run_id and
              .attempt == $attempt and
              .source_sha == $sha and
              .repository == $repository and
              .head_repository == $repository and
              .event == "push" and
              .head_branch == $branch and
              .workflow_id == "ci" and
              .workflow_name == $workflow_name and
              .workflow_path == $workflow_path and
              .run_status == "completed" and
              .run_conclusion == "success" and
              .matrix_complete == true and
              .action_code == "none" and
              .reason_code == "ATTEMPT_MATRIX_COMPLETE" and
              .rerun_failed_jobs_allowed == false and
              (.expected_targets | length) == 5 and
              (.observed_targets | length) == 5 and
              (.missing_targets | length) == 0 and
              (.expected_artifacts | length) == 10 and
              (.observed_artifacts | length) == 10 and
              (.missing_artifacts | length) == 0
            ' "$SNAPSHOT_DIR/attempt-classification.json" >/dev/null

          platform_pattern="$(jq -nr \
            --arg template "$PLATFORM_ARTIFACT_TEMPLATE" \
            --arg attempt "$CI_RUN_ATTEMPT" '
              $template |
              gsub("\\{platform\\}"; "*") |
              gsub("\\{attempt\\}"; $attempt) |
              select(test("^[a-z0-9*._-]+$"))
            ')"
          promotion_name="$(jq -nr \
            --arg template "$PROMOTION_MANIFEST_TEMPLATE" \
            --arg source_sha "$EXPECTED_SHA" \
            --arg attempt "$CI_RUN_ATTEMPT" '
              $template |
              gsub("\\{source_sha\\}"; $source_sha) |
              gsub("\\{attempt\\}"; $attempt) |
              select(test("^[a-z0-9._-]+$"))
            ')"

          promotion_artifact_id="$(jq -L scripts/release -er \
            --arg name "$promotion_name" \
            --arg sha "$EXPECTED_SHA" \
            --argjson run_id "$CI_RUN_ID" '
              include "artifact-pages";
              env_vault_exact_artifact($name; $run_id; $sha) | .id |
              select(type == "number" and . > 0 and floor == .)
            ' "$SNAPSHOT_DIR/ci-artifacts.json")"

          jq -L scripts/release -S '
            include "artifact-pages";
            env_vault_artifacts | map({id, name, expired, workflow_run}) | sort_by(.id)
          ' \
            "$SNAPSHOT_DIR/ci-artifacts.json" > "$SNAPSHOT_DIR/artifact-identities.json"
          jq -S '{id, run_attempt, status, conclusion, head_sha, head_branch, event, path, repository: .repository.full_name, head_repository: .head_repository.full_name}' \
            "$SNAPSHOT_DIR/ci-run.json" > "$SNAPSHOT_DIR/run-identity.json"

          {
            printf 'platform_pattern=%s\n' "$platform_pattern"
            printf 'promotion_name=%s\n' "$promotion_name"
            printf 'promotion_artifact_id=%s\n' "$promotion_artifact_id"
          } >> "$GITHUB_OUTPUT"

      - name: Download the exact promotion manifest artifact
        if: steps.classify.outputs.publish == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ steps.attempt.outputs.promotion_name }}
          path: ${{ runner.temp }}/pretag/promotion
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download all five exact-attempt native release artifacts
        if: steps.classify.outputs.publish == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ${{ steps.attempt.outputs.platform_pattern }}
          path: ${{ runner.temp }}/pretag/assets
          merge-multiple: true
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Verify exact manifest and ten packaged assets offline
        if: steps.classify.outputs.publish == 'true'
        env:
          CI_RUN_ID: ${{ github.event.workflow_run.id }}
          CI_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          SOURCE_SHA: ${{ steps.classify.outputs.source_sha }}
          VERSION: ${{ steps.classify.outputs.version }}
          RELEASECHECK: ${{ runner.temp }}/releasecheck
          SNAPSHOT_DIR: ${{ runner.temp }}/pretag
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t manifests < <(find "$SNAPSHOT_DIR/promotion" -type f -name promotion-manifest.json -print | LC_ALL=C sort)
          [[ ${#manifests[@]} -eq 1 ]] || {
            echo "promotion manifest file count=${#manifests[@]}, want 1" >&2
            exit 1
          }

          "$RELEASECHECK" promotion verify \
            --source-sha "$SOURCE_SHA" \
            --release-version "$VERSION" \
            --repository "$GITHUB_REPOSITORY" \
            --run-id "$CI_RUN_ID" \
            --run-attempt "$CI_RUN_ATTEMPT" \
            --manifest "${manifests[0]}" \
            --artifacts-root "$SNAPSHOT_DIR/assets" \
            --json > "$SNAPSHOT_DIR/promotion-verification.json"

          jq -e \
            --arg sha "$SOURCE_SHA" \
            --arg version "$VERSION" \
            --arg repository "$GITHUB_REPOSITORY" \
            --argjson run_id "$CI_RUN_ID" \
            --argjson attempt "$CI_RUN_ATTEMPT" '
              .ok == true and
              .source_sha == $sha and
              .release_version == $version and
              .repository == $repository and
              .run_id == $run_id and
              .run_attempt == $attempt and
              .result == "pass"
            ' "$SNAPSHOT_DIR/promotion-verification.json" >/dev/null

      - id: release-token
        name: Mint repository-scoped release planning token
        if: steps.classify.outputs.publish == 'true' || steps.current.outputs.current == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ steps.release-contract.outputs.release_repository_name }}
          permission-administration: read
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Require the exact release planning App identity
        if: steps.classify.outputs.publish == 'true' || steps.current.outputs.current == 'true'
        env:
          ACTUAL_APP_SLUG: ${{ steps.release-token.outputs.app-slug }}
          EXPECTED_APP_SLUG: ${{ steps.release-contract.outputs.release_app_slug }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$ACTUAL_APP_SLUG" != "$EXPECTED_APP_SLUG" ]]; then
            echo "unexpected release planning App identity" >&2
            exit 1
          fi

      - name: Verify repository release settings and bypass policy
        if: steps.classify.outputs.publish == 'true' || steps.current.outputs.current == 'true'
        env:
          GH_TOKEN: ${{ steps.release-token.outputs.token }}
          RELEASECHECK: ${{ runner.temp }}/releasecheck
          RELEASE_SETTINGS_PROOF_OUTPUT: ${{ steps.classify.outputs.publish == 'true' && format('{0}/repository-release-settings-proof.json', runner.temp) || '' }}
          RELEASE_SETTINGS_SOURCE_SHA: ${{ steps.classify.outputs.source_sha }}
          RELEASE_SETTINGS_VERSION: ${{ steps.classify.outputs.version }}
          RELEASE_SETTINGS_PLANNING_RUN_ID: ${{ github.run_id }}
          RELEASE_SETTINGS_PLANNING_RUN_ATTEMPT: ${{ github.run_attempt }}
        shell: bash
        run: scripts/release/verify-repository-release-settings.sh

      - name: Upload exact pre-tag repository settings proof
        if: steps.classify.outputs.publish == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: env-vault-release-settings-${{ steps.classify.outputs.source_sha }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/repository-release-settings-proof.json
          if-no-files-found: error
          retention-days: 90

      - name: Ensure release lifecycle labels
        if: steps.classify.outputs.publish == 'true' || steps.current.outputs.current == 'true'
        env:
          GH_TOKEN: ${{ steps.release-token.outputs.token }}
        shell: bash
        run: scripts/release/ensure-release-labels.sh

      - id: authorize
        name: Verify generated release pull request authorization
        if: steps.classify.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_APP_SLUG: ${{ steps.release-token.outputs.app-slug }}
          SOURCE_SHA: ${{ steps.classify.outputs.source_sha }}
          VERSION: ${{ steps.classify.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          pr_number="$(scripts/release/verify-release-authorization.sh "$VERSION" "$SOURCE_SHA" prepublish)"
          echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"

      - id: release-please
        name: Create or update the reviewed release pull request
        if: steps.classify.outputs.publish != 'true' && steps.current.outputs.current == 'true'
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.release-token.outputs.token }}
          target-branch: ${{ steps.release-contract.outputs.release_please_target_branch }}
          config-file: ${{ steps.release-contract.outputs.release_please_config_path }}
          manifest-file: ${{ steps.release-contract.outputs.release_please_manifest_path }}
          skip-github-release: true

      - name: Verify the proposal is based on a green main commit
        if: steps.classify.outputs.publish != 'true' && steps.current.outputs.current == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_APP_SLUG: ${{ steps.release-token.outputs.app-slug }}
        shell: bash
        run: scripts/release/verify-release-proposal.sh

      - name: Recheck the exact CI attempt immediately before tag creation
        if: steps.classify.outputs.publish == 'true'
        env:
          CI_RUN_ID: ${{ github.event.workflow_run.id }}
          CI_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          EXPECTED_SHA: ${{ steps.classify.outputs.source_sha }}
          GH_TOKEN: ${{ github.token }}
          CI_WORKFLOW_NAME: ${{ steps.release-contract.outputs.ci_workflow_name }}
          CI_WORKFLOW_PATH: ${{ steps.release-contract.outputs.ci_workflow_path }}
          PROMOTION_NAME: ${{ steps.attempt.outputs.promotion_name }}
          PROMOTION_ARTIFACT_ID: ${{ steps.attempt.outputs.promotion_artifact_id }}
          RELEASECHECK: ${{ runner.temp }}/releasecheck
          SNAPSHOT_DIR: ${{ runner.temp }}/pretag
          SOURCE_DEFAULT_BRANCH: ${{ steps.release-contract.outputs.source_default_branch }}
        shell: bash
        run: |
          set -euo pipefail
          scripts/release/gh-api-read.sh \
            "$SNAPSHOT_DIR/ci-run-final.json" \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${CI_RUN_ID}"
          scripts/release/gh-api-read.sh \
            "$SNAPSHOT_DIR/ci-artifacts-final.json" \
            --paginate --slurp \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${CI_RUN_ID}/artifacts?per_page=100"

          scripts/release/releasetransport.sh actions identity \
            --output "$SNAPSHOT_DIR/ci-run-identity-final.json" \
            --repository "$GITHUB_REPOSITORY" \
            --run-id "$CI_RUN_ID" \
            --run-attempt "$CI_RUN_ATTEMPT" \
            --workflow-path "$CI_WORKFLOW_PATH" \
            --event push \
            --head-sha "$EXPECTED_SHA" \
            --head-ref "$SOURCE_DEFAULT_BRANCH"

          "$RELEASECHECK" classify-attempt \
            --run "$SNAPSHOT_DIR/ci-run-final.json" \
            --artifacts "$SNAPSHOT_DIR/ci-artifacts-final.json" \
            --json > "$SNAPSHOT_DIR/attempt-classification-final.json"
          jq -e \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg sha "$EXPECTED_SHA" \
            --arg branch "$SOURCE_DEFAULT_BRANCH" \
            --arg workflow_name "$CI_WORKFLOW_NAME" \
            --arg workflow_path "$CI_WORKFLOW_PATH" \
            --argjson run_id "$CI_RUN_ID" \
            --argjson attempt "$CI_RUN_ATTEMPT" '
              .ok == true and
              .source_sha == $sha and
              .repository == $repository and
              .head_repository == $repository and
              .event == "push" and
              .head_branch == $branch and
              .workflow_name == $workflow_name and
              .workflow_path == $workflow_path and
              .run_id == $run_id and
              .attempt == $attempt and
              .matrix_complete == true and
              .action_code == "none" and
              .reason_code == "ATTEMPT_MATRIX_COMPLETE"
            ' "$SNAPSHOT_DIR/attempt-classification-final.json" >/dev/null

          jq -L scripts/release -e \
            --arg name "$PROMOTION_NAME" \
            --arg sha "$EXPECTED_SHA" \
            --argjson artifact_id "$PROMOTION_ARTIFACT_ID" \
            --argjson run_id "$CI_RUN_ID" '
              include "artifact-pages";
              env_vault_exact_artifact($name; $run_id; $sha) | .id == $artifact_id
            ' "$SNAPSHOT_DIR/ci-artifacts-final.json" >/dev/null

          jq -L scripts/release -S '
            include "artifact-pages";
            env_vault_artifacts | map({id, name, expired, workflow_run}) | sort_by(.id)
          ' \
            "$SNAPSHOT_DIR/ci-artifacts-final.json" > "$SNAPSHOT_DIR/artifact-identities-final.json"
          jq -S '{id, run_attempt, status, conclusion, head_sha, head_branch, event, path, repository: .repository.full_name, head_repository: .head_repository.full_name}' \
            "$SNAPSHOT_DIR/ci-run-final.json" > "$SNAPSHOT_DIR/run-identity-final.json"
          cmp "$SNAPSHOT_DIR/run-identity.json" "$SNAPSHOT_DIR/run-identity-final.json"
          cmp "$SNAPSHOT_DIR/artifact-identities.json" "$SNAPSHOT_DIR/artifact-identities-final.json"

      - name: Create or verify the exact release tag
        if: steps.classify.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ steps.release-token.outputs.token }}
          PR_NUMBER: ${{ steps.authorize.outputs.pr_number }}
          RELEASECHECK: ${{ runner.temp }}/releasecheck
          SNAPSHOT_DIR: ${{ runner.temp }}/pretag
          SOURCE_SHA: ${{ steps.classify.outputs.source_sha }}
          VERSION: ${{ steps.classify.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          scripts/release/verify-abandoned-release-policy.sh \
            "$VERSION" "$SOURCE_SHA" "$SNAPSHOT_DIR/abandoned-release-policy.json"

          set +e
          existing_sha="$(scripts/release/resolve-tag-sha.sh "$VERSION")"
          tag_status=$?
          set -e
          if [[ "$tag_status" == "0" ]]; then
            if [[ "$existing_sha" != "$SOURCE_SHA" ]]; then
              echo "tag ${VERSION} points to ${existing_sha}, expected ${SOURCE_SHA}" >&2
              exit 1
            fi
            echo "tag ${VERSION} already points to the exact green commit; no-op"
          elif [[ "$tag_status" == "4" ]]; then
            gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              --raw-field "ref=refs/tags/${VERSION}" \
              --raw-field "sha=${SOURCE_SHA}" \
              --silent
          else
            echo "failed to resolve existing tag ${VERSION}" >&2
            exit "$tag_status"
          fi

          verified_sha="$(scripts/release/resolve-tag-sha.sh "$VERSION")"
          if [[ "$verified_sha" != "$SOURCE_SHA" ]]; then
            echo "tag ${VERSION} points to ${verified_sha}, expected ${SOURCE_SHA}" >&2
            exit 1
          fi
          # The tag-triggered publisher polls for this exact final state. If a
          # label API call fails, it cannot publish and this step is retryable.
          scripts/release/mark-release-pr-tagged.sh "$PR_NUMBER"

      - name: Upload the exact pre-tag abandoned-release proof
        if: steps.classify.outputs.publish == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: env-vault-abandoned-release-policy-${{ steps.classify.outputs.source_sha }}-planning-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/pretag/abandoned-release-policy.json
          if-no-files-found: error
          retention-days: 90

      - name: Record release planning result
        if: always()
        env:
          PR_CREATED: ${{ steps.release-please.outputs.prs_created }}
          CURRENT: ${{ steps.current.outputs.current }}
          PUBLISH: ${{ steps.classify.outputs.publish }}
          SOURCE_SHA: ${{ steps.classify.outputs.source_sha }}
          VERSION: ${{ steps.classify.outputs.version }}
        shell: bash
        run: |
          {
            printf '## Release planning\n\n'
            printf -- '- Exact green source: `%s`\n' "$SOURCE_SHA"
            printf -- '- Source was current when planning was checked: `%s`\n' "${CURRENT:-false}"
            printf -- '- Release PR created or updated: `%s`\n' "${PR_CREATED:-false}"
            printf -- '- Exact release tag requested: `%s`\n' "${PUBLISH:-false}"
            if [[ "${PUBLISH:-false}" == "true" ]]; then
              printf -- '- Version: `%s`\n' "$VERSION"
            fi
            printf -- '- Public GitHub Release creation remains owned by `build-binaries`.\n'
          } >> "$GITHUB_STEP_SUMMARY"
