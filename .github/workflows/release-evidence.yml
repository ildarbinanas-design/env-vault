name: release-evidence
run-name: env-vault-release-evidence publisher-run=${{ github.event.workflow_run.id }} attempt=${{ github.event.workflow_run.run_attempt }}

on:
  workflow_run:
    workflows:
      - build-binaries
    types:
      - completed

permissions:
  actions: read
  contents: read
  pull-requests: read

concurrency:
  group: env-vault-release
  cancel-in-progress: false
  queue: max

jobs:
  assemble:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_repository.full_name == github.repository &&
        github.event.workflow_run.path == '.github/workflows/build-binaries.yml' &&
        (github.event.workflow_run.event == 'push' || github.event.workflow_run.event == 'workflow_dispatch')
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.identity.outputs.version }}
      source_sha: ${{ steps.identity.outputs.source_sha }}
      format: ${{ steps.identity.outputs.format }}
      contract_generation: ${{ steps.identity.outputs.contract_generation }}
      historical_evidence_commit: ${{ steps.identity.outputs.historical_evidence_commit }}
      historical_evidence_parent: ${{ steps.identity.outputs.historical_evidence_parent }}
      historical_evidence_run_id: ${{ steps.identity.outputs.historical_evidence_run_id }}
      historical_evidence_run_attempt: ${{ steps.identity.outputs.historical_evidence_run_attempt }}
      historical_artifact_id: ${{ steps.identity.outputs.historical_artifact_id }}
      historical_artifact_digest: ${{ steps.identity.outputs.historical_artifact_digest }}
    steps:
      - name: Check out the exact publisher source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2
          persist-credentials: "false"

      - name: Check out the exact reviewed listener control plane
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.workflow_sha }}
          path: release-control-plane
          persist-credentials: "false"

      - name: Set up Go for the exact publisher source
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Build exact source tooling
        env:
          SOURCE_RELEASECHECK: ${{ runner.temp }}/releasecheck-source
        run: |
          set -euo pipefail
          go build -trimpath -o "$SOURCE_RELEASECHECK" ./cmd/releasecheck
          go build -trimpath -o "$RUNNER_TEMP/releasetransport" ./cmd/releasetransport
          {
            printf 'RELEASE_TRANSPORT_BIN=%s\n' "$RUNNER_TEMP/releasetransport"
            printf 'SOURCE_RELEASECHECK=%s\n' "$SOURCE_RELEASECHECK"
          } >> "$GITHUB_ENV"

      - name: Set up Go for the reviewed listener control plane
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: release-control-plane/go.mod

      - id: capabilities
        name: Build reviewed control-plane tooling and route source capabilities
        env:
          SOURCE_RELEASECHECK: ${{ runner.temp }}/releasecheck-source
          CONTROL_RELEASECHECK: ${{ runner.temp }}/releasecheck-control
        run: |
          set -euo pipefail
          (cd release-control-plane && go build -trimpath -o "$CONTROL_RELEASECHECK" ./cmd/releasecheck)
          echo "CONTROL_RELEASECHECK=$CONTROL_RELEASECHECK" >> "$GITHUB_ENV"
          "$SOURCE_RELEASECHECK" --version --json > "$RUNNER_TEMP/source-releasecheck-capabilities.json"
          "$SOURCE_RELEASECHECK" validate-contract --json > "$RUNNER_TEMP/source-contract-validation.json"
          "$CONTROL_RELEASECHECK" --version --contract release-control-plane/release/contract.v2.json --json \
            > "$RUNNER_TEMP/control-releasecheck-capabilities.json"
          "$CONTROL_RELEASECHECK" validate-contract --contract release-control-plane/release/contract.v2.json --json \
            > "$RUNNER_TEMP/control-contract-validation.json"
          source_schema="$(jq -er '.release_contract_schema' "$RUNNER_TEMP/source-releasecheck-capabilities.json")"
          if [[ "$source_schema" == "env-vault.release-contract.v1" ]]; then
            source_contract=release/contract.v1.json
            source_contract_generation=v1
          elif [[ "$source_schema" == "env-vault.release-contract.v2" ]] &&
            jq -e '.supported_schema_versions.release_contract_operational == [2]' \
              "$RUNNER_TEMP/source-releasecheck-capabilities.json" >/dev/null; then
            source_contract=release/contract.v2.json
            source_contract_generation=v2
            "$SOURCE_RELEASECHECK" contract operational --contract "$source_contract" --json \
              > "$RUNNER_TEMP/source-operational-contract.json"
            {
              printf 'RELEASE_CONTRACT_CHECKER=%s\n' "$SOURCE_RELEASECHECK"
              printf 'RELEASE_CONTRACT_VERSION_FILE=%s\n' "$RUNNER_TEMP/source-releasecheck-capabilities.json"
              printf 'RELEASE_CONTRACT_PROJECTION_FILE=%s\n' "$RUNNER_TEMP/source-operational-contract.json"
            } >> "$GITHUB_ENV"
          else
            echo "source release contract generation is unsupported" >&2
            exit 1
          fi
          if jq -e '.supported_schema_versions | type == "object" and
            (has("release_evidence_bundle") | not) and
            (has("release_evidence_genesis") | not)' \
            "$RUNNER_TEMP/source-releasecheck-capabilities.json" >/dev/null; then
            source_evidence_format=v1
          elif jq -e '.supported_schema_versions | type == "object" and
            .release_evidence_bundle == [2] and .release_evidence_genesis == [1]' \
            "$RUNNER_TEMP/source-releasecheck-capabilities.json" >/dev/null; then
            source_evidence_format=v2
          else
            echo "source evidence capabilities are partial or unsupported" >&2
            exit 1
          fi
          [[ "$source_contract_generation" != v2 || "$source_evidence_format" == v2 ]] || {
            echo "operational v2 contract requires compact v2 evidence capabilities" >&2
            exit 1
          }
          echo "SOURCE_CONTRACT_PATH=$source_contract" >> "$GITHUB_ENV"
          echo "SOURCE_CONTRACT_GENERATION=$source_contract_generation" >> "$GITHUB_ENV"
          echo "SOURCE_CAPABILITY_EVIDENCE_FORMAT=$source_evidence_format" >> "$GITHUB_ENV"

      - name: Download the exact publisher-attempt observation
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: env-vault-release-observation-*-attempt-${{ github.event.workflow_run.run_attempt }}
          path: evidence-input
          merge-multiple: true
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - id: identity
        name: Resolve exact CI, release PR, and PR-head CI identities
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLISHER_RUN_ID: ${{ github.event.workflow_run.id }}
          PUBLISHER_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          PUBLISHER_EVENT: ${{ github.event.workflow_run.event }}
          PUBLISHER_SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
          RELEASECHECK: ${{ runner.temp }}/releasecheck-source
        run: |
          set -euo pipefail
          umask 077
          mkdir -p snapshots metrics promotion final
          mapfile -t observations < <(find evidence-input -type f -name release-observation.json -print | LC_ALL=C sort)
          [[ ${#observations[@]} -eq 1 ]] || { echo "release observation count=${#observations[@]}, want 1" >&2; exit 1; }
          observation="${observations[0]}"
          mapfile -t attestation_bundles < <(find evidence-input -type f -name attestation-verifications.json -print | LC_ALL=C sort)
          [[ ${#attestation_bundles[@]} -eq 1 ]] || {
            echo "attestation verification bundle count=${#attestation_bundles[@]}, want 1" >&2
            exit 1
          }
          attestation_bundle="${attestation_bundles[0]}"
          jq -e --arg source "$PUBLISHER_SOURCE_SHA" '
            .schema_id == "env-vault.release-observation.v1" and .schema_version == 1 and
            .source_sha == $source and
            (.release_version | test("^v(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)$"))
          ' "$observation" >/dev/null
          version="$(jq -er '.release_version' "$observation")"
          source_sha="$(jq -er '.source_sha | select(test("^[0-9a-f]{40}$"))' "$observation")"
          "$CONTROL_RELEASECHECK" contract route-source \
            --source-contract "$SOURCE_CONTRACT_PATH" \
            --registry release-control-plane/release/contract-history.v2.json \
            --repository "$GITHUB_REPOSITORY" \
            --version "$version" \
            --source-sha "$source_sha" \
            --json > "$RUNNER_TEMP/source-contract-route.json"
          jq -e --arg version "$version" --arg generation "$SOURCE_CONTRACT_GENERATION" \
            --arg evidence_format "$SOURCE_CAPABILITY_EVIDENCE_FORMAT" \
            --slurpfile capabilities "$RUNNER_TEMP/source-releasecheck-capabilities.json" '
            .schema_id == "env-vault.release-contract-source-route.v2" and
            .schema_version == 2 and .ok == true and
            .contract_schema_id == $capabilities[0].release_contract_schema and
            .contract_semantic_sha256 == $capabilities[0].semantic_contract_sha256 and
            (.contract_file_sha256 | test("^[0-9a-f]{64}$")) and
            .contract_generation == $generation and .evidence_format == $evidence_format and
            (
              (.contract_generation == "v1" and .historical.release_version == $version and .operational == null) or
              (.contract_generation == "v2" and .historical == null and
                .contract_file_sha256 == $capabilities[0].contract_file_sha256 and
                .operational.schema_id == "env-vault.release-contract-operational.v2" and
                .operational.contract_semantic_sha256 == .contract_semantic_sha256 and
                .operational.contract_file_sha256 == .contract_file_sha256)
            )
          ' "$RUNNER_TEMP/source-contract-route.json" >/dev/null
          contract_generation="$(jq -er '.contract_generation | select(. == "v1" or . == "v2")' "$RUNNER_TEMP/source-contract-route.json")"
          evidence_format="$(jq -er '.evidence_format | select(. == "v1" or . == "v2")' "$RUNNER_TEMP/source-contract-route.json")"
          historical_evidence_commit="$(jq -r '.historical.evidence_commit_sha // ""' "$RUNNER_TEMP/source-contract-route.json")"
          historical_evidence_parent="$(jq -r '.historical.evidence_parent_commit_sha // ""' "$RUNNER_TEMP/source-contract-route.json")"
          historical_evidence_run_id="$(jq -r '.historical.evidence_run_id // ""' "$RUNNER_TEMP/source-contract-route.json")"
          historical_evidence_run_attempt="$(jq -r '.historical.evidence_run_attempt // ""' "$RUNNER_TEMP/source-contract-route.json")"
          historical_artifact_id="$(jq -r '.historical.compact_artifact_id // ""' "$RUNNER_TEMP/source-contract-route.json")"
          historical_artifact_digest="$(jq -r '.historical.compact_artifact_digest // ""' "$RUNNER_TEMP/source-contract-route.json")"
          release_app_slug="$(jq -er '.release_app_slug | select(type == "string" and test("^[a-z0-9][a-z0-9-]*$"))' "$RUNNER_TEMP/source-contract-route.json")"
          default_branch="$(jq -er '.repository.default_branch' "$RUNNER_TEMP/source-contract-route.json")"
          product="$(jq -er '.naming.product' "$RUNNER_TEMP/source-contract-route.json")"
          ci_workflow_file="$(jq -er --arg generation "$contract_generation" '
            if $generation == "v2" then [.operational.workflows[] | select(.id == "ci")][0].file
            else empty end
          ' "$RUNNER_TEMP/source-contract-route.json")" || true
          ci_workflow_name="$(jq -er --arg generation "$contract_generation" '
            if $generation == "v2" then [.operational.workflows[] | select(.id == "ci")][0].name
            else empty end
          ' "$RUNNER_TEMP/source-contract-route.json")" || true
          planning_workflow_file="$(jq -er --arg generation "$contract_generation" '
            if $generation == "v2" then [.operational.workflows[] | select(.id == "planning")][0].file
            else empty end
          ' "$RUNNER_TEMP/source-contract-route.json")" || true
          planning_workflow_name="$(jq -er --arg generation "$contract_generation" '
            if $generation == "v2" then [.operational.workflows[] | select(.id == "planning")][0].name
            else empty end
          ' "$RUNNER_TEMP/source-contract-route.json")" || true
          publisher_workflow_file="$(jq -er --arg generation "$contract_generation" '
            if $generation == "v2" then [.operational.workflows[] | select(.id == "publisher")][0].file
            else empty end
          ' "$RUNNER_TEMP/source-contract-route.json")" || true
          evidence_workflow_file="$(jq -er --arg generation "$contract_generation" '
            if $generation == "v2" then [.operational.workflows[] | select(.id == "release_evidence")][0].file
            else empty end
          ' "$RUNNER_TEMP/source-contract-route.json")" || true
          evidence_workflow_name="$(jq -er --arg generation "$contract_generation" '
            if $generation == "v2" then [.operational.workflows[] | select(.id == "release_evidence")][0].name
            else empty end
          ' "$RUNNER_TEMP/source-contract-route.json")" || true
          if [[ "$contract_generation" == "v2" ]]; then
            release_please_branch="$(jq -er '.operational.version.release_please.branch' "$RUNNER_TEMP/source-contract-route.json")"
            release_please_target_branch="$(jq -er '.operational.version.release_please.target_branch' "$RUNNER_TEMP/source-contract-route.json")"
          else
            # The closed v0.0.14-v0.0.16 source tuples use the immutable v1
            # contract generation; their operational identities are archive-bound.
            release_please_branch=release-please--branches--main--components--env-vault
            release_please_target_branch=main
            ci_workflow_file=ci.yml
            ci_workflow_name=ci
            planning_workflow_file=release-please.yml
            planning_workflow_name=release-please
            publisher_workflow_file=build-binaries.yml
            evidence_workflow_file=release-evidence.yml
            evidence_workflow_name=release-evidence
          fi
          [[ "$ci_workflow_file" =~ ^[a-z0-9][a-z0-9-]*\.yml$ && -n "$ci_workflow_name" &&
             "$planning_workflow_file" =~ ^[a-z0-9][a-z0-9-]*\.yml$ && -n "$planning_workflow_name" &&
             "$publisher_workflow_file" =~ ^[a-z0-9][a-z0-9-]*\.yml$ &&
             "$evidence_workflow_file" =~ ^[a-z0-9][a-z0-9-]*\.yml$ && -n "$evidence_workflow_name" ]] || {
            echo "routed workflow identity is malformed" >&2
            exit 1
          }
          release_pr_title="chore(${release_please_target_branch}): release ${product} ${version}"
          ci_workflow_path=".github/workflows/$ci_workflow_file"
          planning_workflow_path=".github/workflows/$planning_workflow_file"
          publisher_workflow_path=".github/workflows/$publisher_workflow_file"
          jq -e '.repository_release_settings' "$observation" > snapshots/repository-release-settings-proof.json
          planning_run_id="$(jq -er '.tuple.planning_run_id | select(type == "number" and . > 0 and floor == .)' snapshots/repository-release-settings-proof.json)"
          planning_attempt="$(jq -er '.tuple.planning_run_attempt | select(type == "number" and . > 0 and floor == .)' snapshots/repository-release-settings-proof.json)"
          settings_checked_at="$(jq -er '.tuple.checked_at | select(type == "string")' snapshots/repository-release-settings-proof.json)"
          "$RELEASECHECK" settings verify \
            --input snapshots/repository-release-settings-proof.json \
            --repository "$GITHUB_REPOSITORY" \
            --source-sha "$source_sha" \
            --release-version "$version" \
            --planning-run-id "$planning_run_id" \
            --planning-run-attempt "$planning_attempt" \
            --checked-at "$settings_checked_at" \
            --json > snapshots/repository-release-settings-verification.json

          scripts/release/gh-api-read.sh snapshots/publisher-run.json \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${PUBLISHER_RUN_ID}"
          jq -e \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg source "$source_sha" \
            --arg version "$version" \
            --argjson run_id "$PUBLISHER_RUN_ID" \
            --argjson attempt "$PUBLISHER_ATTEMPT" \
            --arg publisher_path "$publisher_workflow_path" '
              .id == $run_id and .run_attempt == $attempt and
              .repository.full_name == $repository and .head_repository.full_name == $repository and
              .head_sha == $source and .head_branch == $version and
              (.event == "push" or .event == "workflow_dispatch") and
              .status == "completed" and .conclusion == "success" and
              .path == $publisher_path
            ' snapshots/publisher-run.json >/dev/null || {
              echo "publisher run identity mismatch" >&2
              exit 1
            }
          scripts/release/releasetransport.sh actions identity \
            --output snapshots/publisher-run-identity.json \
            --repository "$GITHUB_REPOSITORY" \
            --run-id "$PUBLISHER_RUN_ID" \
            --run-attempt "$PUBLISHER_ATTEMPT" \
            --workflow-path "$publisher_workflow_path" \
            --event "$PUBLISHER_EVENT" \
            --head-sha "$source_sha" \
            --head-ref "$version"

          scripts/release/gh-api-read.sh snapshots/ci-runs.json \
            --paginate --slurp --method GET \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/$ci_workflow_file/runs" \
            -f "head_sha=$source_sha" -f "branch=$default_branch" -f event=push -f status=completed -F per_page=100
          ci_matches="$(jq -c --arg repository "$GITHUB_REPOSITORY" --arg source "$source_sha" --arg branch "$default_branch" --arg workflow_path "$ci_workflow_path" '
            [.[]?.workflow_runs[]? | select(
              .repository.full_name == $repository and .head_repository.full_name == $repository and
              .head_sha == $source and .head_branch == $branch and .event == "push" and
              .status == "completed" and .conclusion == "success" and
              .path == $workflow_path
            )]
          ' snapshots/ci-runs.json)"
          [[ "$(jq 'length' <<< "$ci_matches")" == "1" ]] || { echo "exact successful main CI run is ambiguous" >&2; exit 1; }
          ci_run_id="$(jq -er '.[0].id' <<< "$ci_matches")"
          ci_attempt="$(jq -er '.[0].run_attempt' <<< "$ci_matches")"
          scripts/release/releasetransport.sh actions identity \
            --output snapshots/ci-run-identity.json \
            --repository "$GITHUB_REPOSITORY" \
            --run-id "$ci_run_id" \
            --run-attempt "$ci_attempt" \
            --workflow-path "$ci_workflow_path" \
            --event push \
            --head-sha "$source_sha" \
            --head-ref "$default_branch"
          scripts/release/gh-api-read.sh snapshots/ci-run.json \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${ci_run_id}"
          scripts/release/gh-api-read.sh snapshots/ci-artifacts.json \
            --paginate --slurp \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${ci_run_id}/artifacts?per_page=100"
          "$RELEASECHECK" classify-attempt \
            --run snapshots/ci-run.json --artifacts snapshots/ci-artifacts.json --json \
            > snapshots/ci-classification.json
          jq -e --arg source "$source_sha" --argjson run_id "$ci_run_id" --argjson attempt "$ci_attempt" '
            .ok == true and .source_sha == $source and .run_id == $run_id and .attempt == $attempt and
            .matrix_complete == true and .action_code == "none" and .reason_code == "ATTEMPT_MATRIX_COMPLETE"
          ' snapshots/ci-classification.json >/dev/null

          export RELEASE_APP_SLUG="$release_app_slug"
          export RELEASE_AUTHORIZATION_OUTPUT="snapshots/release-authorization-checkpoint.json"
          release_pr_number="$(scripts/release/verify-release-authorization.sh "$version" "$source_sha" tagged)"
          scripts/release/gh-api-read.sh snapshots/release-pr.json \
            "repos/${GITHUB_REPOSITORY}/pulls/${release_pr_number}"
          release_pr_head_sha="$(jq -er \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg source "$source_sha" \
            --arg version "$version" \
            --argjson number "$release_pr_number" \
            --arg base "$release_please_target_branch" \
            --arg branch "$release_please_branch" \
            --arg title "$release_pr_title" '
              select(
                .number == $number and .state == "closed" and .merged_at != null and
                .merge_commit_sha == $source and
                .base.ref == $base and .base.repo.full_name == $repository and
                .head.ref == $branch and
                .head.repo.full_name == $repository and
                .title == $title and
                (.head.sha | test("^[0-9a-f]{40}$"))
              ) | .head.sha
            ' snapshots/release-pr.json)"
          jq -e \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg version "$version" \
            --arg source "$source_sha" \
            --arg head "$release_pr_head_sha" \
            --argjson number "$release_pr_number" '
              .repository == $repository and .release_version == $version and .release_source_sha == $source and
              .generated_release_pr.number == $number and .generated_release_pr.head_sha == $head and
              .generated_release_pr.merge_sha == $source and .result == "pass" and
              (.generated_release_pr.merged_at | type == "string") and
              (.confirmation.comment_id | type == "number" and . > 0) and
              (.confirmation.body_sha256 | test("^[0-9a-f]{64}$"))
            ' "$RELEASE_AUTHORIZATION_OUTPUT" >/dev/null
          release_pr_merged_at="$(jq -er '.generated_release_pr.merged_at' "$RELEASE_AUTHORIZATION_OUTPUT")"
          jq -e --arg merged_at "$release_pr_merged_at" '.merged_at == $merged_at' snapshots/release-pr.json >/dev/null
          gh pr checks "$release_pr_number" --repo "$GITHUB_REPOSITORY" \
            --json name,state,workflow,link,bucket,event > snapshots/release-pr-checks.json
          quality_link="$(jq -er --arg workflow "$ci_workflow_name" '
            [.[] | select(
              .workflow == $workflow and .name == "quality-gate" and .state == "SUCCESS" and
              .bucket == "pass" and .event == "pull_request"
            )] | select(length == 1) | .[0].link
          ' snapshots/release-pr-checks.json)"
          prefix="https://github.com/${GITHUB_REPOSITORY}/actions/runs/"
          [[ "$quality_link" == "$prefix"* ]] || { echo "release PR quality-gate URL mismatch" >&2; exit 1; }
          pr_ci_tail="${quality_link#"$prefix"}"
          if [[ "$pr_ci_tail" =~ ^([1-9][0-9]*)/job/([1-9][0-9]*)$ ]]; then
            pr_ci_run_id="${BASH_REMATCH[1]}"
            pr_ci_job_id="${BASH_REMATCH[2]}"
          else
            echo "release PR quality-gate URL shape is malformed" >&2
            exit 1
          fi
          scripts/release/gh-api-read.sh snapshots/pr-ci-run.json \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${pr_ci_run_id}"
          pr_ci_attempt="$(jq -er '.run_attempt | select(type == "number" and . > 0 and floor == .)' snapshots/pr-ci-run.json)"
          scripts/release/releasetransport.sh actions identity \
            --output snapshots/pr-ci-identity.json \
            --repository "$GITHUB_REPOSITORY" \
            --run-id "$pr_ci_run_id" \
            --run-attempt "$pr_ci_attempt" \
            --workflow-path "$ci_workflow_path" \
            --event pull_request \
            --head-sha "$release_pr_head_sha" \
            --head-ref "$release_please_branch" \
            --job-id "$pr_ci_job_id" \
            --job-name quality-gate \
            --job-url "$quality_link"
          jq -e \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg branch "$release_please_branch" \
            --arg workflow_path "$ci_workflow_path" \
            --arg release_pr_head "$release_pr_head_sha" \
            --argjson run_id "$pr_ci_run_id" \
            --argjson attempt "$pr_ci_attempt" '
              .id == $run_id and .repository.full_name == $repository and .head_repository.full_name == $repository and
              .head_sha == $release_pr_head and .head_branch == $branch and
              .event == "pull_request" and .status == "completed" and
              .conclusion == "success" and .path == $workflow_path and
              .run_attempt == $attempt
          ' snapshots/pr-ci-run.json >/dev/null || {
            echo "release PR CI run identity mismatch" >&2
            exit 1
          }
          pr_ci_head_sha="$(jq -er '.head_sha | select(test("^[0-9a-f]{40}$"))' snapshots/pr-ci-run.json)"

          scripts/release/gh-api-read.sh snapshots/planning-run.json \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${planning_run_id}"
          jq -e \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg source "$source_sha" \
            --argjson run_id "$planning_run_id" \
            --argjson attempt "$planning_attempt" \
            --arg branch "$default_branch" \
            --arg workflow_path "$planning_workflow_path" '
              .id == $run_id and .run_attempt == $attempt and
              .repository.full_name == $repository and .head_repository.full_name == $repository and
              .head_sha == $source and .head_branch == $branch and .event == "workflow_run" and
              .status == "completed" and .conclusion == "success" and
              .path == $workflow_path
            ' snapshots/planning-run.json >/dev/null || {
              echo "release planning run identity mismatch" >&2
              exit 1
            }
          scripts/release/releasetransport.sh actions identity \
            --output snapshots/planning-run-identity.json \
            --repository "$GITHUB_REPOSITORY" \
            --run-id "$planning_run_id" \
            --run-attempt "$planning_attempt" \
            --workflow-path "$planning_workflow_path" \
            --event workflow_run \
            --head-sha "$source_sha" \
            --head-ref "$default_branch"

          jq -n \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg version "$version" \
            --arg source "$source_sha" \
            --arg release_pr_head "$release_pr_head_sha" \
            --arg pr_ci_head "$pr_ci_head_sha" \
            --argjson release_pr_number "$release_pr_number" \
            --argjson planning_run_id "$planning_run_id" \
            --argjson planning_attempt "$planning_attempt" \
            --argjson pr_ci_run_id "$pr_ci_run_id" \
            --argjson pr_ci_attempt "$pr_ci_attempt" \
            --argjson evidence_run_id "$GITHUB_RUN_ID" \
            --argjson evidence_attempt "$GITHUB_RUN_ATTEMPT" \
            --arg ci_name "$ci_workflow_name" \
            --arg ci_file "$ci_workflow_file" \
            --arg planning_name "$planning_workflow_name" \
            --arg planning_file "$planning_workflow_file" \
            --arg evidence_name "$evidence_workflow_name" \
            --arg evidence_file "$evidence_workflow_file" \
            --slurpfile checkpoint "$RELEASE_AUTHORIZATION_OUTPUT" '
              {schema_id:"env-vault.release-authorization.v1",schema_version:1,
               repository:$repository,release_version:$version,
               generated_release_pr:$checkpoint[0].generated_release_pr,
               confirmation:$checkpoint[0].confirmation,
               release_source_sha:$source,
               planning_workflow:{id:"planning",name:$planning_name,file:$planning_file,
                 run_id:$planning_run_id,run_attempt:$planning_attempt,head_sha:$source,conclusion:"success"},
               release_pr_ci:{id:"ci",name:$ci_name,file:$ci_file,
                 run_id:$pr_ci_run_id,run_attempt:$pr_ci_attempt,event:"pull_request",
                 head_sha:$pr_ci_head,pull_request_number:$release_pr_number,
                 generated_release_pr_head_sha:$release_pr_head,conclusion:"success"},
               evidence_workflow:{id:"release_evidence",name:$evidence_name,file:$evidence_file,
                 run_id:$evidence_run_id,run_attempt:$evidence_attempt},
               result:"pass"}
            ' > snapshots/release-authorization.json

          cp "$observation" snapshots/release-observation.json
          cp "$attestation_bundle" snapshots/attestation-verifications.json
          {
            printf 'version=%s\n' "$version"
            printf 'source_sha=%s\n' "$source_sha"
            printf 'ci_run_id=%s\n' "$ci_run_id"
            printf 'ci_attempt=%s\n' "$ci_attempt"
            printf 'release_pr_number=%s\n' "$release_pr_number"
            printf 'pr_ci_run_id=%s\n' "$pr_ci_run_id"
            printf 'pr_ci_attempt=%s\n' "$pr_ci_attempt"
            printf 'format=%s\n' "$evidence_format"
            printf 'contract_generation=%s\n' "$contract_generation"
            printf 'historical_evidence_commit=%s\n' "$historical_evidence_commit"
            printf 'historical_evidence_parent=%s\n' "$historical_evidence_parent"
            printf 'historical_evidence_run_id=%s\n' "$historical_evidence_run_id"
            printf 'historical_evidence_run_attempt=%s\n' "$historical_evidence_run_attempt"
            printf 'historical_artifact_id=%s\n' "$historical_artifact_id"
            printf 'historical_artifact_digest=%s\n' "$historical_artifact_digest"
          } >> "$GITHUB_OUTPUT"

      - name: Download the exact promotion manifest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: env-vault-promotion-${{ steps.identity.outputs.source_sha }}-attempt-${{ steps.identity.outputs.ci_attempt }}
          path: promotion
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.identity.outputs.ci_run_id }}

      - name: Compute exact current metrics and before/after comparison
        env:
          GH_TOKEN: ${{ github.token }}
          CI_RUN_ID: ${{ steps.identity.outputs.ci_run_id }}
          CI_ATTEMPT: ${{ steps.identity.outputs.ci_attempt }}
          PR_CI_RUN_ID: ${{ steps.identity.outputs.pr_ci_run_id }}
          PR_CI_ATTEMPT: ${{ steps.identity.outputs.pr_ci_attempt }}
          PUBLISHER_RUN_ID: ${{ github.event.workflow_run.id }}
          PUBLISHER_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          RELEASECHECK: ${{ runner.temp }}/releasecheck-source
        run: |
          set -euo pipefail
          fields='attempt,conclusion,createdAt,databaseId,event,headSha,jobs,startedAt,status,updatedAt,url,workflowName'
          gh run view "$CI_RUN_ID" --attempt "$CI_ATTEMPT" --repo "$GITHUB_REPOSITORY" --json "$fields" > metrics/main-ci-run.json
          gh run view "$PR_CI_RUN_ID" --attempt "$PR_CI_ATTEMPT" --repo "$GITHUB_REPOSITORY" --json "$fields" > metrics/pr-ci-run.json
          gh run view "$PUBLISHER_RUN_ID" --attempt "$PUBLISHER_ATTEMPT" --repo "$GITHUB_REPOSITORY" --json "$fields" > metrics/publisher-run.json
          "$RELEASECHECK" metrics --run-json metrics/main-ci-run.json --output metrics/main-ci.json
          "$RELEASECHECK" metrics --run-json metrics/pr-ci-run.json --output metrics/pr-ci.json
          "$RELEASECHECK" metrics --run-json metrics/publisher-run.json --output metrics/publisher.json
          "$RELEASECHECK" metrics compare \
            --main-ci metrics/main-ci.json \
            --pr-ci metrics/pr-ci.json \
            --publisher metrics/publisher.json \
            --output final/metrics-comparison.json \
            --markdown-output final/metrics-comparison.md

      - name: Assemble and replay durable release evidence offline
        env:
          RELEASECHECK: ${{ runner.temp }}/releasecheck-source
          CONTROL_RELEASECHECK: ${{ runner.temp }}/releasecheck-control
          EVIDENCE_FORMAT: ${{ steps.identity.outputs.format }}
          CONTRACT_GENERATION: ${{ steps.identity.outputs.contract_generation }}
          HISTORICAL_EVIDENCE_COMMIT: ${{ steps.identity.outputs.historical_evidence_commit }}
          HISTORICAL_EVIDENCE_PARENT: ${{ steps.identity.outputs.historical_evidence_parent }}
          HISTORICAL_EVIDENCE_RUN_ID: ${{ steps.identity.outputs.historical_evidence_run_id }}
          HISTORICAL_EVIDENCE_RUN_ATTEMPT: ${{ steps.identity.outputs.historical_evidence_run_attempt }}
          HISTORICAL_ARTIFACT_ID: ${{ steps.identity.outputs.historical_artifact_id }}
          HISTORICAL_ARTIFACT_DIGEST: ${{ steps.identity.outputs.historical_artifact_digest }}
        run: |
          set -euo pipefail
          mapfile -t manifests < <(find promotion -type f -name promotion-manifest.json -print | LC_ALL=C sort)
          [[ ${#manifests[@]} -eq 1 ]] || { echo "promotion manifest count=${#manifests[@]}, want 1" >&2; exit 1; }
          "$RELEASECHECK" evidence assemble \
            --authorization snapshots/release-authorization.json \
            --attestations snapshots/attestation-verifications.json \
            --manifest "${manifests[0]}" \
            --ci-metrics metrics/main-ci.json \
            --publisher-metrics metrics/publisher.json \
            --observation snapshots/release-observation.json \
            --output final/release-evidence.json \
            --markdown-output final/index.md
          "$RELEASECHECK" evidence verify --input final/release-evidence.json
          if [[ "$CONTRACT_GENERATION" == v1 && "$EVIDENCE_FORMAT" == v1 ]]; then
            "$CONTROL_RELEASECHECK" evidence verify-historical \
              --contract release-control-plane/release/history/contract.v1.json \
              --registry release-control-plane/release/contract-history.v2.json \
              --input final/release-evidence.json \
              --evidence-commit "$HISTORICAL_EVIDENCE_COMMIT" \
              --json
          elif [[ "$CONTRACT_GENERATION" == v1 && "$EVIDENCE_FORMAT" == v2 ]]; then
            : # The reviewed checker authorizes this tuple with the compact root below.
          elif [[ "$CONTRACT_GENERATION" == v2 ]]; then
            "$CONTROL_RELEASECHECK" evidence verify \
              --contract release-control-plane/release/contract.v2.json \
              --input final/release-evidence.json --json
          else
            echo "unsupported routed contract generation: $CONTRACT_GENERATION" >&2
            exit 1
          fi
          if [[ "$EVIDENCE_FORMAT" == v2 ]]; then
            "$RELEASECHECK" evidence bundle-create \
              --input final/release-evidence.json \
              --output-dir final/bundle
            "$RELEASECHECK" evidence bundle-verify --bundle-dir final/bundle --json
            if [[ "$CONTRACT_GENERATION" == v1 ]]; then
              "$CONTROL_RELEASECHECK" evidence bundle-verify \
                --historical-contract release-control-plane/release/history/contract.v1.json \
                --registry release-control-plane/release/contract-history.v2.json \
                --historical-evidence-commit "$HISTORICAL_EVIDENCE_COMMIT" \
                --historical-evidence-parent "$HISTORICAL_EVIDENCE_PARENT" \
                --historical-evidence-run-id "$HISTORICAL_EVIDENCE_RUN_ID" \
                --historical-evidence-run-attempt "$HISTORICAL_EVIDENCE_RUN_ATTEMPT" \
                --historical-artifact-id "$HISTORICAL_ARTIFACT_ID" \
                --historical-artifact-digest "$HISTORICAL_ARTIFACT_DIGEST" \
                --bundle-dir final/bundle --json
            else
              "$CONTROL_RELEASECHECK" evidence bundle-verify \
                --contract release-control-plane/release/contract.v2.json \
                --bundle-dir final/bundle --json
            fi
            "$RELEASECHECK" evidence bundle-parity \
              --legacy final/release-evidence.json \
              --bundle-dir final/bundle \
              --output final/parity.json
            "$RELEASECHECK" evidence bundle-measure \
              --legacy final/release-evidence.json \
              --bundle-dir final/bundle \
              --index final/index.md \
              --metrics-json final/metrics-comparison.json \
              --metrics-markdown final/metrics-comparison.md \
              --output final/storage-metrics.json
            "$RELEASECHECK" evidence genesis-create \
              --bundle-dir final/bundle \
              --output final/genesis.v1.json
            "$RELEASECHECK" evidence genesis-verify \
              --input final/genesis.v1.json \
              --bundle-dir final/bundle \
              --json
          elif [[ "$EVIDENCE_FORMAT" != v1 ]]; then
            echo "unsupported routed evidence format: $EVIDENCE_FORMAT" >&2
            exit 1
          fi

      - name: Upload immutable evidence candidate for the write-scoped job
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: env-vault-release-evidence-candidate-${{ steps.identity.outputs.version }}-${{ steps.identity.outputs.source_sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            final
            metrics/main-ci.json
            metrics/pr-ci.json
            metrics/publisher.json
          if-no-files-found: error
          retention-days: 7

  publish:
    if: ${{ always() && !cancelled() && needs.assemble.result == 'success' }}
    needs: [assemble]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: write
    steps:
      - name: Check out the exact publisher source without persisted credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.assemble.outputs.source_sha }}
          persist-credentials: "false"

      - name: Check out the reviewed evidence publisher
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.workflow_sha }}
          path: evidence-tooling
          persist-credentials: "false"

      - name: Set up Go for the exact publisher source
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Build the exact source checker
        env:
          SOURCE_RELEASECHECK: ${{ runner.temp }}/releasecheck-source
        run: |
          set -euo pipefail
          go build -trimpath -o "$SOURCE_RELEASECHECK" ./cmd/releasecheck

      - name: Set up Go for the reviewed evidence publisher
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: evidence-tooling/go.mod

      - name: Build the reviewed checker and strict GitHub release transport once
        working-directory: evidence-tooling
        run: |
          set -euo pipefail
          go build -trimpath -o "$RUNNER_TEMP/releasecheck-reviewed" ./cmd/releasecheck
          go build -trimpath -o "$RUNNER_TEMP/releasetransport" ./cmd/releasetransport
          "$RUNNER_TEMP/releasecheck-reviewed" --version \
            --contract release/contract.v2.json --json > "$RUNNER_TEMP/releasecheck-reviewed-version.json"
          "$RUNNER_TEMP/releasecheck-reviewed" contract operational \
            --contract release/contract.v2.json --json > "$RUNNER_TEMP/release-contract-reviewed-operational.json"
          {
            printf 'RELEASE_TRANSPORT_BIN=%s\n' "$RUNNER_TEMP/releasetransport"
            printf 'RELEASE_CONTRACT_CHECKER=%s\n' "$RUNNER_TEMP/releasecheck-reviewed"
            printf 'RELEASE_CONTRACT_VERSION_FILE=%s\n' "$RUNNER_TEMP/releasecheck-reviewed-version.json"
            printf 'RELEASE_CONTRACT_PROJECTION_FILE=%s\n' "$RUNNER_TEMP/release-contract-reviewed-operational.json"
          } >> "$GITHUB_ENV"

      - name: Download the exact read-scoped evidence candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: env-vault-release-evidence-candidate-${{ needs.assemble.outputs.version }}-${{ needs.assemble.outputs.source_sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: candidate

      - name: Replay the complete candidate before granting it mutation authority
        env:
          SOURCE_RELEASECHECK: ${{ runner.temp }}/releasecheck-source
          REVIEWED_RELEASECHECK: ${{ runner.temp }}/releasecheck-reviewed
          EVIDENCE_FORMAT: ${{ needs.assemble.outputs.format }}
          CONTRACT_GENERATION: ${{ needs.assemble.outputs.contract_generation }}
          HISTORICAL_EVIDENCE_COMMIT: ${{ needs.assemble.outputs.historical_evidence_commit }}
          HISTORICAL_EVIDENCE_PARENT: ${{ needs.assemble.outputs.historical_evidence_parent }}
          HISTORICAL_EVIDENCE_RUN_ID: ${{ needs.assemble.outputs.historical_evidence_run_id }}
          HISTORICAL_EVIDENCE_RUN_ATTEMPT: ${{ needs.assemble.outputs.historical_evidence_run_attempt }}
          HISTORICAL_ARTIFACT_ID: ${{ needs.assemble.outputs.historical_artifact_id }}
          HISTORICAL_ARTIFACT_DIGEST: ${{ needs.assemble.outputs.historical_artifact_digest }}
          VERSION: ${{ needs.assemble.outputs.version }}
          SOURCE_SHA: ${{ needs.assemble.outputs.source_sha }}
        run: |
          set -euo pipefail
          offline_path="$RUNNER_TEMP/no-network-commands"
          mkdir "$offline_path" replay
          offline_check() {
            env -i \
              PATH="$offline_path" \
              TMPDIR="$RUNNER_TEMP" \
              GH_TOKEN=sentinel-gh-must-not-be-read \
              GITHUB_TOKEN=sentinel-github-must-not-be-read \
              AWS_SECRET_ACCESS_KEY=sentinel-cloud-must-not-be-read \
              "$@"
          }
          classify_capabilities() {
            local document=$1
            if jq -e '.supported_schema_versions | type == "object" and
              (has("release_evidence_bundle") | not) and
              (has("release_evidence_genesis") | not)' "$document" >/dev/null; then
              printf 'v1\n'
            elif jq -e '.supported_schema_versions | type == "object" and
              .release_evidence_bundle == [2] and
              .release_evidence_genesis == [1]' "$document" >/dev/null; then
              printf 'v2\n'
            else
              return 1
            fi
          }
          offline_check "$SOURCE_RELEASECHECK" --version --json > "$RUNNER_TEMP/source-releasecheck-capabilities.json"
          offline_check "$SOURCE_RELEASECHECK" validate-contract --json
          offline_check "$REVIEWED_RELEASECHECK" --version \
            --contract evidence-tooling/release/contract.v2.json --json \
            > "$RUNNER_TEMP/reviewed-releasecheck-capabilities.json"
          offline_check "$REVIEWED_RELEASECHECK" validate-contract \
            --contract evidence-tooling/release/contract.v2.json --json
          source_format="$(classify_capabilities "$RUNNER_TEMP/source-releasecheck-capabilities.json")" || {
            echo "source checker evidence capabilities are partial or unsupported" >&2
            exit 1
          }
          reviewed_format="$(classify_capabilities "$RUNNER_TEMP/reviewed-releasecheck-capabilities.json")" || {
            echo "reviewed checker evidence capabilities are partial or unsupported" >&2
            exit 1
          }
          [[ "$source_format" == "$EVIDENCE_FORMAT" ]] || {
            echo "routed evidence format differs from the independently observed source checker" >&2
            exit 1
          }
          [[ "$reviewed_format" == v2 ]] || {
            echo "reviewed listener checker lacks the exact v2/genesis capability" >&2
            exit 1
          }
          offline_check "$SOURCE_RELEASECHECK" evidence verify \
            --input candidate/final/release-evidence.json \
            --markdown-output replay/index.md
          if [[ "$CONTRACT_GENERATION" == v1 && "$EVIDENCE_FORMAT" == v1 ]]; then
            offline_check "$REVIEWED_RELEASECHECK" evidence verify-historical \
              --contract evidence-tooling/release/history/contract.v1.json \
              --registry evidence-tooling/release/contract-history.v2.json \
              --input candidate/final/release-evidence.json \
              --evidence-commit "$HISTORICAL_EVIDENCE_COMMIT" --json
          elif [[ "$CONTRACT_GENERATION" == v1 && "$EVIDENCE_FORMAT" == v2 ]]; then
            : # The reviewed checker authorizes the reconstructed evidence below.
          elif [[ "$CONTRACT_GENERATION" == v2 ]]; then
            offline_check "$REVIEWED_RELEASECHECK" evidence verify \
              --contract evidence-tooling/release/contract.v2.json \
              --input candidate/final/release-evidence.json --json
          else
            echo "unsupported routed contract/evidence pair: $CONTRACT_GENERATION/$EVIDENCE_FORMAT" >&2
            exit 1
          fi
          cmp candidate/final/index.md replay/index.md
          if [[ "$EVIDENCE_FORMAT" == v2 ]]; then
            offline_check "$SOURCE_RELEASECHECK" evidence bundle-verify \
              --bundle-dir candidate/final/bundle --json
            replay_checker="$REVIEWED_RELEASECHECK"
            replay_contract_args=(--contract evidence-tooling/release/contract.v2.json)
            if [[ "$CONTRACT_GENERATION" == v1 ]]; then
              offline_check "$REVIEWED_RELEASECHECK" evidence bundle-verify \
                --historical-contract evidence-tooling/release/history/contract.v1.json \
                --registry evidence-tooling/release/contract-history.v2.json \
                --historical-evidence-commit "$HISTORICAL_EVIDENCE_COMMIT" \
                --historical-evidence-parent "$HISTORICAL_EVIDENCE_PARENT" \
                --historical-evidence-run-id "$HISTORICAL_EVIDENCE_RUN_ID" \
                --historical-evidence-run-attempt "$HISTORICAL_EVIDENCE_RUN_ATTEMPT" \
                --historical-artifact-id "$HISTORICAL_ARTIFACT_ID" \
                --historical-artifact-digest "$HISTORICAL_ARTIFACT_DIGEST" \
                --bundle-dir candidate/final/bundle --json
              replay_checker="$SOURCE_RELEASECHECK"
              replay_contract_args=()
            else
              offline_check "$REVIEWED_RELEASECHECK" evidence bundle-verify \
                --contract evidence-tooling/release/contract.v2.json \
                --bundle-dir candidate/final/bundle --json
            fi
            offline_check "$replay_checker" evidence bundle-create \
              "${replay_contract_args[@]}" \
              --input candidate/final/release-evidence.json \
              --output-dir replay/bundle
            diff -r candidate/final/bundle replay/bundle
            offline_check "$replay_checker" evidence bundle-parity \
              "${replay_contract_args[@]}" \
              --legacy candidate/final/release-evidence.json \
              --bundle-dir candidate/final/bundle \
              --output replay/parity.json
            cmp candidate/final/parity.json replay/parity.json
            offline_check "$replay_checker" evidence bundle-measure \
              "${replay_contract_args[@]}" \
              --legacy candidate/final/release-evidence.json \
              --bundle-dir candidate/final/bundle \
              --index candidate/final/index.md \
              --metrics-json candidate/final/metrics-comparison.json \
              --metrics-markdown candidate/final/metrics-comparison.md \
              --output replay/storage-metrics.json
            cmp candidate/final/storage-metrics.json replay/storage-metrics.json
            offline_check "$replay_checker" evidence genesis-create \
              "${replay_contract_args[@]}" \
              --bundle-dir candidate/final/bundle \
              --output replay/genesis.v1.json
            cmp candidate/final/genesis.v1.json replay/genesis.v1.json
            offline_check "$SOURCE_RELEASECHECK" evidence genesis-verify \
              --input candidate/final/genesis.v1.json \
              --bundle-dir candidate/final/bundle --json
            if [[ "$CONTRACT_GENERATION" == v2 ]]; then
              offline_check "$REVIEWED_RELEASECHECK" evidence genesis-verify \
                --contract evidence-tooling/release/contract.v2.json \
                --input candidate/final/genesis.v1.json \
                --bundle-dir candidate/final/bundle --json
            fi
          elif [[ "$EVIDENCE_FORMAT" != v1 ]]; then
            echo "unsupported routed evidence format: $EVIDENCE_FORMAT" >&2
            exit 1
          fi
          offline_check "$REVIEWED_RELEASECHECK" metrics compare \
            --main-ci candidate/metrics/main-ci.json \
            --pr-ci candidate/metrics/pr-ci.json \
            --publisher candidate/metrics/publisher.json \
            --output replay/metrics-comparison.json \
            --markdown-output replay/metrics-comparison.md
          cmp candidate/final/metrics-comparison.json replay/metrics-comparison.json
          cmp candidate/final/metrics-comparison.md replay/metrics-comparison.md
          jq -e --arg version "$VERSION" --arg source "$SOURCE_SHA" '
            .release_version == $version and .source_sha == $source and .result == "pass"
          ' candidate/final/release-evidence.json >/dev/null

      - id: publish
        name: Publish durable no-clobber evidence branch state
        env:
          GH_TOKEN: ${{ github.token }}
          EVIDENCE_FORMAT: ${{ needs.assemble.outputs.format }}
          EVIDENCE_PUBLISHER_CHECK: ${{ runner.temp }}/releasecheck-reviewed
          SOURCE_RELEASECHECK: ${{ runner.temp }}/releasecheck-source
          CONTRACT_GENERATION: ${{ needs.assemble.outputs.contract_generation }}
          VERSION: ${{ needs.assemble.outputs.version }}
          SOURCE_SHA: ${{ needs.assemble.outputs.source_sha }}
        run: |
          set -euo pipefail
          publisher_check=$EVIDENCE_PUBLISHER_CHECK
          if [[ "$CONTRACT_GENERATION" == v1 ]]; then
            publisher_check=$SOURCE_RELEASECHECK
          elif [[ "$CONTRACT_GENERATION" != v2 ]]; then
            echo "unsupported publisher contract generation: $CONTRACT_GENERATION" >&2
            exit 1
          fi
          if [[ "$EVIDENCE_FORMAT" == v2 ]]; then
            EVIDENCE_PUBLISHER_CHECK="$publisher_check" \
              evidence-tooling/scripts/release/publish-release-evidence.sh --format v2 \
              "$VERSION" \
              "$SOURCE_SHA" \
              "$GITHUB_REPOSITORY" \
              candidate/final/bundle \
              candidate/final/index.md \
              candidate/final/metrics-comparison.json \
              candidate/final/metrics-comparison.md \
              candidate/final/storage-metrics.json \
              candidate/final/parity.json \
              candidate/final/genesis.v1.json \
              >> "$GITHUB_OUTPUT"
          elif [[ "$EVIDENCE_FORMAT" == v1 ]]; then
            EVIDENCE_PUBLISHER_CHECK="$publisher_check" \
              evidence-tooling/scripts/release/publish-release-evidence.sh \
              "$VERSION" \
              "$SOURCE_SHA" \
              "$GITHUB_REPOSITORY" \
              candidate/final/release-evidence.json \
              candidate/final/index.md \
              candidate/final/metrics-comparison.json \
              candidate/final/metrics-comparison.md \
              >> "$GITHUB_OUTPUT"
          else
            echo "unsupported routed evidence format: $EVIDENCE_FORMAT" >&2
            exit 1
          fi

      - name: Report exact immutable evidence coordinates
        env:
          VERSION: ${{ needs.assemble.outputs.version }}
          EVIDENCE_FORMAT: ${{ needs.assemble.outputs.format }}
          EVIDENCE_COMMIT_SHA: ${{ steps.publish.outputs.commit_sha }}
          EVIDENCE_PATH_PREFIX: ${{ steps.publish.outputs.path_prefix }}
          EVIDENCE_REPAIR_MODE: ${{ steps.publish.outputs.repair_mode }}
          OUTPUT_PUBLISHER_RUN_ID: ${{ steps.publish.outputs.publisher_run_id }}
          OUTPUT_PUBLISHER_RUN_ATTEMPT: ${{ steps.publish.outputs.publisher_run_attempt }}
          PUBLISHER_RUN_ID: ${{ github.event.workflow_run.id }}
          PUBLISHER_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
        run: |
          set -euo pipefail
          [[ "$EVIDENCE_COMMIT_SHA" =~ ^[0-9a-f]{40}$ ]] || { echo "invalid evidence commit SHA" >&2; exit 1; }
          expected_prefix="evidence/releases/${VERSION}/publisher-runs/run-${PUBLISHER_RUN_ID}/attempt-${PUBLISHER_RUN_ATTEMPT}"
          [[ "$EVIDENCE_PATH_PREFIX" == "$expected_prefix" &&
             "$OUTPUT_PUBLISHER_RUN_ID" == "$PUBLISHER_RUN_ID" &&
             "$OUTPUT_PUBLISHER_RUN_ATTEMPT" == "$PUBLISHER_RUN_ATTEMPT" ]] || {
            echo "published evidence lineage tuple differs from the triggering publisher attempt" >&2
            exit 1
          }
          case "$EVIDENCE_REPAIR_MODE" in
            none|release-assets|homebrew|health) ;;
            *) echo "published evidence repair mode is invalid" >&2; exit 1 ;;
          esac
          case "$EVIDENCE_FORMAT" in
            v1) evidence_name=release-evidence.json ;;
            v2) evidence_name=release-evidence-bundle.json ;;
            *) echo "published evidence format is invalid" >&2; exit 1 ;;
          esac
          evidence_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/blob/${EVIDENCE_COMMIT_SHA}/${EVIDENCE_PATH_PREFIX}/${evidence_name}"
          index_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/blob/${EVIDENCE_COMMIT_SHA}/${EVIDENCE_PATH_PREFIX}/index.md"
          comparison_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/blob/${EVIDENCE_COMMIT_SHA}/${EVIDENCE_PATH_PREFIX}/metrics-comparison.json"
          {
            printf '## Durable release evidence\n\n'
            printf -- '- Evidence commit: `%s`\n' "$EVIDENCE_COMMIT_SHA"
            printf -- '- Publisher run / attempt / repair: `%s` / `%s` / `%s`\n' "$PUBLISHER_RUN_ID" "$PUBLISHER_RUN_ATTEMPT" "$EVIDENCE_REPAIR_MODE"
            printf -- '- Format: `%s`\n' "$EVIDENCE_FORMAT"
            printf -- '- [Machine evidence root](%s)\n' "$evidence_url"
            printf -- '- [Markdown index](%s)\n' "$index_url"
            printf -- '- [Machine metrics comparison](%s)\n' "$comparison_url"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload replayable release evidence artifact
        if: ${{ needs.assemble.outputs.format == 'v1' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: env-vault-release-evidence-${{ needs.assemble.outputs.version }}-${{ steps.publish.outputs.commit_sha }}-publisher-${{ github.event.workflow_run.id }}-attempt-${{ github.event.workflow_run.run_attempt }}-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            candidate/final/release-evidence.json
            candidate/final/index.md
            candidate/final/metrics-comparison.json
            candidate/final/metrics-comparison.md
          if-no-files-found: error
          retention-days: 90

      - name: Upload compact replayable release evidence artifact
        if: ${{ needs.assemble.outputs.format == 'v2' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: env-vault-release-evidence-v2-${{ needs.assemble.outputs.version }}-${{ steps.publish.outputs.commit_sha }}-publisher-${{ github.event.workflow_run.id }}-attempt-${{ github.event.workflow_run.run_attempt }}-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            candidate/final/bundle
            candidate/final/index.md
            candidate/final/metrics-comparison.json
            candidate/final/metrics-comparison.md
            candidate/final/storage-metrics.json
            candidate/final/parity.json
          if-no-files-found: error
          retention-days: 90
