name: ci

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event_name == 'workflow_dispatch' && format('manual-{0}', github.run_id) || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    uses: ./.github/workflows/reusable-quality.yml
    permissions:
      contents: read
      actions: read
    with:
      source_sha: ${{ github.sha }}
      version: auto
      event_name: ${{ github.event_name }}
      pull_request_head_ref: ${{ github.event.pull_request.head.ref || '' }}
      pull_request_head_sha: ${{ github.event.pull_request.head.sha || '' }}

  quality-gate:
    if: always()
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - name: Require every reusable quality job
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
        run: |
          if [[ "$QUALITY_RESULT" != "success" ]]; then
            echo "reusable quality workflow result: $QUALITY_RESULT" >&2
            exit 1
          fi
          echo "all reusable quality jobs passed"
