name: publish-homebrew-bridge
run-name: env-vault-homebrew-bridge version=${{ inputs.version }} source=${{ inputs.source_sha }} failed-publisher=${{ inputs.failed_publisher_run_id }}/${{ inputs.failed_publisher_run_attempt }}

on:
  workflow_dispatch:
    inputs:
      control_sha:
        description: "Exact reviewed protected-main commit that executes this bridge."
        required: true
        type: string
      control_ci_run_id:
        description: "Exact successful main CI run ID for control_sha."
        required: true
        type: string
      control_ci_run_attempt:
        description: "Exact successful main CI run attempt for control_sha."
        required: true
        type: string
      version:
        description: "Exact existing immutable vX.Y.Z tag."
        required: true
        type: string
      source_sha:
        description: "Exact 40-character commit targeted by the immutable tag."
        required: true
        type: string
      source_ci_run_id:
        description: "Exact successful source CI run ID."
        required: true
        type: string
      source_ci_run_attempt:
        description: "Exact successful source CI run attempt."
        required: true
        type: string
      release_id:
        description: "Exact stable ten-asset GitHub Release ID."
        required: true
        type: string
      bootstrap_control_sha:
        description: "Exact protected-main SHA used by the successful asset bootstrap."
        required: true
        type: string
      bootstrap_run_id:
        description: "Exact successful protected-main bootstrap run ID."
        required: true
        type: string
      bootstrap_run_attempt:
        description: "Exact successful protected-main bootstrap run attempt."
        required: true
        type: string
      bootstrap_job_id:
        description: "Exact successful bootstrap job ID."
        required: true
        type: string
      bootstrap_result_artifact_id:
        description: "Exact versioned bootstrap result artifact ID."
        required: true
        type: string
      bootstrap_result_artifact_sha256:
        description: "Exact sha256: digest reported for the bootstrap result artifact."
        required: true
        type: string
      failed_publisher_run_id:
        description: "Exact failed release-assets repair publisher run ID."
        required: true
        type: string
      failed_publisher_run_attempt:
        description: "Exact failed release-assets repair publisher run attempt."
        required: true
        type: string
      metadata_job_id:
        description: "Exact successful metadata job ID in the failed publisher."
        required: true
        type: string
      promotion_job_id:
        description: "Exact successful promotion job ID in the failed publisher."
        required: true
        type: string
      preflight_job_id:
        description: "Exact successful preflight job ID in the failed publisher."
        required: true
        type: string
      release_job_id:
        description: "Exact successful release job ID in the failed publisher."
        required: true
        type: string
      supply_chain_job_id:
        description: "Exact successful supply-chain job ID in the failed publisher."
        required: true
        type: string
      failed_homebrew_job_id:
        description: "Exact failed pre-mutation Homebrew job ID in the failed publisher."
        required: true
        type: string
      health_job_id:
        description: "Exact skipped health job ID in the failed publisher."
        required: true
        type: string

permissions:
  actions: read
  attestations: read
  contents: read

concurrency:
  group: env-vault-release
  cancel-in-progress: false
  queue: max

jobs:
  homebrew_bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    environment: release
    permissions:
      actions: read
      attestations: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: "false"

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Build reviewed release tooling once
        run: |
          set -euo pipefail
          go build -trimpath -o "$RUNNER_TEMP/releasecheck" ./cmd/releasecheck
          go build -trimpath -o "$RUNNER_TEMP/releasetransport" ./cmd/releasetransport
          "$RUNNER_TEMP/releasecheck" --contract release/contract.v2.json --version --json \
            > "$RUNNER_TEMP/releasecheck-version.json"
          "$RUNNER_TEMP/releasecheck" contract operational \
            --contract release/contract.v2.json --json \
            > "$RUNNER_TEMP/release-contract-operational.json"
          {
            printf 'RELEASECHECK=%s\n' "$RUNNER_TEMP/releasecheck"
            printf 'RELEASE_CONTRACT_CHECKER=%s\n' "$RUNNER_TEMP/releasecheck"
            printf 'RELEASE_TRANSPORT_BIN=%s\n' "$RUNNER_TEMP/releasetransport"
            printf 'RELEASE_CONTRACT_VERSION_FILE=%s\n' "$RUNNER_TEMP/releasecheck-version.json"
            printf 'RELEASE_CONTRACT_PROJECTION_FILE=%s\n' "$RUNNER_TEMP/release-contract-operational.json"
          } >> "$GITHUB_ENV"

      - name: Validate protected-main control, source contract, tag, and Release
        env:
          CONTROL_SHA: ${{ inputs.control_sha }}
          CONTROL_CI_RUN_ID: ${{ inputs.control_ci_run_id }}
          CONTROL_CI_RUN_ATTEMPT: ${{ inputs.control_ci_run_attempt }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RELEASE_ID: ${{ inputs.release_id }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          SOURCE_CI_RUN_ID: ${{ inputs.source_ci_run_id }}
          SOURCE_CI_RUN_ATTEMPT: ${{ inputs.source_ci_run_attempt }}
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          source scripts/release/lib.sh
          release_require_typed_contract_projection
          release_require_version "$VERSION"
          for sha in "$CONTROL_SHA" "$SOURCE_SHA"; do
            [[ "$sha" =~ ^[0-9a-f]{40}$ ]] || { echo "control/source SHA is malformed" >&2; exit 1; }
          done
          for value in "$CONTROL_CI_RUN_ID" "$CONTROL_CI_RUN_ATTEMPT" "$SOURCE_CI_RUN_ID" "$SOURCE_CI_RUN_ATTEMPT" "$RELEASE_ID"; do
            [[ "$value" =~ ^[1-9][0-9]*$ ]] || { echo "control/source/release identity is malformed" >&2; exit 1; }
          done
          [[ "$GITHUB_REPOSITORY" == "$RELEASE_SOURCE_REPOSITORY" &&
             "$DEFAULT_BRANCH" == "$RELEASE_SOURCE_DEFAULT_BRANCH" ]] || {
            echo "workflow repository/default branch differs from the typed release contract" >&2
            exit 1
          }
          [[ "$GITHUB_REF" == "refs/heads/${DEFAULT_BRANCH}" && "$GITHUB_SHA" == "$CONTROL_SHA" &&
             "$GITHUB_SHA" == "$(git rev-parse HEAD)" ]] || {
            echo "Homebrew bridge must execute from the exact reviewed protected default branch" >&2
            exit 1
          }

          "$RUNNER_TEMP/releasecheck" validate-contract \
            --contract release/contract.v2.json --json > "$RUNNER_TEMP/current-contract-validation.json"
          git cat-file -e "${SOURCE_SHA}^{commit}"
          git show "${SOURCE_SHA}:release/contract.v1.json" > "$RUNNER_TEMP/source-contract.v1.json"
          "$RUNNER_TEMP/releasecheck" contract route-source \
            --source-contract "$RUNNER_TEMP/source-contract.v1.json" \
            --registry release/contract-history.v2.json \
            --repository "$GITHUB_REPOSITORY" --version "$VERSION" --source-sha "$SOURCE_SHA" --json \
            > "$RUNNER_TEMP/source-contract-route.json"
          jq -e --arg repository "$GITHUB_REPOSITORY" --arg version "$VERSION" --arg source "$SOURCE_SHA" '
            .schema_id == "env-vault.release-contract-source-route.v2" and .schema_version == 2 and .ok == true and
            .contract_generation == "v1" and (.evidence_format == "v1" or .evidence_format == "v2") and
            .contract_schema_id == "env-vault.release-contract.v1" and .contract_schema_version == 1 and
            .repository.full_name == $repository and .operational == null and
            .historical.repository == $repository and .historical.release_version == $version and
            .historical.source_sha == $source and
            .historical.contract_generation == .contract_generation and
            .historical.evidence_format == .evidence_format
          ' "$RUNNER_TEMP/source-contract-route.json" >/dev/null || {
            echo "immutable source is not an exact closed historical release tuple" >&2
            exit 1
          }
          jq -e --slurp '
            .[0] as $current | .[1] as $source |
            $current.schema_id == "env-vault.release-contract.v2" and $current.schema_version == 2 and
            $source.schema_id == "env-vault.release-contract.v1" and $source.schema_version == 1 and
            $current.naming == $source.naming and
            $current.platforms == $source.platforms and
            $current.assets == $source.assets and
            $current.schemas.promotion_manifest == $source.schemas.promotion_manifest and
            ([$current.workflows[] | select(.id == "ci" or .id == "publisher") | {id,name,file}] | sort_by(.id)) ==
              ([$source.workflows[] | select(.id == "ci" or .id == "publisher") | {id,name,file}] | sort_by(.id)) and
            ([$current.workflows[] | select(.id == "homebrew_bridge") | {id,name,file}] ==
              [{id:"homebrew_bridge",name:"publish-homebrew-bridge",file:"publish-homebrew-bridge.yml"}]) and
            ([$current.apps[] | select(.id == "homebrew_tap")] | length) == 1 and
            ([$source.apps[] | select(.id == "homebrew_tap")] | length) == 1 and
            ([$current.apps[] | select(.id == "homebrew_tap")][0]) as $current_app |
            ([$source.apps[] | select(.id == "homebrew_tap")][0]) as $source_app |
            $current_app.repository_id == "homebrew_tap" and
            $current.repositories.homebrew_tap.full_name == $source_app.repository and
            ({id:$current_app.id,slug:$current_app.slug,environment:$current_app.environment,
              audit_workflow:$current_app.audit_workflow,ci_workflow_file:$current_app.ci_workflow_file,
              ci_workflow_name:$current_app.ci_workflow_name} ==
             {id:$source_app.id,slug:$source_app.slug,environment:$source_app.environment,
              audit_workflow:$source_app.audit_workflow,ci_workflow_file:$source_app.ci_workflow_file,
              ci_workflow_name:$source_app.ci_workflow_name})
          ' release/contract.v2.json "$RUNNER_TEMP/source-contract.v1.json" >/dev/null || {
            echo "reviewed control and immutable source disagree on release/formula/tap identities" >&2
            exit 1
          }
          tap_app=$RELEASE_HOMEBREW_APP
          tap_repository=$RELEASE_HOMEBREW_TAP_REPOSITORY
          tap_owner=${tap_repository%%/*}
          tap_name=${tap_repository#*/}
          tap_ci_workflow=$(jq -er '.ci_workflow_file | select(type == "string" and test("^[A-Za-z0-9][A-Za-z0-9_.-]*\\.yml$"))' <<< "$tap_app")
          {
            printf 'TAP_REPOSITORY=%s\n' "$tap_repository"
            printf 'TAP_REPOSITORY_OWNER=%s\n' "$tap_owner"
            printf 'TAP_REPOSITORY_NAME=%s\n' "$tap_name"
            printf 'TAP_CI_WORKFLOW=%s\n' "$tap_ci_workflow"
            printf 'TAP_DEFAULT_BRANCH=%s\n' "$RELEASE_HOMEBREW_TAP_DEFAULT_BRANCH"
            printf 'TAP_FORMULA_PATH=tap-out/%s.rb\n' "$RELEASE_HOMEBREW_FORMULA_NAME"
            printf 'TAP_RELEASE_BRANCH=release/%s-%s\n' "$RELEASE_PRODUCT" "$VERSION"
          } >> "$GITHUB_ENV"

          git worktree add --detach "$RUNNER_TEMP/source-tooling" "$SOURCE_SHA"
          (
            cd "$RUNNER_TEMP/source-tooling"
            go build -trimpath -o "$RUNNER_TEMP/source-releasecheck" ./cmd/releasecheck
          )
          "$RUNNER_TEMP/source-releasecheck" --contract "$RUNNER_TEMP/source-contract.v1.json" --version --json \
            > "$RUNNER_TEMP/source-releasecheck-version.json"
          "$RUNNER_TEMP/source-releasecheck" validate-contract \
            --contract "$RUNNER_TEMP/source-contract.v1.json" --json > "$RUNNER_TEMP/source-contract-validation.json"
          jq -e --slurpfile route "$RUNNER_TEMP/source-contract-route.json" '
            .schema_id == "env-vault.releasecheck-version.v1" and .schema_version == 1 and .ok == true and
            .release_contract_schema == "env-vault.release-contract.v1" and
            .semantic_contract_sha256 == $route[0].contract_semantic_sha256
          ' "$RUNNER_TEMP/source-releasecheck-version.json" >/dev/null || {
            echo "source release checker identity differs from the authorized historical contract" >&2
            exit 1
          }
          printf 'SOURCE_RELEASECHECK=%s\n' "$RUNNER_TEMP/source-releasecheck" >> "$GITHUB_ENV"

          scripts/release/gh-api-read.sh "$RUNNER_TEMP/default-branch-ref.json" \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/${DEFAULT_BRANCH}"
          jq -e --arg control "$CONTROL_SHA" '
            type == "object" and .object.type == "commit" and .object.sha == $control
          ' "$RUNNER_TEMP/default-branch-ref.json" >/dev/null || {
            echo "protected default branch advanced after dispatch" >&2
            exit 1
          }
          scripts/release/releasetransport.sh actions identity \
            --output "$RUNNER_TEMP/control-ci-identity.json" \
            --repository "$GITHUB_REPOSITORY" --run-id "$CONTROL_CI_RUN_ID" --run-attempt "$CONTROL_CI_RUN_ATTEMPT" \
            --workflow-path "$RELEASE_CI_WORKFLOW_PATH" --event push \
            --head-sha "$CONTROL_SHA" --head-ref "$DEFAULT_BRANCH"
          scripts/release/gh-api-read.sh "$RUNNER_TEMP/control-ci-runs.json" \
            --paginate --slurp --method GET "repos/${GITHUB_REPOSITORY}/actions/workflows/${RELEASE_CI_WORKFLOW_FILE}/runs" \
            -f "head_sha=${CONTROL_SHA}" -f event=push -F per_page=100
          jq -e --arg repository "$GITHUB_REPOSITORY" --arg control "$CONTROL_SHA" --arg branch "$DEFAULT_BRANCH" \
            --arg workflow_path "$RELEASE_CI_WORKFLOW_PATH" \
            --argjson run_id "$CONTROL_CI_RUN_ID" --argjson attempt "$CONTROL_CI_RUN_ATTEMPT" '
            [.[]?.workflow_runs[]? | select(
              .repository.full_name == $repository and .head_repository.full_name == $repository and
              .head_sha == $control and .head_branch == $branch and
              .path == $workflow_path and .event == "push" and
              .status == "completed" and .conclusion == "success"
            )] | length == 1 and .[0].id == $run_id and .[0].run_attempt == $attempt
          ' "$RUNNER_TEMP/control-ci-runs.json" >/dev/null
          scripts/release/releasetransport.sh actions identity \
            --output "$RUNNER_TEMP/source-ci-identity.json" \
            --repository "$GITHUB_REPOSITORY" --run-id "$SOURCE_CI_RUN_ID" --run-attempt "$SOURCE_CI_RUN_ATTEMPT" \
            --workflow-path "$RELEASE_CI_WORKFLOW_PATH" --event push \
            --head-sha "$SOURCE_SHA" --head-ref "$DEFAULT_BRANCH"

          [[ "$(scripts/release/resolve-tag-sha.sh "$VERSION")" == "$SOURCE_SHA" ]] || {
            echo "immutable tag does not resolve to the exact source" >&2
            exit 1
          }
          scripts/release/gh-api-read.sh "$RUNNER_TEMP/release-state.json" \
            "repos/${GITHUB_REPOSITORY}/releases/tags/${VERSION}"
          jq -e --arg version "$VERSION" --argjson release_id "$RELEASE_ID" \
            --slurpfile contract "$RELEASE_CONTRACT_PROJECTION_FILE" '
            type == "object" and .id == $release_id and .tag_name == $version and
            .draft == false and .prerelease == false and
            (.assets | type == "array" and length == 10) and
            ([.assets[].id] | length == (unique | length)) and
            ([.assets[].name] | sort) == ($contract[0].assets | sort)
          ' "$RUNNER_TEMP/release-state.json" >/dev/null || {
            echo "GitHub Release is not the exact stable ten-asset contract" >&2
            exit 1
          }

      - name: Bind successful bootstrap result and failed publisher graph
        env:
          BOOTSTRAP_CONTROL_SHA: ${{ inputs.bootstrap_control_sha }}
          BOOTSTRAP_JOB_ID: ${{ inputs.bootstrap_job_id }}
          BOOTSTRAP_RESULT_ARTIFACT_ID: ${{ inputs.bootstrap_result_artifact_id }}
          BOOTSTRAP_RESULT_ARTIFACT_SHA256: ${{ inputs.bootstrap_result_artifact_sha256 }}
          BOOTSTRAP_RUN_ATTEMPT: ${{ inputs.bootstrap_run_attempt }}
          BOOTSTRAP_RUN_ID: ${{ inputs.bootstrap_run_id }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          FAILED_HOMEBREW_JOB_ID: ${{ inputs.failed_homebrew_job_id }}
          HEALTH_JOB_ID: ${{ inputs.health_job_id }}
          METADATA_JOB_ID: ${{ inputs.metadata_job_id }}
          PREFLIGHT_JOB_ID: ${{ inputs.preflight_job_id }}
          PROMOTION_JOB_ID: ${{ inputs.promotion_job_id }}
          PUBLISHER_RUN_ATTEMPT: ${{ inputs.failed_publisher_run_attempt }}
          PUBLISHER_RUN_ID: ${{ inputs.failed_publisher_run_id }}
          RELEASE_JOB_ID: ${{ inputs.release_job_id }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          SUPPLY_CHAIN_JOB_ID: ${{ inputs.supply_chain_job_id }}
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          source scripts/release/lib.sh
          release_require_typed_contract_projection
          [[ "$BOOTSTRAP_CONTROL_SHA" =~ ^[0-9a-f]{40}$ ]] || { echo "bootstrap control SHA is malformed" >&2; exit 1; }
          for value in "$BOOTSTRAP_RUN_ID" "$BOOTSTRAP_RUN_ATTEMPT" "$BOOTSTRAP_JOB_ID" \
            "$BOOTSTRAP_RESULT_ARTIFACT_ID" "$PUBLISHER_RUN_ID" "$PUBLISHER_RUN_ATTEMPT" \
            "$METADATA_JOB_ID" "$PROMOTION_JOB_ID" "$PREFLIGHT_JOB_ID" "$RELEASE_JOB_ID" \
            "$SUPPLY_CHAIN_JOB_ID" "$FAILED_HOMEBREW_JOB_ID" "$HEALTH_JOB_ID"; do
            [[ "$value" =~ ^[1-9][0-9]*$ ]] || { echo "bootstrap/publisher identity is malformed" >&2; exit 1; }
          done
          [[ "$BOOTSTRAP_RESULT_ARTIFACT_SHA256" =~ ^sha256:[0-9a-f]{64}$ ]] || {
            echo "bootstrap result artifact digest is malformed" >&2
            exit 1
          }
          bootstrap_name="env-vault-release-assets-bootstrap-${VERSION}-${SOURCE_SHA}-${BOOTSTRAP_RUN_ID}-attempt-${BOOTSTRAP_RUN_ATTEMPT}"
          printf 'BOOTSTRAP_RESULT_ARTIFACT_NAME=%s\n' "$bootstrap_name" >> "$GITHUB_ENV"

          scripts/release/releasetransport.sh actions identity \
            --output "$RUNNER_TEMP/bootstrap-identity.json" \
            --repository "$GITHUB_REPOSITORY" --run-id "$BOOTSTRAP_RUN_ID" --run-attempt "$BOOTSTRAP_RUN_ATTEMPT" \
            --workflow-path "$RELEASE_ASSETS_BOOTSTRAP_WORKFLOW_PATH" --event workflow_dispatch \
            --head-sha "$BOOTSTRAP_CONTROL_SHA" --head-ref "$DEFAULT_BRANCH" \
            --job-id "$BOOTSTRAP_JOB_ID" --job-name bootstrap \
            --job-url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${BOOTSTRAP_RUN_ID}/job/${BOOTSTRAP_JOB_ID}"
          scripts/release/gh-api-read.sh "$RUNNER_TEMP/bootstrap-artifacts.json" --paginate --slurp \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${BOOTSTRAP_RUN_ID}/artifacts?per_page=100"
          jq -L scripts/release -e --arg name "$bootstrap_name" --arg digest "$BOOTSTRAP_RESULT_ARTIFACT_SHA256" \
            --arg control "$BOOTSTRAP_CONTROL_SHA" --argjson artifact_id "$BOOTSTRAP_RESULT_ARTIFACT_ID" \
            --argjson run_id "$BOOTSTRAP_RUN_ID" '
            include "artifact-pages";
            env_vault_exact_artifact($name; $run_id; $control) |
            .id == $artifact_id and .digest == $digest and
            (.size_in_bytes | type) == "number" and .size_in_bytes > 0
          ' "$RUNNER_TEMP/bootstrap-artifacts.json" >/dev/null

          scripts/release/releasetransport.sh actions identity \
            --output "$RUNNER_TEMP/failed-publisher-identity.json" \
            --repository "$GITHUB_REPOSITORY" --run-id "$PUBLISHER_RUN_ID" --run-attempt "$PUBLISHER_RUN_ATTEMPT" \
            --workflow-path "$RELEASE_PUBLISHER_WORKFLOW_PATH" --event workflow_dispatch \
            --head-sha "$SOURCE_SHA" --head-ref "$VERSION" --conclusion failure
          jq -e --arg expected "env-vault-publication event=workflow_dispatch version=${VERSION} repair=release-assets" '
            .ok == true and .run.diagnostic_name == $expected
          ' "$RUNNER_TEMP/failed-publisher-identity.json" >/dev/null || {
            echo "failed publisher diagnostic repair coordinate is not release-assets" >&2
            exit 1
          }
          scripts/release/gh-api-read.sh "$RUNNER_TEMP/failed-publisher-jobs.json" --paginate --slurp \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${PUBLISHER_RUN_ID}/attempts/${PUBLISHER_RUN_ATTEMPT}/jobs?per_page=100"
          jq -e --arg repository "$GITHUB_REPOSITORY" --arg source "$SOURCE_SHA" \
            --argjson run_id "$PUBLISHER_RUN_ID" \
            --argjson metadata "$METADATA_JOB_ID" --argjson promotion "$PROMOTION_JOB_ID" \
            --argjson preflight "$PREFLIGHT_JOB_ID" --argjson release "$RELEASE_JOB_ID" \
            --argjson supply_chain "$SUPPLY_CHAIN_JOB_ID" --argjson homebrew "$FAILED_HOMEBREW_JOB_ID" \
            --argjson health "$HEALTH_JOB_ID" '
            def exact_step($job; $name; $conclusion):
              [$job.steps[] | select(.name == $name and .status == "completed" and .conclusion == $conclusion)] | length == 1;
            select(type == "array" and length > 0 and
              all(.[]; type == "object" and (.jobs | type) == "array") and
              ([.[].total_count] | unique) == [7]) |
            [.[].jobs[]] as $jobs |
            ($jobs | length) == 7 and ($jobs | map(.id) | unique | length) == 7 and
            all($jobs[]; .run_id == $run_id and .head_sha == $source and .status == "completed") and
            ($jobs | map({id,name,conclusion}) | sort_by(.name)) == ([
              {id:$health,name:"health",conclusion:"skipped"},
              {id:$homebrew,name:"homebrew",conclusion:"failure"},
              {id:$metadata,name:"metadata",conclusion:"success"},
              {id:$preflight,name:"preflight",conclusion:"success"},
              {id:$promotion,name:"promotion",conclusion:"success"},
              {id:$release,name:"release",conclusion:"success"},
              {id:$supply_chain,name:"supply_chain",conclusion:"success"}
            ] | sort_by(.name)) and
            ([$jobs[] | select(.id == $homebrew and
              .html_url == ("https://github.com/" + $repository + "/actions/runs/" + ($run_id|tostring) + "/job/" + ($homebrew|tostring))
            )] | length) == 1 and
            ([$jobs[] | select(.id == $homebrew)][0]) as $homebrew_job |
            exact_step($homebrew_job; "Require exact-source attestations before tap mutation"; "failure") and
            exact_step($homebrew_job; "Generate exact Homebrew formula"; "skipped") and
            exact_step($homebrew_job; "Mint scoped Homebrew App token"; "skipped") and
            exact_step($homebrew_job; "Require exact Homebrew App identity and repository scope"; "skipped") and
            exact_step($homebrew_job; "Create or reuse deterministic Homebrew pull request"; "skipped") and
            exact_step($homebrew_job; "Require exact Homebrew pull-request head CI"; "skipped") and
            exact_step($homebrew_job; "Merge exact Homebrew pull-request head"; "skipped") and
            exact_step($homebrew_job; "Resolve exact Homebrew publication result"; "skipped") and
            exact_step($homebrew_job; "Require exact Homebrew post-merge CI"; "skipped")
          ' "$RUNNER_TEMP/failed-publisher-jobs.json" >/dev/null || {
            echo "failed publisher is not the exact reviewed pre-Homebrew-mutation graph" >&2
            exit 1
          }

      - name: Download exact bootstrap result
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.BOOTSTRAP_RESULT_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/bootstrap-result
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.bootstrap_run_id }}

      - name: Verify bootstrap result and complete release state before tap access
        env:
          BOOTSTRAP_CONTROL_SHA: ${{ inputs.bootstrap_control_sha }}
          BOOTSTRAP_JOB_ID: ${{ inputs.bootstrap_job_id }}
          BOOTSTRAP_RESULT_ARTIFACT_ID: ${{ inputs.bootstrap_result_artifact_id }}
          BOOTSTRAP_RESULT_ARTIFACT_SHA256: ${{ inputs.bootstrap_result_artifact_sha256 }}
          BOOTSTRAP_RUN_ATTEMPT: ${{ inputs.bootstrap_run_attempt }}
          BOOTSTRAP_RUN_ID: ${{ inputs.bootstrap_run_id }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RELEASE_ID: ${{ inputs.release_id }}
          SOURCE_CI_RUN_ATTEMPT: ${{ inputs.source_ci_run_attempt }}
          SOURCE_CI_RUN_ID: ${{ inputs.source_ci_run_id }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          source scripts/release/lib.sh
          release_require_typed_contract_projection
          mapfile -t results < <(find "$RUNNER_TEMP/bootstrap-result" -type f -name release-assets-bootstrap-result.json -print | LC_ALL=C sort)
          [[ ${#results[@]} -eq 1 ]] || { echo "bootstrap result file count is not one" >&2; exit 1; }
          bootstrap_archive=${RELEASE_ARCHIVES[0]}
          bootstrap_checksum="${bootstrap_archive}.sha256"
          jq -e --arg repository "$GITHUB_REPOSITORY" --arg version "$VERSION" --arg source "$SOURCE_SHA" \
            --arg default_branch "$DEFAULT_BRANCH" --arg control "$BOOTSTRAP_CONTROL_SHA" \
            --arg archive "$bootstrap_archive" --arg checksum "$bootstrap_checksum" \
            --arg artifact_digest "$BOOTSTRAP_RESULT_ARTIFACT_SHA256" \
            --argjson release_id "$RELEASE_ID" --argjson bootstrap_run_id "$BOOTSTRAP_RUN_ID" \
            --argjson bootstrap_attempt "$BOOTSTRAP_RUN_ATTEMPT" --argjson bootstrap_job_id "$BOOTSTRAP_JOB_ID" \
            --argjson artifact_id "$BOOTSTRAP_RESULT_ARTIFACT_ID" --argjson ci_run_id "$SOURCE_CI_RUN_ID" \
            --argjson ci_attempt "$SOURCE_CI_RUN_ATTEMPT" '
            type == "object" and .schema_id == "env-vault.release-assets-bootstrap.v1" and
            .schema_version == 1 and .ok == true and .repository == $repository and
            .version == $version and .source_sha == $source and .release_id == $release_id and
            .control_workflow.run_id == $bootstrap_run_id and
            .control_workflow.run_attempt == $bootstrap_attempt and
            .control_workflow.sha == $control and .control_workflow.ref == ("refs/heads/" + $default_branch) and
            .control_workflow.ci_identity.ok == true and
            .source_ci.run_id == $ci_run_id and .source_ci.run_attempt == $ci_attempt and
            .source_ci.identity.ok == true and .source_ci.promotion.ok == true and
            .failed_publisher.identity.ok == true and
            (.failed_publisher.run_id | type) == "number" and .failed_publisher.run_id > 0 and
            (.failed_publisher.run_attempt | type) == "number" and .failed_publisher.run_attempt > 0 and
            (.failed_publisher.job_id | type) == "number" and .failed_publisher.job_id > 0 and
            (.failed_publisher.bundle_artifact_id | type) == "number" and .failed_publisher.bundle_artifact_id > 0 and
            (.failed_publisher.bundle_sha256 | test("^sha256:[0-9a-f]{64}$")) and
            (.bootstrap_pair | type == "array" and length == 2) and
            ([.bootstrap_pair[].name] | sort) == ([$archive,$checksum] | sort) and
            all(.bootstrap_pair[]; .sha256 | test("^[0-9a-f]{64}$")) and
            .next_action == "dispatch_tag_scoped_release_assets_repair" and
            $bootstrap_job_id > 0 and $artifact_id > 0 and ($artifact_digest | length) == 71
          ' "${results[0]}" >/dev/null || { echo "bootstrap result does not bind the exact recovery tuple" >&2; exit 1; }
          cp -- "${results[0]}" "$RUNNER_TEMP/bootstrap-result.json"

          scripts/release/download-release-assets.sh "$VERSION" release-dist "$GITHUB_REPOSITORY"
          archive_sha256=$(release_sha256_file "release-dist/$bootstrap_archive")
          checksum_sha256=$(release_sha256_file "release-dist/$bootstrap_checksum")
          jq -e --arg archive "$bootstrap_archive" --arg archive_sha256 "$archive_sha256" \
            --arg checksum "$bootstrap_checksum" --arg checksum_sha256 "$checksum_sha256" '
            ([.bootstrap_pair[] | select(.name == $archive and .sha256 == $archive_sha256)] | length) == 1 and
            ([.bootstrap_pair[] | select(.name == $checksum and .sha256 == $checksum_sha256)] | length) == 1
          ' "$RUNNER_TEMP/bootstrap-result.json" >/dev/null || {
            echo "bootstrap result pair differs from the immutable Release bytes" >&2
            exit 1
          }
          scripts/release/gh-api-read.sh "$RUNNER_TEMP/release-before-homebrew.json" \
            "repos/${GITHUB_REPOSITORY}/releases/tags/${VERSION}"
          cmp -s <(jq -S '{id,tag_name,draft,prerelease,assets:([.assets[]|{id,name,size,digest}]|sort_by(.name))}' "$RUNNER_TEMP/release-state.json") \
            <(jq -S '{id,tag_name,draft,prerelease,assets:([.assets[]|{id,name,size,digest}]|sort_by(.name))}' "$RUNNER_TEMP/release-before-homebrew.json") || {
            echo "Release identity or asset metadata changed during bridge validation" >&2
            exit 1
          }

          state=$(scripts/release/artifact-attestation-state.sh \
            release-dist "$GITHUB_REPOSITORY" \
            "$GITHUB_REPOSITORY/$RELEASE_PUBLISHER_WORKFLOW_PATH" "$SOURCE_SHA")
          [[ "$state" == "complete|complete" ]] || {
            echo "Homebrew bridge requires complete exact-source provenance and SPDX attestations; observed $state" >&2
            exit 1
          }
          scripts/release/verify-artifact-attestations.sh \
            release-dist "$GITHUB_REPOSITORY" \
            "$GITHUB_REPOSITORY/$RELEASE_PUBLISHER_WORKFLOW_PATH" "$SOURCE_SHA" all

          mkdir -p tap-out "$RUNNER_TEMP/source-formula/scripts/release" "$RUNNER_TEMP/source-formula/release" \
            "$RUNNER_TEMP/source-formula-home"
          git show "${SOURCE_SHA}:scripts/release/generate-homebrew-formula.sh" > "$RUNNER_TEMP/source-formula/scripts/release/generate-homebrew-formula.sh"
          git show "${SOURCE_SHA}:scripts/release/lib.sh" > "$RUNNER_TEMP/source-formula/scripts/release/lib.sh"
          git show "${SOURCE_SHA}:release/contract.v1.json" > "$RUNNER_TEMP/source-formula/release/contract.v1.json"
          chmod 0700 "$RUNNER_TEMP/source-formula/scripts/release/generate-homebrew-formula.sh"
          env -i PATH="$PATH" HOME="$RUNNER_TEMP/source-formula-home" LC_ALL=C TMPDIR="$RUNNER_TEMP" \
            scripts/release/generate-homebrew-formula.sh "$VERSION" release-dist "$TAP_FORMULA_PATH"
          source_formula="$RUNNER_TEMP/source-formula/${RELEASE_HOMEBREW_FORMULA_NAME}.rb"
          env -i PATH="$PATH" HOME="$RUNNER_TEMP/source-formula-home" LC_ALL=C TMPDIR="$RUNNER_TEMP" \
            "$RUNNER_TEMP/source-formula/scripts/release/generate-homebrew-formula.sh" \
              "$VERSION" release-dist "$source_formula"
          cmp -s "$TAP_FORMULA_PATH" "$source_formula" || {
            echo "current and immutable-source Homebrew formulas differ" >&2
            exit 1
          }
          formula_sha256=$(release_sha256_file "$TAP_FORMULA_PATH")
          printf 'FORMULA_SHA256=%s\n' "$formula_sha256" >> "$GITHUB_ENV"

          SOURCE_SHA="$SOURCE_SHA" scripts/release/publish-homebrew-pr.sh \
            --require-unpublished "$VERSION" "$TAP_FORMULA_PATH" "$TAP_REPOSITORY" \
            > "$RUNNER_TEMP/early-unpublished.env"
          early_state=$(jq -Rn -L scripts/release 'include "homebrew-state"; env_vault_homebrew_state' \
            < "$RUNNER_TEMP/early-unpublished.env")
          jq -e --arg branch "$TAP_RELEASE_BRANCH" --arg base_branch "$TAP_DEFAULT_BRANCH" --arg source "$SOURCE_SHA" '
            .state == "UNPUBLISHED" and .branch == $branch and
            .base_branch == $base_branch and .source_sha == $source and
            (.base_sha | test("^[0-9a-f]{40}$")) and .head_sha == .base_sha and .tap_sha == .base_sha and
            .pr_number == "" and .pr_url == "" and .merge_sha == "" and
            .already_merged == "false" and .no_op == "true"
          ' <<< "$early_state" >/dev/null || { echo "Homebrew publication is not absent" >&2; exit 1; }

      - name: Recheck protected main and unpublished tap immediately before token
        env:
          CONTROL_SHA: ${{ inputs.control_sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          scripts/release/gh-api-read.sh "$RUNNER_TEMP/default-branch-before-token.json" \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/${DEFAULT_BRANCH}"
          jq -e --arg control "$CONTROL_SHA" '
            type == "object" and .object.type == "commit" and .object.sha == $control
          ' "$RUNNER_TEMP/default-branch-before-token.json" >/dev/null || {
            echo "protected default branch advanced before Homebrew token minting" >&2
            exit 1
          }
          SOURCE_SHA="$SOURCE_SHA" scripts/release/publish-homebrew-pr.sh \
            --require-unpublished "$VERSION" "$TAP_FORMULA_PATH" "$TAP_REPOSITORY" \
            > "$RUNNER_TEMP/pre-token-unpublished.env"
          pre_token_state=$(jq -Rn -L scripts/release 'include "homebrew-state"; env_vault_homebrew_state' \
            < "$RUNNER_TEMP/pre-token-unpublished.env")
          tap_before_sha=$(jq -er --arg branch "$TAP_RELEASE_BRANCH" --arg base_branch "$TAP_DEFAULT_BRANCH" --arg source "$SOURCE_SHA" '
            select(.state == "UNPUBLISHED" and .branch == $branch and
              .base_branch == $base_branch and .source_sha == $source and
              .pr_number == "" and .pr_url == "" and .merge_sha == "" and
              .already_merged == "false" and .no_op == "true") |
            .base_sha | select(test("^[0-9a-f]{40}$"))
          ' <<< "$pre_token_state")
          printf 'TAP_BEFORE_SHA=%s\n' "$tap_before_sha" >> "$GITHUB_ENV"

      - id: tap-token
        name: Mint scoped Homebrew App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.TAP_APP_CLIENT_ID }}
          private-key: ${{ secrets.TAP_APP_PRIVATE_KEY }}
          owner: ${{ env.TAP_REPOSITORY_OWNER }}
          repositories: ${{ env.TAP_REPOSITORY_NAME }}
          permission-actions: read
          permission-contents: write
          permission-pull-requests: write

      - name: Require exact Homebrew App identity and repository scope
        env:
          ACTUAL_APP_SLUG: ${{ steps.tap-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.tap-token.outputs.token }}
        run: |
          set -euo pipefail
          source scripts/release/lib.sh
          release_require_typed_contract_projection
          app=$RELEASE_HOMEBREW_APP
          expected_slug=$(jq -er '.slug | select(type == "string" and length > 0)' <<< "$app")
          expected_repository=$RELEASE_HOMEBREW_TAP_REPOSITORY
          [[ "$ACTUAL_APP_SLUG" == "$expected_slug" ]] || { echo "unexpected Homebrew App identity" >&2; exit 1; }
          scripts/release/gh-api-read.sh "$RUNNER_TEMP/installation-repositories.json" \
            --paginate --slurp installation/repositories
          mapfile -t repositories < <(jq -r '.[]?.repositories[]?.full_name' "$RUNNER_TEMP/installation-repositories.json")
          [[ "${#repositories[@]}" == "1" && "${repositories[0]:-}" == "$expected_repository" ]] || {
            echo "Homebrew App installation scope differs from the release contract" >&2
            exit 1
          }

      - name: Recheck exact tap base with scoped App before publication
        env:
          GH_TOKEN: ${{ steps.tap-token.outputs.token }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          SOURCE_SHA="$SOURCE_SHA" scripts/release/publish-homebrew-pr.sh \
            --require-unpublished "$VERSION" "$TAP_FORMULA_PATH" "$TAP_REPOSITORY" \
            > "$RUNNER_TEMP/app-token-unpublished.env"
          app_state=$(jq -Rn -L scripts/release 'include "homebrew-state"; env_vault_homebrew_state' \
            < "$RUNNER_TEMP/app-token-unpublished.env")
          jq -e --arg branch "$TAP_RELEASE_BRANCH" --arg base_branch "$TAP_DEFAULT_BRANCH" \
            --arg source "$SOURCE_SHA" --arg base "$TAP_BEFORE_SHA" '
            .state == "UNPUBLISHED" and .branch == $branch and
            .base_branch == $base_branch and .source_sha == $source and .base_sha == $base and
            .head_sha == $base and .tap_sha == $base and .pr_number == "" and .pr_url == "" and
            .merge_sha == "" and .already_merged == "false" and .no_op == "true"
          ' <<< "$app_state" >/dev/null || {
            echo "tap base or deterministic release coordinates changed after scoped token minting" >&2
            exit 1
          }

      - id: publish-tap-pr
        name: Create or reuse deterministic Homebrew pull request
        env:
          EXPECTED_TAP_BASE_SHA: ${{ env.TAP_BEFORE_SHA }}
          GH_TOKEN: ${{ steps.tap-token.outputs.token }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          VERSION: ${{ inputs.version }}
        run: >-
          scripts/release/publish-homebrew-pr.sh
          "$VERSION"
          "$TAP_FORMULA_PATH"
          "$TAP_REPOSITORY"
          >> "$GITHUB_OUTPUT"

      - id: tap-pr-ci
        name: Require exact Homebrew pull-request head CI
        env:
          GH_TOKEN: ${{ steps.tap-token.outputs.token }}
          HEAD_SHA: ${{ steps.publish-tap-pr.outputs.head_sha }}
          TAP_CI_IDENTITY_OUTPUT: ${{ runner.temp }}/tap-pr-ci-identity.json
        run: |
          set -euo pipefail
          run_url=$(scripts/release/wait-tap-ci.sh \
            "$TAP_REPOSITORY" "$TAP_CI_WORKFLOW" "$HEAD_SHA" pull_request 900 10)
          printf 'run_url=%s\n' "$run_url" >> "$GITHUB_OUTPUT"

      - id: merge-tap-pr
        name: Merge exact Homebrew pull-request head
        if: steps.publish-tap-pr.outputs.state == 'OPEN'
        env:
          GH_TOKEN: ${{ steps.tap-token.outputs.token }}
          HEAD_SHA: ${{ steps.publish-tap-pr.outputs.head_sha }}
          PR_NUMBER: ${{ steps.publish-tap-pr.outputs.pr_number }}
        run: |
          set -euo pipefail
          merge_sha=$(scripts/release/merge-homebrew-pr.sh "$TAP_REPOSITORY" "$PR_NUMBER" "$HEAD_SHA")
          printf 'merge_sha=%s\n' "$merge_sha" >> "$GITHUB_OUTPUT"

      - id: tap-result
        name: Resolve exact Homebrew publication result
        env:
          STATE: ${{ steps.publish-tap-pr.outputs.state }}
          PR_NUMBER: ${{ steps.publish-tap-pr.outputs.pr_number }}
          PR_URL: ${{ steps.publish-tap-pr.outputs.pr_url }}
          PR_HEAD_SHA: ${{ steps.publish-tap-pr.outputs.head_sha }}
          PUBLISHED_MERGE_SHA: ${{ steps.publish-tap-pr.outputs.merge_sha }}
          PUBLISHED_TAP_SHA: ${{ steps.publish-tap-pr.outputs.tap_sha }}
          NEW_MERGE_SHA: ${{ steps.merge-tap-pr.outputs.merge_sha }}
        run: |
          set -euo pipefail
          case "$STATE" in
            OPEN)
              merge_sha="$NEW_MERGE_SHA"
              tap_sha="$NEW_MERGE_SHA"
              publication_state=merged
              ;;
            MERGED)
              merge_sha="$PUBLISHED_MERGE_SHA"
              tap_sha="$PUBLISHED_TAP_SHA"
              publication_state=already-published
              ;;
            *) echo "unsupported Homebrew publication state: $STATE" >&2; exit 1 ;;
          esac
          for sha in "$PR_HEAD_SHA" "$merge_sha" "$tap_sha"; do
            [[ "$sha" =~ ^[0-9a-f]{40}$ ]] || { echo "Homebrew publication returned an invalid SHA" >&2; exit 1; }
          done
          [[ "$PR_NUMBER" =~ ^[1-9][0-9]*$ && "$PR_URL" == "https://github.com/${TAP_REPOSITORY}/pull/${PR_NUMBER}" ]] || {
            echo "Homebrew publication returned invalid pull-request identity" >&2
            exit 1
          }
          {
            printf 'publication_state=%s\n' "$publication_state"
            printf 'pr_number=%s\n' "$PR_NUMBER"
            printf 'pr_url=%s\n' "$PR_URL"
            printf 'pr_head_sha=%s\n' "$PR_HEAD_SHA"
            printf 'merge_sha=%s\n' "$merge_sha"
            printf 'tap_sha=%s\n' "$tap_sha"
          } >> "$GITHUB_OUTPUT"

      - id: tap-push-ci
        name: Require exact Homebrew post-merge CI
        env:
          GH_TOKEN: ${{ steps.tap-token.outputs.token }}
          MERGE_SHA: ${{ steps.tap-result.outputs.merge_sha }}
          TAP_CI_IDENTITY_OUTPUT: ${{ runner.temp }}/tap-push-ci-identity.json
        run: |
          set -euo pipefail
          run_url=$(scripts/release/wait-tap-ci.sh \
            "$TAP_REPOSITORY" "$TAP_CI_WORKFLOW" "$MERGE_SHA" push 900 10)
          printf 'run_url=%s\n' "$run_url" >> "$GITHUB_OUTPUT"

      - id: final-homebrew
        name: Verify exact published Homebrew state
        env:
          EXPECTED_HEAD_SHA: ${{ steps.tap-result.outputs.pr_head_sha }}
          EXPECTED_MERGE_SHA: ${{ steps.tap-result.outputs.merge_sha }}
          EXPECTED_PR_NUMBER: ${{ steps.tap-result.outputs.pr_number }}
          GH_TOKEN: ${{ steps.tap-token.outputs.token }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          scripts/release/publish-homebrew-pr.sh --verify-published-pr \
            "$VERSION" "$TAP_FORMULA_PATH" "$TAP_REPOSITORY" "$RUNNER_TEMP/published-tap" \
            > "$RUNNER_TEMP/published-homebrew.env"
          published=$(jq -Rn -L scripts/release 'include "homebrew-state"; env_vault_homebrew_state' \
            < "$RUNNER_TEMP/published-homebrew.env")
          jq -e --arg branch "$TAP_RELEASE_BRANCH" --arg base_branch "$TAP_DEFAULT_BRANCH" --arg source "$SOURCE_SHA" \
            --arg pr "$EXPECTED_PR_NUMBER" --arg head "$EXPECTED_HEAD_SHA" --arg merge "$EXPECTED_MERGE_SHA" '
            .state == "MERGED" and .branch == $branch and
            .base_branch == $base_branch and .source_sha == $source and .pr_number == $pr and
            .head_sha == $head and .merge_sha == $merge and .already_merged == "true" and
            .no_op == "true" and .merge_is_ancestor_of_tap == "true" and
            (.tap_sha | test("^[0-9a-f]{40}$"))
          ' <<< "$published" >/dev/null || { echo "final Homebrew state differs from the exact publication tuple" >&2; exit 1; }
          final_tap_sha=$(jq -er '.tap_sha | select(test("^[0-9a-f]{40}$"))' <<< "$published")
          printf 'tap_sha=%s\n' "$final_tap_sha" >> "$GITHUB_OUTPUT"

      - name: Emit compact typed Homebrew bridge result
        env:
          BOOTSTRAP_JOB_ID: ${{ inputs.bootstrap_job_id }}
          BOOTSTRAP_RESULT_ARTIFACT_ID: ${{ inputs.bootstrap_result_artifact_id }}
          BOOTSTRAP_RESULT_ARTIFACT_SHA256: ${{ inputs.bootstrap_result_artifact_sha256 }}
          BOOTSTRAP_RUN_ATTEMPT: ${{ inputs.bootstrap_run_attempt }}
          BOOTSTRAP_RUN_ID: ${{ inputs.bootstrap_run_id }}
          CONTROL_CI_RUN_ATTEMPT: ${{ inputs.control_ci_run_attempt }}
          CONTROL_CI_RUN_ID: ${{ inputs.control_ci_run_id }}
          CONTROL_SHA: ${{ inputs.control_sha }}
          FAILED_HOMEBREW_JOB_ID: ${{ inputs.failed_homebrew_job_id }}
          HEALTH_JOB_ID: ${{ inputs.health_job_id }}
          METADATA_JOB_ID: ${{ inputs.metadata_job_id }}
          PREFLIGHT_JOB_ID: ${{ inputs.preflight_job_id }}
          PROMOTION_JOB_ID: ${{ inputs.promotion_job_id }}
          PUBLISHER_RUN_ATTEMPT: ${{ inputs.failed_publisher_run_attempt }}
          PUBLISHER_RUN_ID: ${{ inputs.failed_publisher_run_id }}
          RELEASE_ID: ${{ inputs.release_id }}
          RELEASE_JOB_ID: ${{ inputs.release_job_id }}
          SOURCE_CI_RUN_ATTEMPT: ${{ inputs.source_ci_run_attempt }}
          SOURCE_CI_RUN_ID: ${{ inputs.source_ci_run_id }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          SUPPLY_CHAIN_JOB_ID: ${{ inputs.supply_chain_job_id }}
          VERSION: ${{ inputs.version }}
          PUBLICATION_STATE: ${{ steps.tap-result.outputs.publication_state }}
          PR_NUMBER: ${{ steps.tap-result.outputs.pr_number }}
          PR_URL: ${{ steps.tap-result.outputs.pr_url }}
          PR_HEAD_SHA: ${{ steps.tap-result.outputs.pr_head_sha }}
          MERGE_SHA: ${{ steps.tap-result.outputs.merge_sha }}
          TAP_SHA: ${{ steps.final-homebrew.outputs.tap_sha }}
          PR_CI_URL: ${{ steps.tap-pr-ci.outputs.run_url }}
          TAP_CI_URL: ${{ steps.tap-push-ci.outputs.run_url }}
        run: |
          set -euo pipefail
          jq -c -n \
            --slurpfile control_ci "$RUNNER_TEMP/control-ci-identity.json" \
            --slurpfile source_ci "$RUNNER_TEMP/source-ci-identity.json" \
            --slurpfile bootstrap_identity "$RUNNER_TEMP/bootstrap-identity.json" \
            --slurpfile bootstrap_result "$RUNNER_TEMP/bootstrap-result.json" \
            --slurpfile publisher "$RUNNER_TEMP/failed-publisher-identity.json" \
            --slurpfile pr_ci "$RUNNER_TEMP/tap-pr-ci-identity.json" \
            --slurpfile tap_ci "$RUNNER_TEMP/tap-push-ci-identity.json" \
            --arg repository "$GITHUB_REPOSITORY" --arg version "$VERSION" --arg source "$SOURCE_SHA" \
            --arg control "$CONTROL_SHA" --arg control_ref "$GITHUB_REF" --arg formula_sha256 "$FORMULA_SHA256" \
            --arg tap_repository "$TAP_REPOSITORY" --arg tap_before_sha "$TAP_BEFORE_SHA" \
            --arg publication_state "$PUBLICATION_STATE" --arg pr_url "$PR_URL" --arg pr_head "$PR_HEAD_SHA" \
            --arg merge_sha "$MERGE_SHA" --arg tap_sha "$TAP_SHA" --arg pr_ci_url "$PR_CI_URL" --arg tap_ci_url "$TAP_CI_URL" \
            --arg bootstrap_digest "$BOOTSTRAP_RESULT_ARTIFACT_SHA256" \
            --argjson workflow_run_id "$GITHUB_RUN_ID" --argjson workflow_run_attempt "$GITHUB_RUN_ATTEMPT" \
            --argjson control_ci_run_id "$CONTROL_CI_RUN_ID" --argjson control_ci_attempt "$CONTROL_CI_RUN_ATTEMPT" \
            --argjson release_id "$RELEASE_ID" --argjson source_ci_run_id "$SOURCE_CI_RUN_ID" \
            --argjson source_ci_attempt "$SOURCE_CI_RUN_ATTEMPT" --argjson bootstrap_run_id "$BOOTSTRAP_RUN_ID" \
            --argjson bootstrap_attempt "$BOOTSTRAP_RUN_ATTEMPT" --argjson bootstrap_job_id "$BOOTSTRAP_JOB_ID" \
            --argjson bootstrap_artifact_id "$BOOTSTRAP_RESULT_ARTIFACT_ID" --argjson publisher_run_id "$PUBLISHER_RUN_ID" \
            --argjson publisher_attempt "$PUBLISHER_RUN_ATTEMPT" --argjson metadata_job_id "$METADATA_JOB_ID" \
            --argjson promotion_job_id "$PROMOTION_JOB_ID" --argjson preflight_job_id "$PREFLIGHT_JOB_ID" \
            --argjson release_job_id "$RELEASE_JOB_ID" --argjson supply_chain_job_id "$SUPPLY_CHAIN_JOB_ID" \
            --argjson homebrew_job_id "$FAILED_HOMEBREW_JOB_ID" --argjson health_job_id "$HEALTH_JOB_ID" \
            --argjson pr_number "$PR_NUMBER" '
            {
              schema_id:"env-vault.homebrew-publication-bridge.v1", schema_version:1, ok:true,
              repository:$repository, version:$version, source_sha:$source, release_id:$release_id,
              control:{
                workflow:{run_id:$workflow_run_id,run_attempt:$workflow_run_attempt,sha:$control,ref:$control_ref},
                ci:{run_id:$control_ci_run_id,run_attempt:$control_ci_attempt,identity:$control_ci[0]}
              },
              source:{ci_run_id:$source_ci_run_id,ci_run_attempt:$source_ci_attempt,ci_identity:$source_ci[0]},
              bootstrap:{
                run_id:$bootstrap_run_id,run_attempt:$bootstrap_attempt,job_id:$bootstrap_job_id,
                workflow_identity:$bootstrap_identity[0],result_artifact_id:$bootstrap_artifact_id,
                result_artifact_sha256:$bootstrap_digest,result:$bootstrap_result[0]
              },
              failed_publisher:{
                run_id:$publisher_run_id,run_attempt:$publisher_attempt,identity:$publisher[0],
                jobs:{metadata:$metadata_job_id,promotion:$promotion_job_id,preflight:$preflight_job_id,
                  release:$release_job_id,supply_chain:$supply_chain_job_id,homebrew:$homebrew_job_id,health:$health_job_id}
              },
              homebrew:{
                repository:$tap_repository,formula_sha256:$formula_sha256,tap_before_sha:$tap_before_sha,
                publication_state:$publication_state,pr_number:$pr_number,pr_url:$pr_url,pr_head_sha:$pr_head,
                pr_ci:{url:$pr_ci_url,identity:$pr_ci[0]},merge_sha:$merge_sha,tap_sha:$tap_sha,
                post_merge_ci:{url:$tap_ci_url,identity:$tap_ci[0]}
              },
              next_action:"dispatch_tag_scoped_health"
            } |
            select(
              .control.ci.identity.ok == true and .source.ci_identity.ok == true and
              .bootstrap.workflow_identity.ok == true and .bootstrap.result.ok == true and
              .failed_publisher.identity.ok == true and .homebrew.pr_ci.identity.ok == true and
              .homebrew.post_merge_ci.identity.ok == true and
              .homebrew.pr_ci.identity.run.head_sha == $pr_head and
              .homebrew.post_merge_ci.identity.run.head_sha == $merge_sha
            )
          ' > "$RUNNER_TEMP/homebrew-bridge-result.json"
          jq -e '
            .schema_id == "env-vault.homebrew-publication-bridge.v1" and .schema_version == 1 and .ok == true and
            .next_action == "dispatch_tag_scoped_health" and
            (.homebrew.pr_number | type) == "number" and (.homebrew.pr_head_sha | test("^[0-9a-f]{40}$")) and
            (.homebrew.merge_sha | test("^[0-9a-f]{40}$")) and (.homebrew.tap_sha | test("^[0-9a-f]{40}$"))
          ' "$RUNNER_TEMP/homebrew-bridge-result.json" >/dev/null
          jq . "$RUNNER_TEMP/homebrew-bridge-result.json" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload exact Homebrew bridge result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: env-vault-homebrew-bridge-${{ inputs.version }}-${{ inputs.source_sha }}-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-bridge-result.json
          if-no-files-found: error
          retention-days: 30
