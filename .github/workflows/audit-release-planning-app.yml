name: audit-release-planning-app

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: env-vault-release-planning-app-audit
  cancel-in-progress: false

jobs:
  scope:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: release-planning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: "false"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build the offline checker and strict GitHub release transport once
        shell: bash
        run: |
          set -euo pipefail
          go build -trimpath -o "$RUNNER_TEMP/releasecheck" ./cmd/releasecheck
          go build -trimpath -o "$RUNNER_TEMP/releasetransport" ./cmd/releasetransport
          echo "RELEASE_TRANSPORT_BIN=$RUNNER_TEMP/releasetransport" >> "$GITHUB_ENV"

      - id: app-token
        name: Mint read-only installation audit token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-administration: read
          permission-metadata: read

      - name: Require the exact release planning App identity
        env:
          ACTUAL_APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$ACTUAL_APP_SLUG" != "env-vault-release-planning" ]]; then
            echo "unexpected release planning App identity" >&2
            exit 1
          fi

      - name: Verify repository release settings and bypass policy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASECHECK: ${{ runner.temp }}/releasecheck
        shell: bash
        run: scripts/release/verify-repository-release-settings.sh

      - name: Require a single-repository installation
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          scripts/release/gh-api-read.sh installation-repositories.json \
            --paginate --slurp installation/repositories
          mapfile -t repositories < <(jq -r '.[]?.repositories[]?.full_name' installation-repositories.json)
          if [[ "${#repositories[@]}" != "1" || "${repositories[0]:-}" != "ildarbinanas-design/env-vault" ]]; then
            echo "release planning App installation scope must contain only env-vault" >&2
            exit 1
          fi
          {
            printf '## Release planning App scope audit\n\n'
            printf -- '- Installation contains only `ildarbinanas-design/env-vault`.\n'
            printf -- '- Audit token permissions: metadata read and administration read.\n'
            printf -- '- Global bypass actor counts were read through GraphQL and validated offline.\n'
            printf -- '- The token is revoked by the action post-step.\n'
          } >> "$GITHUB_STEP_SUMMARY"
