name: build-binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            cgo: "0"
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            cgo: "0"
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
            cgo: "1"
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            runner: macos-15
            cgo: "1"
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
            cgo: "0"
            ext: ".exe"
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -eu
          mkdir -p "dist/env-vault-${GOOS}-${GOARCH}"
          go build \
            -trimpath \
            -ldflags="-s -w -X github.com/ildarbinanas-design/env-vault/internal/cli.Version=${VERSION}" \
            -o "dist/env-vault-${GOOS}-${GOARCH}/env-vault${{ matrix.ext }}" \
            ./cmd/env-vault
          cp README.md LICENSE THIRD_PARTY_NOTICES.md "dist/env-vault-${GOOS}-${GOARCH}/"

      - name: Package
        run: |
          set -eu
          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip -r "env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.zip" "env-vault-${{ matrix.goos }}-${{ matrix.goarch }}"
          else
            tar -czf "env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" "env-vault-${{ matrix.goos }}-${{ matrix.goarch }}"
          fi
          shasum -a 256 "env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}" > "env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: env-vault-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}
            dist/env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}.sha256
          retention-days: 14

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          gh release create "${GITHUB_REF_NAME}" dist/* --repo "github.com/${GITHUB_REPOSITORY}" --verify-tag --generate-notes
