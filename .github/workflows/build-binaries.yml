name: build-binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional release version (vX.Y.Z). Leave blank for a build-only run."
        required: false
        default: ""
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      publish: ${{ steps.resolve.outputs.publish }}
    steps:
      - id: resolve
        name: Resolve build version and release mode
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          version="$REF_NAME"
          publish=false
          if [[ "$EVENT_NAME" == "push" ]]; then
            publish=true
          elif [[ -n "$INPUT_VERSION" ]]; then
            if [[ "$REF" != "refs/heads/${DEFAULT_BRANCH}" ]]; then
              echo "manual releases must run from refs/heads/${DEFAULT_BRANCH}" >&2
              exit 1
            fi
            version="$INPUT_VERSION"
            publish=true
          fi
          if [[ "$publish" == "true" && ! "$version" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "release version must match vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'publish=%s\n' "$publish" >> "$GITHUB_OUTPUT"

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: go test ./...
      - run: go vet ./...
      - run: go test -race ./...
      - run: scripts/smoke.sh

  license:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23.x"

      - run: scripts/license-check.sh

  build:
    needs: [metadata]
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            cgo: "0"
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            cgo: "0"
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
            cgo: "1"
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            runner: macos-15
            cgo: "1"
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
            cgo: "0"
            ext: ".exe"
            archive: zip
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -eu
          mkdir -p "dist/env-vault-${GOOS}-${GOARCH}"
          go build \
            -trimpath \
            -ldflags="-s -w -X github.com/ildarbinanas-design/env-vault/internal/cli.Version=${VERSION}" \
            -o "dist/env-vault-${GOOS}-${GOARCH}/env-vault${{ matrix.ext }}" \
            ./cmd/env-vault
          cp README.md LICENSE THIRD_PARTY_NOTICES.md "dist/env-vault-${GOOS}-${GOARCH}/"

      - name: Package
        run: |
          set -eu
          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip -r "env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.zip" "env-vault-${{ matrix.goos }}-${{ matrix.goarch }}"
          else
            tar -czf "env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" "env-vault-${{ matrix.goos }}-${{ matrix.goarch }}"
          fi
          shasum -a 256 "env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}" > "env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: env-vault-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}
            dist/env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}.sha256
          retention-days: 14

  smoke:
    needs: [metadata, build]
    name: smoke-${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            archive: tar.gz
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            runner: macos-15
            archive: tar.gz
          - goos: windows
            goarch: amd64
            runner: windows-latest
            archive: zip
    steps:
      - name: Download built artifact
        uses: actions/download-artifact@v8
        with:
          name: env-vault-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist

      - name: Verify exact version on Unix
        if: runner.os != 'Windows'
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCHIVE: ${{ matrix.archive }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail
          name="env-vault-${GOOS}-${GOARCH}"
          (
            cd dist
            shasum -a 256 -c "${name}.${ARCHIVE}.sha256"
            tar -xzf "${name}.${ARCHIVE}"
          )
          binary="dist/${name}/env-vault"
          printf '%s\n' "$VERSION" > expected-version.txt
          "$binary" --version > version-flag.txt
          "$binary" version > version-command.txt
          diff -u expected-version.txt version-flag.txt
          diff -u expected-version.txt version-command.txt

      - name: Verify exact version on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          $name = "env-vault-$env:GOOS-$env:GOARCH"
          $archive = Join-Path "dist" "$name.zip"
          $checksumFile = Join-Path "dist" "$name.zip.sha256"
          $expectedChecksum = ((Get-Content -LiteralPath $checksumFile -Raw).Trim() -split '\s+')[0]
          $actualChecksum = (Get-FileHash -LiteralPath $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualChecksum -cne $expectedChecksum) {
            throw "checksum mismatch for $archive"
          }
          Expand-Archive -LiteralPath $archive -DestinationPath "dist/unpacked"
          $binary = Join-Path "dist/unpacked/$name" "env-vault.exe"
          $flagOutput = @(& $binary --version)
          $flagExit = $LASTEXITCODE
          if ($flagExit -ne 0 -or $flagOutput.Count -ne 1 -or $flagOutput[0] -cne $env:VERSION) {
            throw "--version output '$($flagOutput -join '\n')', want '$env:VERSION'"
          }
          $commandOutput = @(& $binary version)
          $commandExit = $LASTEXITCODE
          if ($commandExit -ne 0 -or $commandOutput.Count -ne 1 -or $commandOutput[0] -cne $env:VERSION) {
            throw "version output '$($commandOutput -join '\n')', want '$env:VERSION'"
          }

  release:
    if: needs.metadata.outputs.publish == 'true'
    needs: [metadata, verify, license, build, smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create release tag for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail
          if ! gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/git/refs" \
            --raw-field "ref=refs/tags/${VERSION}" \
            --raw-field "sha=${GITHUB_SHA}" \
            --silent; then
            existing_sha="$(gh api \
              "repos/${GITHUB_REPOSITORY}/git/ref/tags/${VERSION}" \
              --jq '.object.sha')"
            if [ "$existing_sha" != "$GITHUB_SHA" ]; then
              echo "tag ${VERSION} already points to ${existing_sha}" >&2
              exit 1
            fi
            echo "tag ${VERSION} already points to this commit"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -eu
          gh release create "${VERSION}" dist/* --repo "github.com/${GITHUB_REPOSITORY}" --verify-tag --generate-notes

  homebrew:
    if: needs.metadata.outputs.publish == 'true'
    needs: [metadata, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate formula
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -eu
          v="${VERSION#v}"
          sha() { cut -d' ' -f1 "dist/env-vault-$1.tar.gz.sha256"; }
          DARWIN_ARM64="$(sha darwin-arm64)"
          DARWIN_AMD64="$(sha darwin-amd64)"
          LINUX_ARM64="$(sha linux-arm64)"
          LINUX_AMD64="$(sha linux-amd64)"
          for h in "$DARWIN_ARM64" "$DARWIN_AMD64" "$LINUX_ARM64" "$LINUX_AMD64"; do
            echo "$h" | grep -qE '^[0-9a-f]{64}$' || { echo "malformed sha256: '$h'" >&2; exit 1; }
          done
          mkdir -p tap-out
          cat > tap-out/env-vault.rb <<EOF
          class EnvVault < Formula
            desc "Secure environment variable vault for running commands with profiles"
            homepage "https://github.com/ildarbinanas-design/env-vault"
            version "${v}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/ildarbinanas-design/env-vault/releases/download/v${v}/env-vault-darwin-arm64.tar.gz"
                sha256 "${DARWIN_ARM64}"
              else
                url "https://github.com/ildarbinanas-design/env-vault/releases/download/v${v}/env-vault-darwin-amd64.tar.gz"
                sha256 "${DARWIN_AMD64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/ildarbinanas-design/env-vault/releases/download/v${v}/env-vault-linux-arm64.tar.gz"
                sha256 "${LINUX_ARM64}"
              else
                url "https://github.com/ildarbinanas-design/env-vault/releases/download/v${v}/env-vault-linux-amd64.tar.gz"
                sha256 "${LINUX_AMD64}"
              end
            end

            def install
              bin.install "env-vault"
            end

            test do
              assert_equal "v#{version}", shell_output("#{bin}/env-vault --version").strip
            end
          end
          EOF

      - name: Push formula to tap
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -eu
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$TAP_DEPLOY_KEY" > "$HOME/.ssh/tap_deploy_key"
          chmod 600 "$HOME/.ssh/tap_deploy_key"
          ssh-keyscan github.com >> "$HOME/.ssh/known_hosts" 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/tap_deploy_key -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o IdentitiesOnly=yes"
          git clone --depth 1 git@github.com:ildarbinanas-design/homebrew-tap.git tap
          install -m 644 tap-out/env-vault.rb tap/Formula/env-vault.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/env-vault.rb
          if git diff --cached --quiet; then
            echo "formula already matches ${VERSION}"
            exit 0
          fi
          git commit -m "env-vault ${VERSION}"
          git push origin HEAD:main
