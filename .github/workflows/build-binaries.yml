name: build-binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional release version (vX.Y.Z). Leave blank for a build-only run."
        required: false
        default: ""
        type: string
      repair:
        description: "Resume an existing release at this stage. Requires version."
        required: true
        default: none
        type: choice
        options:
          - none
          - release-assets
          - homebrew
          - health
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: env-vault-release
  cancel-in-progress: false
  queue: max

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      publish: ${{ steps.resolve.outputs.publish }}
      repair: ${{ steps.resolve.outputs.repair }}
      source_sha: ${{ steps.resolve.outputs.source_sha }}
      run_build: ${{ steps.resolve.outputs.run_build }}
      run_release: ${{ steps.resolve.outputs.run_release }}
      run_homebrew: ${{ steps.resolve.outputs.run_homebrew }}
    steps:
      - uses: actions/checkout@v7

      - id: resolve
        name: Resolve build version and release mode
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_REPAIR: ${{ inputs.repair }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          version="$REF_NAME"
          publish=false
          repair="${INPUT_REPAIR:-none}"
          case "$repair" in
            none|release-assets|homebrew|health) ;;
            *) echo "unsupported repair mode: $repair" >&2; exit 1 ;;
          esac
          if [[ "$EVENT_NAME" == "push" && "$repair" != "none" ]]; then
            echo "tag-triggered releases cannot select repair mode" >&2
            exit 1
          fi
          if [[ "$repair" != "none" && -z "$INPUT_VERSION" ]]; then
            echo "repair mode requires an explicit version" >&2
            exit 1
          fi
          if [[ "$EVENT_NAME" == "push" ]]; then
            publish=true
          elif [[ -n "$INPUT_VERSION" ]]; then
            if [[ "$REF" != "refs/heads/${DEFAULT_BRANCH}" ]]; then
              echo "manual releases must run from refs/heads/${DEFAULT_BRANCH}" >&2
              exit 1
            fi
            version="$INPUT_VERSION"
            publish=true
          fi
          if [[ "$publish" == "true" && ! "$version" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "release version must match vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          source_sha="$GITHUB_SHA"
          if [[ "$publish" == "true" && ( "$EVENT_NAME" == "push" || "$repair" != "none" ) ]]; then
            source_sha="$(scripts/release/resolve-tag-sha.sh "$version")"
          fi
          run_build=true
          run_release=false
          run_homebrew=false
          if [[ "$publish" == "true" ]]; then
            case "$repair" in
              none|release-assets)
                run_release=true
                run_homebrew=true
                ;;
              homebrew)
                run_build=false
                run_homebrew=true
                ;;
              health)
                run_build=false
                ;;
            esac
          fi
          {
            printf 'version=%s\n' "$version"
            printf 'publish=%s\n' "$publish"
            printf 'repair=%s\n' "$repair"
            printf 'source_sha=%s\n' "$source_sha"
            printf 'run_build=%s\n' "$run_build"
            printf 'run_release=%s\n' "$run_release"
            printf 'run_homebrew=%s\n' "$run_homebrew"
          } >> "$GITHUB_OUTPUT"

  preflight:
    if: >-
      ${{
        always() &&
        !cancelled() &&
        needs.metadata.result == 'success' &&
        needs.metadata.outputs.publish == 'true' &&
        needs.metadata.outputs.repair != 'health'
      }}
    needs: [metadata]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Guard Homebrew version monotonicity
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/ildarbinanas-design/homebrew-tap.git tap-preflight
          target_version="${VERSION#v}"
          published_version="$(sed -nE 's/^[[:space:]]*version "([^"]+)"$/\1/p' tap-preflight/Formula/env-vault.rb)"
          comparison="$(scripts/release/semver-compare.sh "$target_version" "$published_version")"
          if [[ "$comparison" == "-1" ]]; then
            echo "refusing release downgrade from ${published_version} to ${target_version}" >&2
            exit 1
          fi
          echo "release version ${target_version} is monotonic relative to Homebrew ${published_version}"

  verify:
    if: needs.metadata.outputs.run_build == 'true'
    needs: [metadata]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.metadata.outputs.source_sha }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: go test ./...
      - run: go vet ./...
      - run: go test -race ./...
      - run: scripts/smoke.sh

  license:
    if: needs.metadata.outputs.run_build == 'true'
    needs: [metadata]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.metadata.outputs.source_sha }}

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23.x"

      - run: scripts/license-check.sh

  build:
    if: needs.metadata.outputs.run_build == 'true'
    needs: [metadata]
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            cgo: "0"
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            cgo: "0"
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
            cgo: "1"
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            runner: macos-15
            cgo: "1"
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
            cgo: "0"
            ext: ".exe"
            archive: zip
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.metadata.outputs.source_sha }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -eu
          mkdir -p "dist/env-vault-${GOOS}-${GOARCH}"
          go build \
            -trimpath \
            -ldflags="-s -w -X github.com/ildarbinanas-design/env-vault/internal/cli.Version=${VERSION}" \
            -o "dist/env-vault-${GOOS}-${GOARCH}/env-vault${{ matrix.ext }}" \
            ./cmd/env-vault
          cp README.md LICENSE THIRD_PARTY_NOTICES.md "dist/env-vault-${GOOS}-${GOARCH}/"

      - name: Package
        run: |
          set -eu
          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip -r "env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.zip" "env-vault-${{ matrix.goos }}-${{ matrix.goarch }}"
          else
            tar -czf "env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" "env-vault-${{ matrix.goos }}-${{ matrix.goarch }}"
          fi
          shasum -a 256 "env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}" > "env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: env-vault-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}
            dist/env-vault-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}.sha256
          retention-days: 14

  smoke:
    if: needs.metadata.outputs.run_build == 'true'
    needs: [metadata, build]
    name: smoke-${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            archive: tar.gz
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            runner: macos-15
            archive: tar.gz
          - goos: windows
            goarch: amd64
            runner: windows-latest
            archive: zip
    steps:
      - name: Download built artifact
        uses: actions/download-artifact@v8
        with:
          name: env-vault-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist

      - name: Verify exact version on Unix
        if: runner.os != 'Windows'
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCHIVE: ${{ matrix.archive }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail
          name="env-vault-${GOOS}-${GOARCH}"
          (
            cd dist
            shasum -a 256 -c "${name}.${ARCHIVE}.sha256"
            tar -xzf "${name}.${ARCHIVE}"
          )
          binary="dist/${name}/env-vault"
          printf '%s\n' "$VERSION" > expected-version.txt
          "$binary" --version > version-flag.txt
          "$binary" version > version-command.txt
          diff -u expected-version.txt version-flag.txt
          diff -u expected-version.txt version-command.txt

      - name: Verify exact version on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          $ErrorActionPreference = "Stop"
          $name = "env-vault-$env:GOOS-$env:GOARCH"
          $archive = Join-Path "dist" "$name.zip"
          $checksumFile = Join-Path "dist" "$name.zip.sha256"
          $expectedChecksum = ((Get-Content -LiteralPath $checksumFile -Raw).Trim() -split '\s+')[0]
          $actualChecksum = (Get-FileHash -LiteralPath $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualChecksum -cne $expectedChecksum) {
            throw "checksum mismatch for $archive"
          }
          Expand-Archive -LiteralPath $archive -DestinationPath "dist/unpacked"
          $binary = Join-Path "dist/unpacked/$name" "env-vault.exe"
          $flagOutput = @(& $binary --version)
          $flagExit = $LASTEXITCODE
          if ($flagExit -ne 0 -or $flagOutput.Count -ne 1 -or $flagOutput[0] -cne $env:VERSION) {
            throw "--version output '$($flagOutput -join '\n')', want '$env:VERSION'"
          }
          $commandOutput = @(& $binary version)
          $commandExit = $LASTEXITCODE
          if ($commandExit -ne 0 -or $commandOutput.Count -ne 1 -or $commandOutput[0] -cne $env:VERSION) {
            throw "version output '$($commandOutput -join '\n')', want '$env:VERSION'"
          }

  release:
    if: >-
      ${{
        always() &&
        !cancelled() &&
        needs.metadata.result == 'success' &&
        needs.preflight.result == 'success' &&
        needs.metadata.outputs.run_release == 'true' &&
        needs.verify.result == 'success' &&
        needs.license.result == 'success' &&
        needs.build.result == 'success' &&
        needs.smoke.result == 'success'
      }}
    needs: [metadata, preflight, verify, license, build, smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create release tag for manual dispatch
        if: github.event_name == 'workflow_dispatch' && needs.metadata.outputs.repair == 'none'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.metadata.outputs.version }}
          SOURCE_SHA: ${{ needs.metadata.outputs.source_sha }}
        run: |
          set -euo pipefail
          set +e
          existing_sha="$(scripts/release/resolve-tag-sha.sh "$VERSION")"
          tag_status=$?
          set -e
          if [[ "$tag_status" == "0" ]]; then
            if [[ "$existing_sha" != "$SOURCE_SHA" ]]; then
              echo "tag ${VERSION} points to ${existing_sha}, expected ${SOURCE_SHA}" >&2
              exit 1
            fi
            echo "tag ${VERSION} already points to the expected commit; no-op"
            exit 0
          fi
          if [[ "$tag_status" != "4" ]]; then
            echo "failed to resolve existing tag ${VERSION}" >&2
            exit "$tag_status"
          fi
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/git/refs" \
            --raw-field "ref=refs/tags/${VERSION}" \
            --raw-field "sha=${SOURCE_SHA}" \
            --silent

      - name: Verify release tag commit
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.metadata.outputs.version }}
          SOURCE_SHA: ${{ needs.metadata.outputs.source_sha }}
        run: |
          set -euo pipefail
          existing_sha="$(scripts/release/resolve-tag-sha.sh "$VERSION")"
          if [[ "$existing_sha" != "$SOURCE_SHA" ]]; then
            echo "tag ${VERSION} points to ${existing_sha}, expected ${SOURCE_SHA}" >&2
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail
          set +e
          state="$(scripts/release/get-release-state.sh "$VERSION")"
          release_status=$?
          set -e
          if [[ "$release_status" == "0" ]]; then
            if [[ "$state" != "${VERSION}|false|false" ]]; then
              echo "existing release state is incompatible: ${state}" >&2
              exit 1
            fi
            echo "release ${VERSION} already exists; reconciling assets"
          elif [[ "$release_status" == "4" ]]; then
            gh release create "$VERSION" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --generate-notes
          else
            echo "failed to query existing release ${VERSION}" >&2
            exit "$release_status"
          fi

      - name: Reconcile release assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: scripts/release/reconcile-release-assets.sh "$VERSION" dist

  homebrew:
    if: >-
      ${{
        always() &&
        !cancelled() &&
        needs.metadata.result == 'success' &&
        needs.preflight.result == 'success' &&
        needs.metadata.outputs.run_homebrew == 'true' &&
        (
          (
            (needs.metadata.outputs.repair == 'none' || needs.metadata.outputs.repair == 'release-assets') &&
            needs.release.result == 'success'
          ) ||
          (
            needs.metadata.outputs.repair == 'homebrew' &&
            needs.release.result == 'skipped'
          )
        )
      }}
    needs: [metadata, preflight, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download and verify published assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: scripts/release/download-release-assets.sh "$VERSION" release-dist

      - name: Generate formula
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          mkdir -p tap-out
          scripts/release/generate-homebrew-formula.sh "$VERSION" release-dist tap-out/env-vault.rb

      - name: Push formula to tap
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -eu
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$TAP_DEPLOY_KEY" > "$HOME/.ssh/tap_deploy_key"
          chmod 600 "$HOME/.ssh/tap_deploy_key"
          ssh-keyscan github.com >> "$HOME/.ssh/known_hosts" 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/tap_deploy_key -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o IdentitiesOnly=yes"
          git clone --depth 1 git@github.com:ildarbinanas-design/homebrew-tap.git tap
          target_version="${VERSION#v}"
          published_version="$(sed -nE 's/^[[:space:]]*version "([^"]+)"$/\1/p' tap/Formula/env-vault.rb)"
          comparison="$(scripts/release/semver-compare.sh "$target_version" "$published_version")"
          if [[ "$comparison" == "-1" ]]; then
            echo "refusing Homebrew downgrade from ${published_version} to ${target_version}" >&2
            exit 1
          fi
          if [[ "$comparison" == "0" ]]; then
            if cmp -s tap-out/env-vault.rb tap/Formula/env-vault.rb; then
              echo "same version, tag SHA, and checksums already published; no-op"
              exit 0
            fi
            echo "same version but generated formula differs in checksums or metadata" >&2
            exit 1
          fi
          install -m 644 tap-out/env-vault.rb tap/Formula/env-vault.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/env-vault.rb
          if git diff --cached --quiet; then
            echo "target version is newer but generated formula has no diff" >&2
            exit 1
          fi
          git commit -m "env-vault ${VERSION}"
          git push origin HEAD:main

  health:
    if: >-
      ${{
        always() &&
        !cancelled() &&
        needs.metadata.result == 'success' &&
        needs.metadata.outputs.publish == 'true' &&
        (
          (
            (needs.metadata.outputs.repair == 'none' || needs.metadata.outputs.repair == 'release-assets') &&
            needs.release.result == 'success' &&
            needs.homebrew.result == 'success'
          ) ||
          (
            needs.metadata.outputs.repair == 'homebrew' &&
            needs.release.result == 'skipped' &&
            needs.homebrew.result == 'success'
          ) ||
          (
            needs.metadata.outputs.repair == 'health' &&
            needs.release.result == 'skipped' &&
            needs.homebrew.result == 'skipped'
          )
        )
      }}
    needs: [metadata, release, homebrew]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify release and Homebrew health
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.metadata.outputs.version }}
          SOURCE_SHA: ${{ needs.metadata.outputs.source_sha }}
        run: |
          set -euo pipefail
          tag_sha="$(scripts/release/resolve-tag-sha.sh "$VERSION")"
          if [[ "$tag_sha" != "$SOURCE_SHA" ]]; then
            echo "tag ${VERSION} points to ${tag_sha}, expected ${SOURCE_SHA}" >&2
            exit 1
          fi
          state="$(scripts/release/get-release-state.sh "$VERSION")"
          if [[ "$state" != "${VERSION}|false|false" ]]; then
            echo "release is not healthy: ${state}" >&2
            exit 1
          fi
          scripts/release/download-release-assets.sh "$VERSION" health-dist
          git clone --depth 1 https://github.com/ildarbinanas-design/homebrew-tap.git health-tap
          scripts/release/verify-homebrew-formula.sh \
            "$VERSION" health-dist health-tap/Formula/env-vault.rb
          echo "release ${VERSION} is healthy"
