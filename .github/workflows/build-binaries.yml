name: build-binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional release version (vX.Y.Z). Leave blank for a build-only run."
        required: false
        default: ""
        type: string
      repair:
        description: "Resume an existing release at this stage. Requires version."
        required: true
        default: none
        type: choice
        options:
          - none
          - release-assets
          - homebrew
          - health
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: env-vault-release
  cancel-in-progress: false
  queue: max

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      publish: ${{ steps.resolve.outputs.publish }}
      repair: ${{ steps.resolve.outputs.repair }}
      source_sha: ${{ steps.resolve.outputs.source_sha }}
      run_build: ${{ steps.resolve.outputs.run_build }}
      run_release: ${{ steps.resolve.outputs.run_release }}
      run_homebrew: ${{ steps.resolve.outputs.run_homebrew }}
    steps:
      - uses: actions/checkout@v7

      - id: resolve
        name: Resolve build version and release mode
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_REPAIR: ${{ inputs.repair }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          version="$REF_NAME"
          publish=false
          repair="${INPUT_REPAIR:-none}"
          case "$repair" in
            none|release-assets|homebrew|health) ;;
            *) echo "unsupported repair mode: $repair" >&2; exit 1 ;;
          esac
          if [[ "$EVENT_NAME" == "push" && "$repair" != "none" ]]; then
            echo "tag-triggered releases cannot select repair mode" >&2
            exit 1
          fi
          if [[ "$repair" != "none" && -z "$INPUT_VERSION" ]]; then
            echo "repair mode requires an explicit version" >&2
            exit 1
          fi
          if [[ "$EVENT_NAME" == "push" ]]; then
            publish=true
          elif [[ -n "$INPUT_VERSION" ]]; then
            if [[ "$REF" != "refs/heads/${DEFAULT_BRANCH}" ]]; then
              echo "manual releases must run from refs/heads/${DEFAULT_BRANCH}" >&2
              exit 1
            fi
            version="$INPUT_VERSION"
            publish=true
          fi
          if [[ "$publish" == "true" && ! "$version" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "release version must match vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          source_sha="$GITHUB_SHA"
          if [[ "$publish" == "true" && ( "$EVENT_NAME" == "push" || "$repair" != "none" ) ]]; then
            source_sha="$(scripts/release/resolve-tag-sha.sh "$version")"
          fi
          run_build=true
          run_release=false
          run_homebrew=false
          if [[ "$publish" == "true" ]]; then
            case "$repair" in
              none|release-assets)
                run_release=true
                run_homebrew=true
                ;;
              homebrew)
                run_build=false
                run_homebrew=true
                ;;
              health)
                run_build=false
                ;;
            esac
          fi
          {
            printf 'version=%s\n' "$version"
            printf 'publish=%s\n' "$publish"
            printf 'repair=%s\n' "$repair"
            printf 'source_sha=%s\n' "$source_sha"
            printf 'run_build=%s\n' "$run_build"
            printf 'run_release=%s\n' "$run_release"
            printf 'run_homebrew=%s\n' "$run_homebrew"
          } >> "$GITHUB_OUTPUT"

  preflight:
    if: >-
      ${{
        always() &&
        !cancelled() &&
        needs.metadata.result == 'success' &&
        needs.metadata.outputs.publish == 'true' &&
        needs.metadata.outputs.repair != 'health'
      }}
    needs: [metadata]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Guard Homebrew version monotonicity
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/ildarbinanas-design/homebrew-tap.git tap-preflight
          target_version="${VERSION#v}"
          published_version="$(sed -nE 's/^[[:space:]]*version "([^"]+)"$/\1/p' tap-preflight/Formula/env-vault.rb)"
          comparison="$(scripts/release/semver-compare.sh "$target_version" "$published_version")"
          if [[ "$comparison" == "-1" ]]; then
            echo "refusing release downgrade from ${published_version} to ${target_version}" >&2
            exit 1
          fi
          echo "release version ${target_version} is monotonic relative to Homebrew ${published_version}"

  quality:
    if: needs.metadata.outputs.run_build == 'true'
    needs: [metadata]
    uses: ./.github/workflows/reusable-quality.yml
    with:
      source_sha: ${{ needs.metadata.outputs.source_sha }}
      version: ${{ needs.metadata.outputs.version }}

  release:
    if: >-
      ${{
        always() &&
        !cancelled() &&
        needs.metadata.result == 'success' &&
        needs.preflight.result == 'success' &&
        needs.metadata.outputs.run_release == 'true' &&
        needs.quality.result == 'success'
      }}
    needs: [metadata, preflight, quality]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create release tag for manual dispatch
        if: github.event_name == 'workflow_dispatch' && needs.metadata.outputs.repair == 'none'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.metadata.outputs.version }}
          SOURCE_SHA: ${{ needs.metadata.outputs.source_sha }}
        run: |
          set -euo pipefail
          set +e
          existing_sha="$(scripts/release/resolve-tag-sha.sh "$VERSION")"
          tag_status=$?
          set -e
          if [[ "$tag_status" == "0" ]]; then
            if [[ "$existing_sha" != "$SOURCE_SHA" ]]; then
              echo "tag ${VERSION} points to ${existing_sha}, expected ${SOURCE_SHA}" >&2
              exit 1
            fi
            echo "tag ${VERSION} already points to the expected commit; no-op"
            exit 0
          fi
          if [[ "$tag_status" != "4" ]]; then
            echo "failed to resolve existing tag ${VERSION}" >&2
            exit "$tag_status"
          fi
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/git/refs" \
            --raw-field "ref=refs/tags/${VERSION}" \
            --raw-field "sha=${SOURCE_SHA}" \
            --silent

      - name: Verify release tag commit
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.metadata.outputs.version }}
          SOURCE_SHA: ${{ needs.metadata.outputs.source_sha }}
        run: |
          set -euo pipefail
          existing_sha="$(scripts/release/resolve-tag-sha.sh "$VERSION")"
          if [[ "$existing_sha" != "$SOURCE_SHA" ]]; then
            echo "tag ${VERSION} points to ${existing_sha}, expected ${SOURCE_SHA}" >&2
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail
          set +e
          state="$(scripts/release/get-release-state.sh "$VERSION")"
          release_status=$?
          set -e
          if [[ "$release_status" == "0" ]]; then
            if [[ "$state" != "${VERSION}|false|false" ]]; then
              echo "existing release state is incompatible: ${state}" >&2
              exit 1
            fi
            echo "release ${VERSION} already exists; reconciling assets"
          elif [[ "$release_status" == "4" ]]; then
            gh release create "$VERSION" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --generate-notes
          else
            echo "failed to query existing release ${VERSION}" >&2
            exit "$release_status"
          fi

      - name: Reconcile release assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: scripts/release/reconcile-release-assets.sh "$VERSION" dist

  supply_chain:
    if: >-
      ${{
        always() &&
        !cancelled() &&
        needs.metadata.result == 'success' &&
        needs.metadata.outputs.publish == 'true' &&
        (needs.metadata.outputs.repair == 'none' || needs.metadata.outputs.repair == 'release-assets') &&
        needs.release.result == 'success'
      }}
    needs: [metadata, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@v7

      - name: Download canonical release assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: scripts/release/download-release-assets.sh "$VERSION" release-dist

      - id: attestation-state
        name: Detect complete existing attestations
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_SHA: ${{ github.sha }}
          SOURCE_SHA: ${{ needs.metadata.outputs.source_sha }}
        run: |
          set -euo pipefail
          state="$(scripts/release/artifact-attestation-state.sh \
            release-dist \
            "$GITHUB_REPOSITORY" \
            "$GITHUB_REPOSITORY/.github/workflows/build-binaries.yml" \
            "$SOURCE_SHA")"
          provenance_state=''
          sbom_state=''
          extra=''
          IFS='|' read -r provenance_state sbom_state extra <<< "$state"
          for value in "$provenance_state" "$sbom_state"; do
            case "$value" in
              complete|missing) ;;
              *) echo "unexpected attestation state: $state" >&2; exit 1 ;;
            esac
          done
          [[ -z "$extra" ]] || {
            echo "unexpected attestation state: $state" >&2
            exit 1
          }
          create_provenance=false
          create_sbom=false
          [[ "$provenance_state" == "complete" ]] || create_provenance=true
          [[ "$sbom_state" == "complete" ]] || create_sbom=true
          if [[ "$create_provenance" == "true" || "$create_sbom" == "true" ]]; then
            if [[ "$RUN_SHA" != "$SOURCE_SHA" ]]; then
              echo "cannot attest release ${SOURCE_SHA} from workflow source ${RUN_SHA}" >&2
              echo "rerun the original release workflow at ${SOURCE_SHA}; never mint provenance from a later main commit" >&2
              exit 1
            fi
            echo "supply-chain evidence is incomplete; generating only missing predicates"
          else
            echo "all provenance and SPDX attestations already verify at ${SOURCE_SHA}; no-op"
          fi
          {
            printf 'create_provenance=%s\n' "$create_provenance"
            printf 'create_sbom=%s\n' "$create_sbom"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Go for safe extraction
        if: steps.attestation-state.outputs.create_sbom == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Safely extract packages for SBOM
        if: steps.attestation-state.outputs.create_sbom == 'true'
        run: go run ./cmd/release-extract --input-dir release-dist --output-dir sbom-root

      - name: Generate SPDX SBOM
        if: steps.attestation-state.outputs.create_sbom == 'true'
        uses: anchore/sbom-action@v0
        with:
          path: sbom-root
          format: spdx-json
          output-file: env-vault-sbom.spdx.json
          syft-version: v1.44.0
          upload-artifact: false
          upload-release-assets: false

      - name: Upload SPDX SBOM workflow artifact
        if: steps.attestation-state.outputs.create_sbom == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: env-vault-sbom-${{ needs.metadata.outputs.version }}-attempt-${{ github.run_attempt }}
          path: env-vault-sbom.spdx.json
          if-no-files-found: error
          retention-days: 14

      - name: Attest build provenance
        if: steps.attestation-state.outputs.create_provenance == 'true'
        uses: actions/attest@v4
        with:
          subject-path: |
            release-dist/env-vault-linux-amd64.tar.gz
            release-dist/env-vault-linux-arm64.tar.gz
            release-dist/env-vault-darwin-amd64.tar.gz
            release-dist/env-vault-darwin-arm64.tar.gz
            release-dist/env-vault-windows-amd64.zip

      - name: Attest SPDX SBOM
        if: steps.attestation-state.outputs.create_sbom == 'true'
        uses: actions/attest@v4
        with:
          subject-path: |
            release-dist/env-vault-linux-amd64.tar.gz
            release-dist/env-vault-linux-arm64.tar.gz
            release-dist/env-vault-darwin-amd64.tar.gz
            release-dist/env-vault-darwin-arm64.tar.gz
            release-dist/env-vault-windows-amd64.zip
          sbom-path: env-vault-sbom.spdx.json

  homebrew:
    if: >-
      ${{
        always() &&
        !cancelled() &&
        needs.metadata.result == 'success' &&
        needs.preflight.result == 'success' &&
        needs.metadata.outputs.run_homebrew == 'true' &&
        (
          (
            (needs.metadata.outputs.repair == 'none' || needs.metadata.outputs.repair == 'release-assets') &&
            needs.release.result == 'success' &&
            needs.supply_chain.result == 'success'
          ) ||
          (
            needs.metadata.outputs.repair == 'homebrew' &&
            needs.release.result == 'skipped' &&
            needs.supply_chain.result == 'skipped'
          )
        )
      }}
    needs: [metadata, preflight, release, supply_chain]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download and verify published assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: scripts/release/download-release-assets.sh "$VERSION" release-dist

      - name: Generate formula
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          mkdir -p tap-out
          scripts/release/generate-homebrew-formula.sh "$VERSION" release-dist tap-out/env-vault.rb

      - name: Push formula to tap
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -eu
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$TAP_DEPLOY_KEY" > "$HOME/.ssh/tap_deploy_key"
          chmod 600 "$HOME/.ssh/tap_deploy_key"
          ssh-keyscan github.com >> "$HOME/.ssh/known_hosts" 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/tap_deploy_key -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o IdentitiesOnly=yes"
          git clone --depth 1 git@github.com:ildarbinanas-design/homebrew-tap.git tap
          target_version="${VERSION#v}"
          published_version="$(sed -nE 's/^[[:space:]]*version "([^"]+)"$/\1/p' tap/Formula/env-vault.rb)"
          comparison="$(scripts/release/semver-compare.sh "$target_version" "$published_version")"
          if [[ "$comparison" == "-1" ]]; then
            echo "refusing Homebrew downgrade from ${published_version} to ${target_version}" >&2
            exit 1
          fi
          if [[ "$comparison" == "0" ]]; then
            if cmp -s tap-out/env-vault.rb tap/Formula/env-vault.rb; then
              echo "same version, tag SHA, and checksums already published; no-op"
              exit 0
            fi
            echo "same version but generated formula differs in checksums or metadata" >&2
            exit 1
          fi
          install -m 644 tap-out/env-vault.rb tap/Formula/env-vault.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/env-vault.rb
          if git diff --cached --quiet; then
            echo "target version is newer but generated formula has no diff" >&2
            exit 1
          fi
          git commit -m "env-vault ${VERSION}"
          git push origin HEAD:main

  health:
    if: >-
      ${{
        always() &&
        !cancelled() &&
        needs.metadata.result == 'success' &&
        needs.metadata.outputs.publish == 'true' &&
        (
          (
            (needs.metadata.outputs.repair == 'none' || needs.metadata.outputs.repair == 'release-assets') &&
            needs.release.result == 'success' &&
            needs.supply_chain.result == 'success' &&
            needs.homebrew.result == 'success'
          ) ||
          (
            needs.metadata.outputs.repair == 'homebrew' &&
            needs.release.result == 'skipped' &&
            needs.supply_chain.result == 'skipped' &&
            needs.homebrew.result == 'success'
          ) ||
          (
            needs.metadata.outputs.repair == 'health' &&
            needs.release.result == 'skipped' &&
            needs.supply_chain.result == 'skipped' &&
            needs.homebrew.result == 'skipped'
          )
        )
      }}
    needs: [metadata, release, supply_chain, homebrew]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: read
    steps:
      - uses: actions/checkout@v7

      - name: Verify release and Homebrew health
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.metadata.outputs.version }}
          SOURCE_SHA: ${{ needs.metadata.outputs.source_sha }}
        run: |
          set -euo pipefail
          tag_sha="$(scripts/release/resolve-tag-sha.sh "$VERSION")"
          if [[ "$tag_sha" != "$SOURCE_SHA" ]]; then
            echo "tag ${VERSION} points to ${tag_sha}, expected ${SOURCE_SHA}" >&2
            exit 1
          fi
          state="$(scripts/release/get-release-state.sh "$VERSION")"
          if [[ "$state" != "${VERSION}|false|false" ]]; then
            echo "release is not healthy: ${state}" >&2
            exit 1
          fi
          scripts/release/download-release-assets.sh "$VERSION" health-dist
          scripts/release/verify-artifact-attestations.sh \
            health-dist \
            "$GITHUB_REPOSITORY" \
            "$GITHUB_REPOSITORY/.github/workflows/build-binaries.yml" \
            "$SOURCE_SHA"
          git clone --depth 1 https://github.com/ildarbinanas-design/homebrew-tap.git health-tap
          scripts/release/verify-homebrew-formula.sh \
            "$VERSION" health-dist health-tap/Formula/env-vault.rb
          tap_sha="$(git -C health-tap rev-parse HEAD)"
          release_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${VERSION}"
          tap_commit_url="${GITHUB_SERVER_URL}/ildarbinanas-design/homebrew-tap/commit/${tap_sha}"
          tap_ci_url="${tap_commit_url}/checks"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          attestations_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/attestations"
          {
            printf '## env-vault %s automated release checks\n\n' "$VERSION"
            printf -- '- Release: [%s](%s)\n' "$VERSION" "$release_url"
            printf -- '- Tap commit: [%s](%s)\n' "$tap_sha" "$tap_commit_url"
            printf -- '- Tap CI checks: [checks for %s](%s)\n' "$tap_sha" "$tap_ci_url"
            printf -- '- Supply-chain attestations: [repository attestations](%s)\n' "$attestations_url"
            printf -- '- Release workflow run: [run %s](%s)\n\n' "$GITHUB_RUN_ID" "$run_url"
            printf '> Tap CI is not awaited by this workflow yet; verify the exact tap commit manually.\n'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "automated release checks passed for ${VERSION}; tap CI still requires manual verification"
